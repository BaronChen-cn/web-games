<body>
<div id="page">
  <header>
    <span class="title-zh">扫雷</span>
    <span class="title-en">MINESWEEPER</span>
  </header>

  <div id="difficulty-bar">
    <button class="diff-btn active" data-diff="easy">初级</button>
    <button class="diff-btn" data-diff="medium">中级</button>
    <button class="diff-btn" data-diff="hard">高级</button>
  </div>

  <div id="hud">
    <div class="digit-display" id="mine-counter">010</div>
    <button id="face-btn" title="新游戏">😊</button>
    <div class="digit-display timer-disp" id="timer-disp">000</div>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div id="status-msg"></div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const DIFFICULTIES = {
  easy:   { cols: 9,  rows: 9,  mines: 10, cellSize: 32 },
  medium: { cols: 16, rows: 16, mines: 40, cellSize: 24 },
  hard:   { cols: 30, rows: 16, mines: 99, cellSize: 20 },
};

const NUM_COLORS = ['','n1','n2','n3','n4','n5','n6','n7','n8'];

// ─── STATE ────────────────────────────────────────────────
let cfg      = DIFFICULTIES.easy;
let diffKey  = 'easy';
let board    = [];   // flat array [row*cols + col]
let gameState = 'waiting'; // waiting | playing | won | lost
let firstClick = true;
let timerVal = 0;
let timerInterval = null;
let flagCount = 0;
let longPressTimer = null;
let longPressFired = false;
let touchStartCell = null;
let mouseDownFace  = false;

// ─── DOM REFS ─────────────────────────────────────────────
const boardEl      = document.getElementById('board');
const mineCountEl  = document.getElementById('mine-counter');
const timerEl      = document.getElementById('timer-disp');
const faceBtn      = document.getElementById('face-btn');
const statusMsg    = document.getElementById('status-msg');
const diffBtns     = document.querySelectorAll('.diff-btn');

// ─── UTIL ─────────────────────────────────────────────────
function fmt3(n) {
  if (n < 0) {
    // show negative with minus sign, max 2 digits
    return '-' + String(Math.min(Math.abs(n), 99)).padStart(2, '0');
  }
  return String(Math.min(n, 999)).padStart(3, '0');
}

function idx(r, c) { return r * cfg.cols + c; }

function neighbors(r, c) {
  const result = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < cfg.rows && nc >= 0 && nc < cfg.cols) {
        result.push([nr, nc]);
      }
    }
  }
  return result;
}

// ─── CELL SIZE (responsive) ───────────────────────────────
function computeCellSize() {
  const vw = window.innerWidth;
  const available = Math.min(vw - 32, 528); // page max-width 560 - 32 padding
  const natural = cfg.cellSize;
  const maxFromVw = Math.floor(available / cfg.cols);
  return Math.max(16, Math.min(natural, maxFromVw));
}

// ─── INIT ─────────────────────────────────────────────────
function initGame() {
  stopTimer();
  firstClick = true;
  gameState  = 'waiting';
  flagCount  = 0;
  timerVal   = 0;

  // Build flat board array
  board = Array.from({ length: cfg.rows * cfg.cols }, () => ({
    mine: false, revealed: false, flagged: false, adj: 0
  }));

  updateMineCounter();
  updateTimer();
  faceBtn.textContent = '😊';
  renderBoard();
  showStatus('');
}

function placeMines(safeR, safeC) {
  const safe = new Set();
  safe.add(idx(safeR, safeC));
  neighbors(safeR, safeC).forEach(([r,c]) => safe.add(idx(r,c)));

  const available = [];
  for (let i = 0; i < board.length; i++) {
    if (!safe.has(i)) available.push(i);
  }

  // Fisher-Yates shuffle first cfg.mines elements
  for (let i = 0; i < cfg.mines; i++) {
    const j = i + Math.floor(Math.random() * (available.length - i));
    [available[i], available[j]] = [available[j], available[i]];
    board[available[i]].mine = true;
  }

  // Calculate adjacency counts
  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      if (!board[idx(r,c)].mine) {
        board[idx(r,c)].adj = neighbors(r,c).filter(([nr,nc]) => board[idx(nr,nc)].mine).length;
      }
    }
  }
}

// ─── RENDER ───────────────────────────────────────────────
function renderBoard() {
  const cellSize = computeCellSize();
  boardEl.style.gridTemplateColumns = `repeat(${cfg.cols}, ${cellSize}px)`;

  boardEl.innerHTML = '';

  for (let r = 0; r < cfg.rows; r++) {
    for (let c = 0; c < cfg.cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.width  = cellSize + 'px';
      cell.style.height = cellSize + 'px';
      cell.style.fontSize = Math.round(cellSize * 0.58) + 'px';
      cell.dataset.r = r;
      cell.dataset.c = c;

      // Events
      cell.addEventListener('mousedown', onCellMouseDown);
      cell.addEventListener('mouseup',   onCellMouseUp);
      cell.addEventListener('contextmenu', onCellRightClick);
      cell.addEventListener('touchstart', onCellTouchStart, { passive: true });
      cell.addEventListener('touchmove',  onCellTouchMove,  { passive: true });
      cell.addEventListener('touchend',   onCellTouchEnd,   { passive: true });

      updateCellEl(cell, r, c, cellSize);
      boardEl.appendChild(cell);
    }
  }
}

function getCellEl(r, c) {
  return boardEl.children[r * cfg.cols + c];
}

function updateCellEl(el, r, c, cellSize) {
  if (!el) return;
  if (!cellSize) cellSize = parseInt(el.style.width);
  const data = board[idx(r,c)];

  // Reset classes (keep 'cell')
  el.className = 'cell';
  el.textContent = '';

  if (!data.revealed) {
    if (data.flagged) {
      el.classList.add('flagged');
      el.textContent = '🚩';
      el.style.fontSize = Math.round(cellSize * 0.55) + 'px';
    }
    return;
  }

  // Revealed
  el.classList.add('revealed');

  if (data.mine) {
    if (data.exploded) {
      el.classList.add('mine-explode');
    } else {
      el.classList.add('mine-revealed');
    }
    el.textContent = '💣';
    el.style.fontSize = Math.round(cellSize * 0.58) + 'px';
    return;
  }

  if (data.wrongFlag) {
    el.classList.add('wrong-flag');
    el.innerHTML = '❌';
    el.style.fontSize = Math.round(cellSize * 0.55) + 'px';
    return;
  }

  if (data.adj > 0) {
    el.classList.add(NUM_COLORS[data.adj]);
    el.textContent = data.adj;
    el.style.fontSize = Math.round(cellSize * 0.55) + 'px';
  }
}

// ─── GAME ACTIONS ─────────────────────────────────────────
function revealCell(r, c, animate) {
  if (gameState === 'won' || gameState === 'lost') return;
  const data = board[idx(r,c)];
  if (data.revealed || data.flagged) return;

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    gameState = 'playing';
    startTimer();
  }

  // Flood fill using BFS
  const toReveal = [];
  const visited  = new Set();

  function bfsReveal(sr, sc) {
    const queue = [[sr, sc]];
    visited.add(idx(sr, sc));
    while (queue.length) {
      const [cr, cc] = queue.shift();
      const d = board[idx(cr, cc)];
      if (d.revealed || d.flagged) continue;
      d.revealed = true;
      toReveal.push([cr, cc]);

      if (d.mine) {
        // should not happen on safe first click, but guard
        return;
      }

      if (d.adj === 0) {
        for (const [nr, nc] of neighbors(cr, cc)) {
          const ni = idx(nr, nc);
          if (!visited.has(ni) && !board[ni].revealed && !board[ni].flagged) {
            visited.add(ni);
            queue.push([nr, nc]);
          }
        }
      }
    }
  }

  if (data.mine) {
    data.revealed = true;
    data.exploded = true;
    gameLose(r, c);
    return;
  }

  bfsReveal(r, c);

  const cellSize = computeCellSize();
  toReveal.forEach(([tr, tc], i) => {
    const el = getCellEl(tr, tc);
    updateCellEl(el, tr, tc, cellSize);
    if (animate !== false) {
      el.classList.add('reveal-anim');
      setTimeout(() => el && el.classList.remove('reveal-anim'), 220);
    }
  });

  checkWin();
}

function flagCell(r, c) {
  if (gameState === 'waiting' || gameState === 'won' || gameState === 'lost') return;
  const data = board[idx(r,c)];
  if (data.revealed) return;

  data.flagged = !data.flagged;
  flagCount += data.flagged ? 1 : -1;

  updateMineCounter();
  const el = getCellEl(r, c);
  updateCellEl(el, r, c);
}

function chordCell(r, c) {
  if (gameState !== 'playing') return;
  const data = board[idx(r,c)];
  if (!data.revealed || data.adj === 0) return;

  const nbrs = neighbors(r, c);
  const adjFlags = nbrs.filter(([nr,nc]) => board[idx(nr,nc)].flagged).length;
  if (adjFlags !== data.adj) return;

  // Reveal all non-flagged, non-revealed neighbors
  let hitMine = false;
  for (const [nr, nc] of nbrs) {
    const nd = board[idx(nr,nc)];
    if (!nd.revealed && !nd.flagged) {
      if (nd.mine) {
        nd.revealed = true;
        nd.exploded = true;
        hitMine = true;
      } else {
        revealCell(nr, nc, true);
      }
    }
  }
  if (hitMine) {
    gameLose(r, c);
  }
}

// ─── WIN / LOSE ───────────────────────────────────────────
function gameLose(explodeR, explodeC) {
  gameState = 'lost';
  stopTimer();
  faceBtn.textContent = '😵';

  const cellSize = computeCellSize();

  // Reveal all mines and mark wrong flags
  board.forEach((d, i) => {
    const r = Math.floor(i / cfg.cols);
    const c = i % cfg.cols;
    if (d.mine && !d.revealed) {
      d.revealed = true;
    }
    if (d.flagged && !d.mine) {
      d.revealed = true;
      d.wrongFlag = true;
    }
    updateCellEl(getCellEl(r, c), r, c, cellSize);
  });

  // Re-render exploded cell
  const explodedData = board[idx(explodeR, explodeC)];
  const el = getCellEl(explodeR, explodeC);
  if (el) {
    el.className = 'cell revealed mine-explode';
    el.textContent = '💣';
    el.style.fontSize = Math.round(cellSize * 0.58) + 'px';
  }

  showStatus('<span class="lose-text">💥 踩雷了!</span><span class="best-times">' + getBestTimesHtml() + '</span>');
}

function checkWin() {
  const totalCells = cfg.rows * cfg.cols;
  const revealedNonMine = board.filter(d => d.revealed && !d.mine).length;
  if (revealedNonMine === totalCells - cfg.mines) {
    gameState = 'won';
    stopTimer();
    faceBtn.textContent = '😎';

    // Auto-flag remaining mines
    const cellSize = computeCellSize();
    board.forEach((d, i) => {
      if (d.mine && !d.flagged) {
        d.flagged = true;
        flagCount++;
      }
      const r = Math.floor(i / cfg.cols);
      const c = i % cfg.cols;
      updateCellEl(getCellEl(r, c), r, c, cellSize);
    });
    flagCount = cfg.mines;
    updateMineCounter();

    saveBestTime();
    showStatus('<span class="win-text">恭喜! 🎉 用时 ' + timerVal + ' 秒</span><span class="best-times">' + getBestTimesHtml() + '</span>');
  }
}

// ─── TIMER ────────────────────────────────────────────────
function startTimer() {
  stopTimer();
  timerVal = 0;
  timerInterval = setInterval(() => {
    timerVal = Math.min(timerVal + 1, 999);
    updateTimer();
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimer() {
  timerEl.textContent = fmt3(timerVal);
}

function updateMineCounter() {
  mineCountEl.textContent = fmt3(cfg.mines - flagCount);
}

// ─── BEST TIMES ───────────────────────────────────────────
function saveBestTime() {
  const key = 'ms_best_' + diffKey;
  const prev = localStorage.getItem(key);
  if (prev === null || timerVal < parseInt(prev)) {
    localStorage.setItem(key, timerVal);
  }
}

function getBestTime(diff) {
  const v = localStorage.getItem('ms_best_' + diff);
  return v !== null ? parseInt(v) : null;
}

function getBestTimesHtml() {
  const parts = Object.keys(DIFFICULTIES).map(d => {
    const t = getBestTime(d);
    const label = { easy:'初级', medium:'中级', hard:'高级' }[d];
    return label + ': ' + (t !== null ? t + 's' : '--');
  });
  return parts.join(' &nbsp;|&nbsp; ');
}

// ─── STATUS ───────────────────────────────────────────────
function showStatus(html) {
  statusMsg.innerHTML = html || '<span class="best-times">' + getBestTimesHtml() + '</span>';
}

// ─── EVENT HANDLERS ───────────────────────────────────────

// Board-level events to prevent context menu
boardEl.addEventListener('contextmenu', e => e.preventDefault());

// Mousedown on face btn
faceBtn.addEventListener('mousedown', () => { mouseDownFace = true; });
faceBtn.addEventListener('mouseup',   () => { mouseDownFace = false; });
faceBtn.addEventListener('click',     () => { initGame(); });

function getCellCoords(el) {
  return [parseInt(el.dataset.r), parseInt(el.dataset.c)];
}

let isMouseDown = false;
let mouseButton = -1;

function onCellMouseDown(e) {
  e.preventDefault();
  if (gameState === 'won' || gameState === 'lost') return;
  isMouseDown = true;
  mouseButton = e.button;
  if (e.button === 0) {
    faceBtn.textContent = gameState === 'playing' || gameState === 'waiting' ? '😮' : faceBtn.textContent;
  }
}

function onCellMouseUp(e) {
  e.preventDefault();
  if (!isMouseDown) return;
  isMouseDown = false;

  if (gameState === 'won' || gameState === 'lost') return;

  const [r, c] = getCellCoords(e.currentTarget);
  const data = board[idx(r,c)];

  if (e.button === 0) {
    if (gameState !== 'lost' && gameState !== 'won') {
      faceBtn.textContent = '😊';
    }
    if (data.revealed) {
      // Chord click
      chordCell(r, c);
    } else if (!data.flagged) {
      revealCell(r, c, true);
    }
  } else if (e.button === 2) {
    if (!data.revealed) flagCell(r, c);
  }
}

function onCellRightClick(e) {
  e.preventDefault();
  if (gameState === 'won' || gameState === 'lost') return;
  const [r, c] = getCellCoords(e.currentTarget);
  const data = board[idx(r,c)];
  if (!data.revealed) flagCell(r, c);
}

// Touch events
function onCellTouchStart(e) {
  if (gameState === 'won' || gameState === 'lost') return;
  longPressFired = false;
  touchStartCell = e.currentTarget;

  const [r, c] = getCellCoords(e.currentTarget);

  longPressTimer = setTimeout(() => {
    longPressFired = true;
    const d = board[idx(r, c)];
    if (!d.revealed) {
      flagCell(r, c);
      // Haptic if available
      if (navigator.vibrate) navigator.vibrate(30);
    }
  }, 500);
}

function onCellTouchMove(e) {
  clearTimeout(longPressTimer);
  longPressFired = true; // prevent reveal on touchend
}

function onCellTouchEnd(e) {
  clearTimeout(longPressTimer);
  if (gameState === 'won' || gameState === 'lost') return;
  if (longPressFired) return;

  // Short tap = reveal or chord
  const [r, c] = getCellCoords(e.currentTarget);
  const data = board[idx(r,c)];
  if (data.revealed) {
    chordCell(r, c);
  } else if (!data.flagged) {
    revealCell(r, c, true);
  }
}

// Difficulty buttons
diffBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const d = btn.dataset.diff;
    diffKey = d;
    cfg = DIFFICULTIES[d];
    diffBtns.forEach(b => b.classList.toggle('active', b === btn));
    initGame();
  });
});

// Resize: re-render (cell sizes may change)
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    renderBoard();
  }, 120);
});

// ─── BOOT ─────────────────────────────────────────────────
initGame();
</script>
</body>
</html>
