// ============================================================
// TETROMINO PREVIEW CANVAS
// ============================================================
const PIECE_COLORS = {
  I:'#00f5ff', O:'#ffd700', T:'#bf00ff',
  S:'#39ff14', Z:'#ff4444', J:'#4488ff', L:'#ff8c00',
};
const PIECE_SHAPES = {
  I:[[0,0],[0,1],[0,2],[0,3]],
  O:[[0,0],[0,1],[1,0],[1,1]],
  T:[[0,1],[1,0],[1,1],[1,2]],
  S:[[0,1],[0,2],[1,0],[1,1]],
  Z:[[0,0],[0,1],[1,1],[1,2]],
  J:[[0,0],[1,0],[1,1],[1,2]],
  L:[[0,2],[1,0],[1,1],[1,2]],
};

function drawTetrominoPreview(canvas, types) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const bs = 14; // block size
  const count = types.length;

  types.forEach((type, idx) => {
    const color = PIECE_COLORS[type];
    const shape = PIECE_SHAPES[type];
    // Spread pieces across the canvas
    const cols = Math.ceil(W / (bs * 6));
    const gx = (idx % cols) * (W / cols) + 10;
    const gy = Math.floor(idx / cols) * (H / Math.ceil(count / cols)) + 14;

    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    shape.forEach(([r, c]) => {
      const x = gx + c * (bs + 1);
      const y = gy + r * (bs + 1);
      ctx.fillStyle = color;
      ctx.fillRect(x, y, bs, bs);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(x, y, bs, 3);
      ctx.fillRect(x, y, 3, bs);
    });
    ctx.restore();
  });
}

// ============================================================
// RENDER CARDS
// ============================================================
function renderGames() {
  const grid = document.getElementById('gameGrid');
  grid.innerHTML = '';
  document.getElementById('gameCount').textContent = GAMES.length;

  GAMES.forEach((game, idx) => {
    const card = document.createElement('a');
    card.href = game.path;
    card.className = 'game-card';
    card.style.setProperty('--card-glow', game.glowColor || 'rgba(91,106,255,0.3)');
    card.style.setProperty('--card-btn-bg', game.btnGradient || 'linear-gradient(135deg,#5b6aff,#00dcff)');

    // Delay for stagger animation
    card.style.animation = `cardIn 0.4s ${idx * 0.07}s both`;

    // Preview area
    const preview = document.createElement('div');
    preview.className = 'card-preview';
    preview.style.background = game.previewBg || '#0e1020';

    if (game.tetrominoes) {
      // Animated canvas preview
      const cvs = document.createElement('canvas');
      cvs.className = 'card-canvas';
      cvs.width = 260;
      cvs.height = 148;
      preview.appendChild(cvs);
      setTimeout(() => drawTetrominoPreview(cvs, game.tetrominoes), 0);
    }

    const icon = document.createElement('div');
    icon.className = 'card-icon';
    icon.textContent = game.icon;
    icon.style.animationDelay = `${idx * 0.3}s`;
    preview.appendChild(icon);
    card.appendChild(preview);

    // Body
    const body = document.createElement('div');
    body.className = 'card-body';

    body.innerHTML = `
      <div class="card-name">${game.name}</div>
      <div class="card-name-en">${game.nameEn}</div>
      <div class="card-desc">${game.desc}</div>
      <div class="card-tags">${(game.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="card-footer">
        <div></div>
        <a href="${game.path}" class="play-btn" onclick="event.stopPropagation()">
          开始游戏 <span class="play-arrow">▶</span>
        </a>
      </div>
    `;

    card.appendChild(body);
    grid.appendChild(card);
  });
}

// Card entrance animation
const cardStyle = document.createElement('style');
cardStyle.textContent = `
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }
`;
document.head.appendChild(cardStyle);

renderGames();
