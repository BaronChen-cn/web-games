// Enemy count per level
const ENEMY_COUNTS = [3, 4, 4, 5, 5];

// Player spawn positions per level [col, row]
const PLAYER_SPAWNS = [
  [7, 13], [7, 13], [7, 13], [7, 13], [7, 13]
];

// Enemy spawn zones per level (top area)
const ENEMY_SPAWN_COLS = [1, 4, 7, 10, 13];

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let canvas, ctx;
let map; // 2D array (mutable copy)
let player;
let enemies = [];
let bullets = [];
let particles = [];
let powerups = [];
let shields = []; // animated shield rings

let score = 0;
let bestScore = 0;
let lives = MAX_LIVES;
let currentLevel = 0;
let gameState = 'menu'; // 'menu' | 'playing' | 'paused' | 'levelclear' | 'gameover'
let lastTime = 0;
let frameCount = 0;

let keys = {};
let touchDirs = { up: false, down: false, left: false, right: false, fire: false };

// ═══════════════════════════════════════════════════════
//  ENTITY CONSTRUCTORS
// ═══════════════════════════════════════════════════════
function makeTank(col, row, isPlayer) {
  return {
    x: col * TILE + TILE / 2,
    y: row * TILE + TILE / 2,
    dir: isPlayer ? DIR.UP : DIR.DOWN,
    speed: isPlayer ? PLAYER_SPEED : ENEMY_SPEED,
    isPlayer,
    hp: isPlayer ? MAX_LIVES : 1, // player hp managed separately via `lives`
    invincible: 0, // ms remaining
    shield: 0,     // ms remaining
    shieldAngle: 0,
    boost: 0,      // ms remaining
    multiShot: 0,  // ms remaining
    lastShot: 0,
    nextEnemyShot: randBetween(ENEMY_SHOOT_MIN, ENEMY_SHOOT_MAX),
    aiState: 'patrol',
    patrolTarget: null,
    patrolDir: DIR.DOWN,
    bfsPath: null,
    bfsTimer: 0,
    dodgeTimer: 0,
    moving: false,
    flashTimer: 0,
    visible: true,
  };
}

function makeBullet(x, y, dir, fromPlayer, bounced) {
  return {
    x, y, dir,
    fromPlayer,
    bounced: bounced || false,
    tail: [],
    active: true,
  };
}

function makeParticle(x, y, vx, vy, color, life, size) {
  return { x, y, vx, vy, color, life, maxLife: life, size, active: true };
}

function makePowerup(col, row) {
  const types = ['shield', 'boost', 'multishot'];
  const t = types[Math.floor(Math.random() * types.length)];
  return {
    x: col * TILE + TILE / 2,
    y: row * TILE + TILE / 2,
    type: t,
    life: 8000, // disappears after 8s
    anim: 0,
  };
}

// ═══════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════
function randBetween(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(randBetween(a, b + 1)); }

function tileAt(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return STEEL;
  return map[row][col];
}

function colOf(px) { return Math.floor(px / TILE); }
function rowOf(py) { return Math.floor(py / TILE); }

function centerOfTile(col, row) {
  return { x: col * TILE + TILE / 2, y: row * TILE + TILE / 2 };
}

function distSq(a, b) {
  return (a.x - b.x) ** 2 + (a.y - b.y) ** 2;
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// Deep-copy level map
function cloneMap(levelIdx) {
  return LEVELS[levelIdx].map(row => row.slice());
}

// ═══════════════════════════════════════════════════════
//  BFS path finding (returns first direction to take)
// ═══════════════════════════════════════════════════════
function bfsDir(startCol, startRow, goalCol, goalRow) {
  if (startCol === goalCol && startRow === goalRow) return -1;
  const visited = new Uint8Array(COLS * ROWS);
  const queue = [];
  const prev = new Int16Array(COLS * ROWS).fill(-1);
  const start = startRow * COLS + startCol;
  const goal  = goalRow * COLS + goalCol;
  visited[start] = 1;
  queue.push(start);
  let found = false;
  while (queue.length && !found) {
    const cur = queue.shift();
    const cc = cur % COLS;
    const cr = Math.floor(cur / COLS);
    for (let d = 0; d < 4; d++) {
      const nc = cc + DX[d];
      const nr = cr + DY[d];
      if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) continue;
      const t = tileAt(nc, nr);
      if (t !== EMPTY && t !== SPAWN) continue;
      const idx = nr * COLS + nc;
      if (visited[idx]) continue;
      visited[idx] = 1;
      prev[idx] = cur;
      if (idx === goal) { found = true; break; }
      queue.push(idx);
    }
  }
  if (!found) return -1;
  // trace back
  let cur = goal;
  while (prev[cur] !== start && prev[cur] !== -1) cur = prev[cur];
  const fc = cur % COLS - startCol;
  const fr = Math.floor(cur / COLS) - startRow;
  if (fc === 1) return DIR.RIGHT;
  if (fc === -1) return DIR.LEFT;
  if (fr === 1) return DIR.DOWN;
  if (fr === -1) return DIR.UP;
  return -1;
}

// ═══════════════════════════════════════════════════════
//  LINE OF SIGHT CHECK
// ═══════════════════════════════════════════════════════
function hasLOS(fromCol, fromRow, toCol, toRow) {
  if (fromRow === toRow) {
    const minC = Math.min(fromCol, toCol);
    const maxC = Math.max(fromCol, toCol);
    for (let c = minC + 1; c < maxC; c++) {
      const t = tileAt(c, fromRow);
      if (t === BRICK || t === STEEL) return false;
    }
    return true;
  }
  if (fromCol === toCol) {
    const minR = Math.min(fromRow, toRow);
    const maxR = Math.max(fromRow, toRow);
    for (let r = minR + 1; r < maxR; r++) {
      const t = tileAt(fromCol, r);
      if (t === BRICK || t === STEEL) return false;
    }
    return true;
  }
  return false;
}

// ═══════════════════════════════════════════════════════
//  LEVEL INIT
// ═══════════════════════════════════════════════════════
function initLevel(levelIdx) {
  map = cloneMap(levelIdx);
  bullets = [];
  particles = [];
  powerups = [];

  const [pc, pr] = PLAYER_SPAWNS[levelIdx];
  if (!player) {
    player = makeTank(pc, pr, true);
  } else {
    player.x = pc * TILE + TILE / 2;
    player.y = pr * TILE + TILE / 2;
    player.dir = DIR.UP;
    player.invincible = INVINCIBLE_DURATION;
    player.shield = 0;
    player.boost = 0;
    player.multiShot = 0;
    player.lastShot = 0;
  }

  enemies = [];
  const count = ENEMY_COUNTS[levelIdx];
  for (let i = 0; i < count; i++) {
    const ec = ENEMY_SPAWN_COLS[i % ENEMY_SPAWN_COLS.length];
    const er = 1;
    const e = makeTank(ec, er, false);
    e.patrolDir = DIR.DOWN;
    enemies.push(e);
  }

  updateHUD();
}

// ═══════════════════════════════════════════════════════
//  SHOOTING
// ═══════════════════════════════════════════════════════
function shoot(tank) {
  const now = performance.now();
  const cooldown = tank.isPlayer ? (tank.multiShot > 0 ? 180 : SHOOT_COOLDOWN_PLAYER) : 0;
  if (now - tank.lastShot < cooldown) return;
  tank.lastShot = now;

  const bx = tank.x + DX[tank.dir] * (TILE / 2 + 2);
  const by = tank.y + DY[tank.dir] * (TILE / 2 + 2);

  if (tank.isPlayer && tank.multiShot > 0) {
    // 3-way shot (only forward 3 bullets slightly spread — for canvas they'll travel same dir since grid)
    bullets.push(makeBullet(bx, by, tank.dir, true));
    // side bullets offset slightly
    const ox = DY[tank.dir] * 6;
    const oy = DX[tank.dir] * 6;
    bullets.push(makeBullet(bx + ox, by + oy, tank.dir, true));
    bullets.push(makeBullet(bx - ox, by - oy, tank.dir, true));
  } else {
    bullets.push(makeBullet(bx, by, tank.dir, tank.isPlayer));
  }
}

// ═══════════════════════════════════════════════════════
//  COLLISION HELPERS
// ═══════════════════════════════════════════════════════
const TANK_HALF = TILE * 0.42;
const BULLET_R  = 4;

function tankAABB(t) {
  return { l: t.x - TANK_HALF, r: t.x + TANK_HALF, t: t.y - TANK_HALF, b: t.y + TANK_HALF };
}

function bulletHitsTank(bul, tank) {
  const a = tankAABB(tank);
  return bul.x >= a.l && bul.x <= a.r && bul.y >= a.t && bul.y <= a.b;
}

// Check if a tank rect (cx, cy) can move to (nx, ny)
function canMoveTo(nx, ny) {
  const half = TANK_HALF;
  const corners = [
    [nx - half, ny - half],
    [nx + half, ny - half],
    [nx + half, ny + half],
    [nx - half, ny + half],
  ];
  for (const [cx2, cy2] of corners) {
    const c = Math.floor(cx2 / TILE);
    const r = Math.floor(cy2 / TILE);
    const t = tileAt(c, r);
    if (t === BRICK || t === STEEL) return false;
  }
  // check other tanks
  return true;
}

function canMoveToNotHitTanks(nx, ny, self) {
  if (!canMoveTo(nx, ny)) return false;
  const half = TANK_HALF;
  const all = [player, ...enemies];
  for (const other of all) {
    if (other === self || !other) continue;
    const dx = Math.abs(other.x - nx);
    const dy = Math.abs(other.y - ny);
    if (dx < TANK_HALF * 1.9 && dy < TANK_HALF * 1.9) return false;
  }
  return true;
}

// ═══════════════════════════════════════════════════════
//  EXPLOSIONS
// ═══════════════════════════════════════════════════════
function explode(x, y, big) {
  const count = big ? 22 : 12;
  const colors = ['#ff6600', '#ff9900', '#ffcc00', '#ff3300', '#ffffff'];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = big ? randBetween(1.5, 4.5) : randBetween(1, 3);
    const color = colors[Math.floor(Math.random() * colors.length)];
    particles.push(makeParticle(
      x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      color,
      big ? randBetween(0.4, 0.9) : randBetween(0.3, 0.7),
      big ? randBetween(2, 5) : randBetween(1.5, 3.5)
    ));
  }
  // shockwave ring stored as a particle with size=0 meaning it's ring
  particles.push({ x, y, vx: 0, vy: 0, color: '#ff6600', life: 0.5, maxLife: 0.5, size: big ? 36 : 22, type: 'ring', active: true });
}

// ═══════════════════════════════════════════════════════
//  POWERUP SPAWN
// ═══════════════════════════════════════════════════════
function trySpawnPowerup() {
  if (powerups.length >= 2) return;
  if (Math.random() > 0.25) return;
  // find empty tile not near player
  let attempts = 20;
  while (attempts-- > 0) {
    const c = randInt(2, COLS - 3);
    const r = randInt(2, ROWS - 3);
    if (tileAt(c, r) !== EMPTY) continue;
    const px2 = c * TILE + TILE / 2;
    const py2 = r * TILE + TILE / 2;
    if (distSq({ x: px2, y: py2 }, player) < (TILE * 3) ** 2) continue;
    powerups.push(makePowerup(c, r));
    break;
  }
}

// ═══════════════════════════════════════════════════════
//  PLAYER UPDATE
// ═══════════════════════════════════════════════════════
function updatePlayer(dt) {
  const p = player;
  if (!p) return;

  // timers
  if (p.invincible > 0) p.invincible -= dt;
  if (p.shield > 0) { p.shield -= dt; p.shieldAngle += dt * 0.004; }
  if (p.boost > 0) p.boost -= dt;
  if (p.multiShot > 0) p.multiShot -= dt;

  const speed = (p.boost > 0 ? PLAYER_SPEED * 1.7 : PLAYER_SPEED) * (dt / 16.67);

  const up    = keys['ArrowUp']    || keys['KeyW'] || touchDirs.up;
  const down  = keys['ArrowDown']  || keys['KeyS'] || touchDirs.down;
  const left  = keys['ArrowLeft']  || keys['KeyA'] || touchDirs.left;
  const right = keys['ArrowRight'] || keys['KeyD'] || touchDirs.right;
  const fire  = keys['Space'] || touchDirs.fire;

  let moved = false;

  if (up)    { p.dir = DIR.UP;    const ny = p.y - speed; if (canMoveToNotHitTanks(p.x, ny, p)) { p.y = ny; moved = true; } }
  if (down)  { p.dir = DIR.DOWN;  const ny = p.y + speed; if (canMoveToNotHitTanks(p.x, ny, p)) { p.y = ny; moved = true; } }
  if (left)  { p.dir = DIR.LEFT;  const nx = p.x - speed; if (canMoveToNotHitTanks(nx, p.y, p)) { p.x = nx; moved = true; } }
  if (right) { p.dir = DIR.RIGHT; const nx = p.x + speed; if (canMoveToNotHitTanks(nx, p.y, p)) { p.x = nx; moved = true; } }

  // clamp
  p.x = clamp(p.x, TILE + TANK_HALF, (COLS - 1) * TILE - TANK_HALF);
  p.y = clamp(p.y, TILE + TANK_HALF, (ROWS - 1) * TILE - TANK_HALF);

  if (fire) shoot(p);

  p.moving = moved;

  // collect powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    if (distSq(p, pu) < (TILE * 0.9) ** 2) {
      applyPowerup(p, pu.type);
      powerups.splice(i, 1);
      score += 50;
    }
  }
}

function applyPowerup(tank, type) {
  if (type === 'shield')    tank.shield    = POWERUP_DURATION;
  if (type === 'boost')     tank.boost     = POWERUP_DURATION;
  if (type === 'multishot') tank.multiShot = POWERUP_DURATION;
  spawnPickupParticles(tank.x, tank.y, type);
}

function spawnPickupParticles(x, y, type) {
  const color = type === 'shield' ? '#00cfff' : type === 'boost' ? '#ffdd00' : '#ff44ff';
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = randBetween(1, 3);
    particles.push(makeParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, color, 0.5, 3));
  }
}

// ═══════════════════════════════════════════════════════
//  ENEMY AI UPDATE
// ═══════════════════════════════════════════════════════
function updateEnemy(e, dt, now) {
  if (!player) return;
  const speed = e.speed * (dt / 16.67);
  const ec = colOf(e.x);
  const er = rowOf(e.y);
  const pc2 = colOf(player.x);
  const pr2 = rowOf(player.y);

  // Vision check
  const dist = Math.sqrt(distSq(e, player)) / TILE;
  const los = dist <= 10 && hasLOS(ec, er, pc2, pr2);

  // Bullet dodge
  e.dodgeTimer -= dt;
  if (e.dodgeTimer <= 0) {
    for (const b of bullets) {
      if (b.fromPlayer && b.active) {
        const bdx = Math.abs(b.x - e.x);
        const bdy = Math.abs(b.y - e.y);
        if (bdx < TILE * 1.5 && bdy < TILE * 1.5 && Math.random() < 0.4) {
          // dodge perpendicular
          const perpDir = (e.dir + 1) % 4;
          const nx = e.x + DX[perpDir] * TILE;
          const ny = e.y + DY[perpDir] * TILE;
          if (canMoveToNotHitTanks(nx, ny, e)) {
            e.x += DX[perpDir] * speed * 2;
            e.y += DY[perpDir] * speed * 2;
          }
          e.dodgeTimer = 300;
          break;
        }
      }
    }
  }

  if (los) {
    e.aiState = 'chase';
    e.bfsTimer = 0;
  } else if (e.aiState === 'chase' && !los) {
    e.aiState = 'patrol';
  }

  if (e.aiState === 'chase') {
    // BFS every 400ms
    e.bfsTimer -= dt;
    if (e.bfsTimer <= 0) {
      const d = bfsDir(ec, er, pc2, pr2);
      if (d !== -1) e.dir = d;
      e.bfsTimer = 400;
    }
    // move toward player
    const nx = e.x + DX[e.dir] * speed;
    const ny = e.y + DY[e.dir] * speed;
    if (canMoveToNotHitTanks(nx, ny, e)) {
      e.x = nx; e.y = ny;
    } else {
      // try to find another dir
      e.bfsTimer = 0;
    }

    // Shoot if facing player and in range
    e.nextEnemyShot -= dt;
    if (e.nextEnemyShot <= 0 && dist < 10) {
      // turn toward player
      const dc = pc2 - ec;
      const dr = pr2 - er;
      if (Math.abs(dc) > Math.abs(dr)) {
        e.dir = dc > 0 ? DIR.RIGHT : DIR.LEFT;
      } else {
        e.dir = dr > 0 ? DIR.DOWN : DIR.UP;
      }
      shoot(e);
      e.nextEnemyShot = randBetween(ENEMY_SHOOT_MIN, ENEMY_SHOOT_MAX);
    }

  } else {
    // patrol
    if (!e.patrolTarget) {
      pickPatrolTarget(e);
    }
    if (e.patrolTarget) {
      const tc = e.patrolTarget.c;
      const tr = e.patrolTarget.r;
      const cx2 = tc * TILE + TILE / 2;
      const cy2 = tr * TILE + TILE / 2;
      const dx2 = cx2 - e.x;
      const dy2 = cy2 - e.y;
      const dLen = Math.sqrt(dx2 * dx2 + dy2 * dy2);
      if (dLen < speed + 1) {
        e.x = cx2; e.y = cy2;
        e.patrolTarget = null;
      } else {
        if (Math.abs(dx2) > Math.abs(dy2)) {
          e.dir = dx2 > 0 ? DIR.RIGHT : DIR.LEFT;
        } else {
          e.dir = dy2 > 0 ? DIR.DOWN : DIR.UP;
        }
        const nx = e.x + DX[e.dir] * speed;
        const ny = e.y + DY[e.dir] * speed;
        if (canMoveToNotHitTanks(nx, ny, e)) {
          e.x = nx; e.y = ny;
        } else {
          e.patrolTarget = null;
        }
      }
    }

    // random shoot while patrolling
    e.nextEnemyShot -= dt;
    if (e.nextEnemyShot <= 0) {
      shoot(e);
      e.nextEnemyShot = randBetween(ENEMY_SHOOT_MIN * 1.5, ENEMY_SHOOT_MAX * 2);
    }
  }

  e.x = clamp(e.x, TILE + TANK_HALF, (COLS - 1) * TILE - TANK_HALF);
  e.y = clamp(e.y, TILE + TANK_HALF, (ROWS - 1) * TILE - TANK_HALF);
}

function pickPatrolTarget(e) {
  for (let attempts = 0; attempts < 20; attempts++) {
    const c = randInt(1, COLS - 2);
    const r = randInt(1, ROWS - 2);
    if (tileAt(c, r) === EMPTY) {
      e.patrolTarget = { c, r };
      return;
    }
  }
}

// ═══════════════════════════════════════════════════════
//  BULLET UPDATE
// ═══════════════════════════════════════════════════════
function updateBullets(dt) {
  const spd = BULLET_SPEED * (dt / 16.67);

  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (!b.active) { bullets.splice(i, 1); continue; }

    // tail
    b.tail.push({ x: b.x, y: b.y });
    if (b.tail.length > 6) b.tail.shift();

    b.x += DX[b.dir] * spd;
    b.y += DY[b.dir] * spd;

    // Wall collision
    const bc = Math.floor(b.x / TILE);
    const br = Math.floor(b.y / TILE);
    const tile = tileAt(bc, br);

    if (tile === BRICK || tile === STEEL || bc < 0 || bc >= COLS || br < 0 || br >= ROWS) {
      if (tile === BRICK && bc >= 0 && bc < COLS && br >= 0 && br < ROWS) {
        // destroy brick
        map[br][bc] = EMPTY;
        explode(bc * TILE + TILE / 2, br * TILE + TILE / 2, false);
        score += 5;
        updateHUD();
      }

      if (!b.bounced && tile !== STEEL && tile !== BRICK) {
        // bounce off border: invert direction
        b.bounced = true;
        b.dir = (b.dir + 2) % 4;
        b.x += DX[b.dir] * spd * 2;
        b.y += DY[b.dir] * spd * 2;
      } else if (!b.bounced && (tile === BRICK || tile === STEEL)) {
        // bullet hits wall — check if should bounce
        if (tile === STEEL) {
          b.bounced = true;
          b.dir = (b.dir + 2) % 4;
          b.x += DX[b.dir] * spd * 2;
          b.y += DY[b.dir] * spd * 2;
        } else {
          // brick destroyed, bullet also destroyed
          b.active = false;
          bullets.splice(i, 1);
          continue;
        }
      } else {
        b.active = false;
        bullets.splice(i, 1);
        continue;
      }
    }

    // Tank collision
    let hitSomething = false;

    // Check player
    if (!b.fromPlayer && player) {
      if (bulletHitsTank(b, player)) {
        if (player.shield <= 0 && player.invincible <= 0) {
          hitSomething = true;
          b.active = false;
          explode(b.x, b.y, true);
          playerHit();
        } else if (player.shield > 0) {
          hitSomething = true;
          b.active = false;
          explode(b.x, b.y, false);
          spawnPickupParticles(player.x, player.y, 'shield');
        }
      }
    }

    // Check enemies
    if (!hitSomething && b.fromPlayer) {
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (bulletHitsTank(b, e)) {
          hitSomething = true;
          b.active = false;
          explode(e.x, e.y, true);
          enemies.splice(j, 1);
          score += 100;
          updateHUD();
          trySpawnPowerup();
          break;
        }
      }
    }

    // Friendly fire: enemy bullet hits another enemy
    if (!hitSomething && !b.fromPlayer) {
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (bulletHitsTank(b, e)) {
          b.active = false;
          hitSomething = true;
          explode(e.x, e.y, false);
          break;
        }
      }
    }

    if (hitSomething) { bullets.splice(i, 1); }
  }
}

function playerHit() {
  lives--;
  player.invincible = INVINCIBLE_DURATION;
  explode(player.x, player.y, true);
  updateHUD();
  if (lives <= 0) {
    gameState = 'gameover';
    showOverlay('游戏结束', '分数：' + score + (score > bestScore ? '\n新纪录！' : ''), '再来一次', true);
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('tank_best', bestScore);
    }
  }
}

// ═══════════════════════════════════════════════════════
//  POWERUP UPDATE
// ═══════════════════════════════════════════════════════
function updatePowerups(dt) {
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.life -= dt;
    pu.anim += dt * 0.003;
    if (pu.life <= 0) powerups.splice(i, 1);
  }
}

// ═══════════════════════════════════════════════════════
//  PARTICLES UPDATE
// ═══════════════════════════════════════════════════════
function updateParticles(dt) {
  const dtSec = dt / 1000;
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dtSec;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06; // gravity
    p.vx *= 0.97;
    p.vy *= 0.97;
  }
}

// ═══════════════════════════════════════════════════════
//  HUD UPDATE
// ═══════════════════════════════════════════════════════
function updateHUD() {
  const s = score;
  const l = currentLevel + 1;
  const e = enemies.length;
  const lv = lives;

  // desktop
  const sv = document.getElementById('score-val');
  const bv = document.getElementById('best-val');
  const lev = document.getElementById('level-val');
  const ev = document.getElementById('enemies-val');
  const ld = document.getElementById('lives-dots');
  const best2 = Math.max(s, bestScore);

  if (sv) sv.textContent = s;
  if (bv) bv.textContent = best2;
  if (lev) lev.textContent = l;
  if (ev) ev.textContent = e;
  if (ld) {
    ld.innerHTML = '';
    for (let i = 0; i < MAX_LIVES; i++) {
      const dot = document.createElement('div');
      dot.className = 'life-dot' + (i >= lv ? ' lost' : '');
      ld.appendChild(dot);
    }
  }

  // mobile
  const ms = document.getElementById('m-score');
  const ml = document.getElementById('m-level');
  const mli = document.getElementById('m-lives');
  const me = document.getElementById('m-enemies');
  if (ms) ms.textContent = s;
  if (ml) ml.textContent = l;
  if (mli) mli.textContent = lv;
  if (me) me.textContent = e;
}

// ═══════════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════════
function drawMap() {
  // Ground grid
  ctx.fillStyle = '#0d120d';
  ctx.fillRect(0, 0, W, H);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * TILE;
      const y = r * TILE;
      const t = map[r][c];

      if (t === EMPTY || t === SPAWN) {
        // subtle grid
        ctx.fillStyle = (r + c) % 2 === 0 ? '#0c110c' : '#0e140e';
        ctx.fillRect(x, y, TILE, TILE);
      } else if (t === BRICK) {
        drawBrick(x, y);
      } else if (t === STEEL) {
        drawSteel(x, y);
      }
    }
  }
}

function drawBrick(x, y) {
  ctx.fillStyle = '#7a3a18';
  ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);

  // mortar
  ctx.fillStyle = '#5a2a10';
  ctx.fillRect(x + 1, y + TILE / 2 - 1, TILE - 2, 2);
  ctx.fillRect(x + TILE / 2 - 1, y + 1, 2, TILE / 2 - 2);
  ctx.fillRect(x + TILE / 4 - 1, y + TILE / 2 + 1, 2, TILE / 2 - 2);
  ctx.fillRect(x + TILE * 3 / 4 - 1, y + TILE / 2 + 1, 2, TILE / 2 - 2);

  // highlight
  ctx.fillStyle = '#c86030';
  ctx.fillRect(x + 2, y + 2, TILE / 2 - 3, TILE / 2 - 3);
  ctx.fillRect(x + TILE / 2 + 2, y + TILE / 2 + 2, TILE / 2 - 4, TILE / 2 - 4);
}

function drawSteel(x, y) {
  ctx.fillStyle = '#3a4a55';
  ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);

  // metallic sheen
  const grad = ctx.createLinearGradient(x, y, x + TILE, y + TILE);
  grad.addColorStop(0, 'rgba(100,140,160,0.3)');
  grad.addColorStop(0.5, 'rgba(60,80,100,0)');
  grad.addColorStop(1, 'rgba(20,30,40,0.3)');
  ctx.fillStyle = grad;
  ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);

  // cross rivets
  ctx.fillStyle = '#2a3a45';
  ctx.fillRect(x + 4, y + 4, 4, 4);
  ctx.fillRect(x + TILE - 8, y + 4, 4, 4);
  ctx.fillRect(x + 4, y + TILE - 8, 4, 4);
  ctx.fillRect(x + TILE - 8, y + TILE - 8, 4, 4);

  ctx.fillStyle = '#6a8a9a';
  ctx.fillRect(x + 5, y + 5, 2, 2);
  ctx.fillRect(x + TILE - 7, y + 5, 2, 2);
}

function drawTank(t, color) {
  const { x, y, dir, invincible } = t;
  const now = performance.now();

  // invincibility flicker
  if (invincible > 0 && Math.floor(now / 100) % 2 === 0) return;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(dir * Math.PI / 2);

  const h = TANK_HALF * 0.92;

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(2, 3, h * 0.9, h * 0.6, 0, 0, Math.PI * 2);
  ctx.fill();

  // body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(-h * 0.85, -h * 0.75, h * 1.7, h * 1.5, 3);
  ctx.fill();

  // tracks
  ctx.fillStyle = adjustBrightness(color, -50);
  ctx.fillRect(-h * 0.85, -h * 0.85, h * 0.28, h * 1.7);
  ctx.fillRect( h * 0.57, -h * 0.85, h * 0.28, h * 1.7);

  // track lines
  ctx.strokeStyle = adjustBrightness(color, -80);
  ctx.lineWidth = 1;
  for (let i = -3; i <= 3; i++) {
    const ty = i * h * 0.28;
    ctx.beginPath();
    ctx.moveTo(-h * 0.85, ty);
    ctx.lineTo(-h * 0.57, ty);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(h * 0.57, ty);
    ctx.lineTo(h * 0.85, ty);
    ctx.stroke();
  }

  // turret
  ctx.fillStyle = adjustBrightness(color, 20);
  ctx.beginPath();
  ctx.arc(0, 0, h * 0.42, 0, Math.PI * 2);
  ctx.fill();

  // barrel (pointing up = dir 0)
  ctx.fillStyle = adjustBrightness(color, 10);
  ctx.fillRect(-h * 0.1, -h * 0.9, h * 0.2, h * 0.7);

  // barrel tip glow
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.arc(0, -h * 0.9, h * 0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.restore();

  // Shield ring
  if (t.shield > 0) {
    const fade = t.shield < 1000 ? t.shield / 1000 : 1;
    ctx.save();
    ctx.globalAlpha = fade * 0.6;
    ctx.strokeStyle = '#00cfff';
    ctx.lineWidth = 2;
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#00cfff';

    for (let ring = 0; ring < 2; ring++) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(t.shieldAngle + ring * Math.PI);
      ctx.beginPath();
      ctx.arc(0, 0, h * 1.4 + ring * 3, 0, Math.PI * 1.5);
      ctx.stroke();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function adjustBrightness(hex, amount) {
  // hex like '#39ff14'
  let r = parseInt(hex.slice(1, 3), 16);
  let g = parseInt(hex.slice(3, 5), 16);
  let b = parseInt(hex.slice(5, 7), 16);
  r = clamp(r + amount, 0, 255);
  g = clamp(g + amount, 0, 255);
  b = clamp(b + amount, 0, 255);
  return '#' + r.toString(16).padStart(2, '0') + g.toString(16).padStart(2, '0') + b.toString(16).padStart(2, '0');
}

function drawBullets() {
  for (const b of bullets) {
    // tail
    const tailLen = b.tail.length;
    for (let i = 0; i < tailLen; i++) {
      const a = (i + 1) / (tailLen + 1);
      const tp = b.tail[i];
      ctx.globalAlpha = a * 0.5;
      ctx.fillStyle = b.fromPlayer ? '#39ff14' : '#ff6600';
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, BULLET_R * a * 0.7, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // main bullet
    ctx.fillStyle = b.fromPlayer ? '#ccffaa' : '#ffcc66';
    ctx.shadowBlur = 8;
    ctx.shadowColor = b.fromPlayer ? '#39ff14' : '#ff6600';
    ctx.beginPath();
    ctx.arc(b.x, b.y, BULLET_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawParticles() {
  for (const p of particles) {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;

    if (p.type === 'ring') {
      const radius = p.size * (1 - a) * 2 + p.size * 0.3;
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2 * a;
      ctx.shadowBlur = 10;
      ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 4;
      ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
  ctx.globalAlpha = 1;
}

function drawPowerups() {
  const now = performance.now() * 0.001;
  for (const pu of powerups) {
    const color = pu.type === 'shield' ? '#00cfff' : pu.type === 'boost' ? '#ffdd00' : '#ff44ff';
    const pulse = 0.85 + 0.15 * Math.sin(now * 4 + pu.anim);
    const r = TILE * 0.3 * pulse;

    // glow
    ctx.shadowBlur = 16;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.arc(pu.x, pu.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    // icon
    ctx.fillStyle = '#000';
    ctx.font = `bold ${Math.round(r * 1.2)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const icon = pu.type === 'shield' ? 'S' : pu.type === 'boost' ? 'B' : 'M';
    ctx.fillText(icon, pu.x, pu.y);
  }
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
}

function drawHUDCanvas() {
  // Minimal in-canvas overlay for boost/shield timers
  if (!player) return;
  const indicators = [];
  if (player.shield > 0)    indicators.push({ label: '护盾', t: player.shield, color: '#00cfff' });
  if (player.boost > 0)     indicators.push({ label: '加速', t: player.boost,  color: '#ffdd00' });
  if (player.multiShot > 0) indicators.push({ label: '多重', t: player.multiShot, color: '#ff44ff' });

  indicators.forEach((ind, i) => {
    const barW = 60;
    const x = 4;
    const y = H - 14 - i * 18;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x, y, barW + 36, 13);
    ctx.fillStyle = ind.color;
    ctx.fillRect(x + 1, y + 1, (barW - 2) * (ind.t / POWERUP_DURATION), 11);
    ctx.fillStyle = '#fff';
    ctx.font = '9px monospace';
    ctx.fillText(ind.label, x + barW + 3, y + 10);
  });
}

// ═══════════════════════════════════════════════════════
//  MAIN GAME LOOP
// ═══════════════════════════════════════════════════════
function gameLoop(ts) {
  requestAnimationFrame(gameLoop);

  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  frameCount++;

  if (gameState !== 'playing') return;

  ctx.clearRect(0, 0, W, H);

  // Update
  updatePlayer(dt);
  const now = performance.now();
  for (const e of enemies) updateEnemy(e, dt, now);
  updateBullets(dt);
  updateParticles(dt);
  updatePowerups(dt);

  // Draw
  drawMap();
  drawPowerups();
  drawBullets();
  if (player) drawTank(player, '#39ff14');
  for (const e of enemies) drawTank(e, '#cc2222');
  drawParticles();
  drawHUDCanvas();

  // Check win condition
  if (enemies.length === 0 && gameState === 'playing') {
    if (currentLevel < LEVELS.length - 1) {
      gameState = 'levelclear';
      showOverlay('关卡完成！', '第 ' + (currentLevel + 1) + ' 关通过！\n得分：' + score, '下一关', false);
    } else {
      gameState = 'gameover';
      showOverlay('通关胜利！', '全部5关通关！\n最终得分：' + score, '重新开始', false);
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('tank_best', bestScore);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════
function setupInput() {
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') e.preventDefault();
    if (e.code === 'KeyP' && gameState === 'playing') {
      gameState = 'paused';
      showOverlay('已暂停', '按 P 继续', '继续游戏', false);
    } else if (e.code === 'KeyP' && gameState === 'paused') {
      gameState = 'playing';
      hideOverlay();
    }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  });

  document.addEventListener('keyup', e => {
    keys[e.code] = false;
  });

  // Virtual pad
  function bindPad(id, dir) {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.addEventListener('touchstart', ev => { ev.preventDefault(); touchDirs[dir] = true; }, { passive: false });
    btn.addEventListener('touchend',   ev => { ev.preventDefault(); touchDirs[dir] = false; }, { passive: false });
    btn.addEventListener('mousedown',  () => touchDirs[dir] = true);
    btn.addEventListener('mouseup',    () => touchDirs[dir] = false);
    btn.addEventListener('mouseleave', () => touchDirs[dir] = false);
  }

  bindPad('btn-up',    'up');
  bindPad('btn-down',  'down');
  bindPad('btn-left',  'left');
  bindPad('btn-right', 'right');

  const fireBtn = document.getElementById('fire-btn');
  if (fireBtn) {
    fireBtn.addEventListener('touchstart', ev => { ev.preventDefault(); touchDirs.fire = true; }, { passive: false });
    fireBtn.addEventListener('touchend',   ev => { ev.preventDefault(); touchDirs.fire = false; setTimeout(() => { touchDirs.fire = false; }, 50); }, { passive: false });
    fireBtn.addEventListener('mousedown',  () => touchDirs.fire = true);
    fireBtn.addEventListener('mouseup',    () => touchDirs.fire = false);
  }

  // Overlay button
  document.getElementById('overlay-btn').addEventListener('click', handleOverlayBtn);
}

function handleOverlayBtn() {
  if (gameState === 'menu') {
    startGame();
  } else if (gameState === 'levelclear') {
    currentLevel++;
    initLevel(currentLevel);
    hideOverlay();
    gameState = 'playing';
  } else if (gameState === 'gameover') {
    resetGame();
  } else if (gameState === 'paused') {
    hideOverlay();
    gameState = 'playing';
  }
}

function startGame() {
  score = 0;
  lives = MAX_LIVES;
  currentLevel = 0;
  player = null;
  initLevel(currentLevel);
  hideOverlay();
  gameState = 'playing';
  updateHUD();
}

function resetGame() {
  score = 0;
  lives = MAX_LIVES;
  currentLevel = 0;
  player = null;
  initLevel(currentLevel);
  hideOverlay();
  gameState = 'playing';
  updateHUD();
}

// ═══════════════════════════════════════════════════════
//  CANVAS RESIZE (mobile)
// ═══════════════════════════════════════════════════════
function handleResize() {
  if (window.innerWidth <= 650) {
    const maxW = Math.min(window.innerWidth, 480);
    canvas.style.width  = maxW + 'px';
    canvas.style.height = maxW + 'px';
  } else {
    canvas.style.width  = '560px';
    canvas.style.height = '560px';
  }
}

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');

  bestScore = parseInt(localStorage.getItem('tank_best') || '0');
  document.getElementById('best-val').textContent = bestScore;

  setupInput();
  handleResize();
  window.addEventListener('resize', handleResize);

  // Show start screen
  showOverlay('坦克大战', '消灭所有敌方坦克\n子弹碰钢铁可反弹一次', '开始游戏', false);

  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// CanvasRenderingContext2D.roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    this.beginPath();
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
  };
}
