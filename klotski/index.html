<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #07080f;
  --panel: #0d1021;
  --border: #1e2240;
  --accent: #ff8c00;
  --accent2: #ffd700;
  --text: #c8d0e8;
  --dim: #5a6080;
  --glow: rgba(255,140,0,0.35);
  --cell: 72px;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
}

#app {
  display: flex;
  width: 100%; height: 100%;
  align-items: center;
  justify-content: center;
  gap: 24px;
}

/* ── Side Panels ── */
.side-panel {
  width: 170px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex-shrink: 0;
}

.panel-title {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  text-align: center;
  margin-bottom: 4px;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.stat-label { font-size: 12px; color: var(--dim); }
.stat-val { font-size: 18px; font-weight: 700; color: var(--accent2); font-variant-numeric: tabular-nums; }

.divider { border: none; border-top: 1px solid var(--border); margin: 2px 0; }

.big-btn {
  width: 100%; padding: 10px 0;
  background: linear-gradient(135deg, #a05000, #ff8c00);
  border: none; border-radius: 8px;
  color: #fff; font-size: 14px; font-weight: 700;
  cursor: pointer; letter-spacing: 1px;
  transition: filter .15s;
}
.big-btn:hover { filter: brightness(1.2); }
.big-btn.secondary {
  background: linear-gradient(135deg, #1a1e35, #2a2e4a);
  color: var(--text);
}
.big-btn:disabled { opacity: .4; cursor: not-allowed; }

.level-select {
  display: flex; flex-direction: column; gap: 5px;
}
.level-btn {
  padding: 6px 8px;
  background: #1a1e35;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text); font-size: 12px;
  cursor: pointer; text-align: left;
  transition: background .15s, border-color .15s;
}
.level-btn:hover { background: #252a45; }
.level-btn.active { background: #2a1800; border-color: var(--accent); color: var(--accent); }

.hint-text {
  font-size: 11px; color: var(--dim);
  line-height: 1.5;
}

/* ── Board Area ── */
#board-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

#game-title {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 4px;
  background: linear-gradient(90deg, #ff8c00, #ffd700, #ff8c00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
}

#board-container {
  position: relative;
}

#board {
  position: relative;
  background: #0a0c18;
  border: 2px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 0 30px rgba(255,140,0,0.15);
  /* size set by JS */
}

/* Exit indicator */
#exit-indicator {
  position: absolute;
  bottom: -28px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.exit-label {
  font-size: 11px; letter-spacing: 2px; color: var(--accent);
  text-transform: uppercase;
}
.exit-arrow {
  font-size: 18px; color: var(--accent);
  animation: bounce 1s ease-in-out infinite;
}
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(4px); }
}

/* ── Pieces ── */
.piece {
  position: absolute;
  border-radius: 8px;
  cursor: grab;
  user-select: none;
  transition: box-shadow .1s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  letter-spacing: 1px;
  border: 2px solid transparent;
}
.piece:active { cursor: grabbing; }
.piece.dragging {
  z-index: 100;
  box-shadow: 0 0 20px 4px rgba(255,200,0,0.5) !important;
  cursor: grabbing;
}

/* Piece types */
.piece.caocao {
  background: linear-gradient(135deg, #8b0000, #cc2200);
  border-color: #ff4422;
  box-shadow: 0 0 14px rgba(204,34,0,0.4);
  color: #ffdddd;
  font-size: 22px;
}
.piece.hv { /* horizontal or vertical 1x2 / 2x1 */
  background: linear-gradient(135deg, #003366, #0055aa);
  border-color: #2277cc;
  box-shadow: 0 0 10px rgba(0,85,170,0.35);
  color: #aaddff;
  font-size: 16px;
}
.piece.small { /* 1x1 */
  background: linear-gradient(135deg, #1a3a1a, #2a6a2a);
  border-color: #44aa44;
  box-shadow: 0 0 8px rgba(68,170,68,0.3);
  color: #aaffaa;
  font-size: 14px;
}

.piece-label {
  text-align: center;
  line-height: 1.2;
  pointer-events: none;
}

/* ── Overlays ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(4,6,14,.92);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
}
.overlay.hidden { display: none; }

.overlay-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 40px;
  text-align: center;
  max-width: 340px;
  width: 90%;
}
.overlay-title {
  font-size: 28px; font-weight: 900;
  background: linear-gradient(90deg, #ff8c00, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}
.overlay-sub { font-size: 15px; color: var(--dim); margin-bottom: 20px; line-height: 1.6; }
.overlay-stat { font-size: 20px; color: var(--accent2); font-weight: 700; margin-bottom: 24px; }
.overlay-btns { display: flex; flex-direction: column; gap: 10px; }
.overlay-btns .big-btn { max-width: 100%; }

/* ── Mobile ── */
@media (max-width: 699px) {
  #app { flex-direction: column; gap: 0; overflow-y: auto; padding: 8px; }
  .side-panel { width: 100%; flex-direction: row; flex-wrap: wrap; border-radius: 8px; padding: 8px 10px; gap: 6px; }
  .panel-title { display: none; }
  .stat-row { gap: 4px; }
  .stat-label { font-size: 11px; }
  .stat-val { font-size: 15px; }
  .level-select { flex-direction: row; flex-wrap: wrap; }
  .level-btn { font-size: 10px; padding: 4px 6px; }
  #right-panel { order: 3; }
  #board-wrap { order: 2; }
  #game-title { font-size: 18px; }
  :root { --cell: 60px; }
}

@media (max-width: 480px) {
  :root { --cell: 52px; }
}

/* Solving animation */
.solving-flash {
  animation: sflash .4s ease;
}
@keyframes sflash {
  0%,100% { filter: brightness(1); }
  50% { filter: brightness(1.8); }
}

// ══════════════════════════════════════════

// Goal: move caocao (id=0) to x=1, y=3
// ══════════════════════════════════════════

// ── Puzzle definitions ──
// Each puzzle: array of piece configs
const PUZZLES = [
  {
    name: '横刀立马',

    minMoves: 81,
    pieces: [
      { id:0, label:'曹操', type:'caocao', x:1, y:0, w:2, h:2 },
      { id:1, label:'关羽', type:'h',      x:1, y:2, w:2, h:1 },
      { id:2, label:'张飞', type:'v',      x:0, y:0, w:1, h:2 },
      { id:3, label:'赵云', type:'v',      x:3, y:0, w:1, h:2 },
      { id:4, label:'马超', type:'v',      x:0, y:2, w:1, h:2 },
      { id:5, label:'黄忠', type:'v',      x:3, y:2, w:1, h:2 },
      { id:6, label:'兵甲', type:'s',      x:1, y:3, w:1, h:1 },
      { id:7, label:'兵乙', type:'s',      x:2, y:3, w:1, h:1 },
      { id:8, label:'兵丙', type:'s',      x:1, y:4, w:1, h:1 },
      { id:9, label:'兵丁', type:'s',      x:2, y:4, w:1, h:1 },
    ]
  },
  {
    name: '指挥若定',
    desc: '进阶挑战',
    minMoves: 70,
    pieces: [
      { id:0, label:'曹操', type:'caocao', x:1, y:0, w:2, h:2 },
      { id:1, label:'关羽', type:'h',      x:1, y:2, w:2, h:1 },
      { id:2, label:'张飞', type:'v',      x:0, y:0, w:1, h:2 },
      { id:3, label:'赵云', type:'v',      x:3, y:0, w:1, h:2 },
      { id:4, label:'马超', type:'v',      x:0, y:3, w:1, h:2 },
      { id:5, label:'黄忠', type:'v',      x:3, y:3, w:1, h:2 },
      { id:6, label:'兵甲', type:'s',      x:1, y:3, w:1, h:1 },
      { id:7, label:'兵乙', type:'s',      x:2, y:3, w:1, h:1 },
      { id:8, label:'兵丙', type:'s',      x:0, y:2, w:1, h:1 },
      { id:9, label:'兵丁', type:'s',      x:3, y:2, w:1, h:1 },
    ]
  },
  {
    name: '近在咫尺',
    desc: '步步为营',
    minMoves: 90,
    pieces: [
      { id:0, label:'曹操', type:'caocao', x:1, y:0, w:2, h:2 },
      { id:1, label:'关羽', type:'h',      x:0, y:4, w:2, h:1 },
      { id:2, label:'张飞', type:'v',      x:0, y:0, w:1, h:2 },
      { id:3, label:'赵云', type:'v',      x:3, y:0, w:1, h:2 },
      { id:4, label:'马超', type:'v',      x:0, y:2, w:1, h:2 },
      { id:5, label:'黄忠', type:'v',      x:3, y:2, w:1, h:2 },
      { id:6, label:'兵甲', type:'s',      x:1, y:2, w:1, h:1 },
      { id:7, label:'兵乙', type:'s',      x:2, y:2, w:1, h:1 },
      { id:8, label:'兵丙', type:'s',      x:1, y:3, w:1, h:1 },
      { id:9, label:'兵丁', type:'s',      x:2, y:3, w:1, h:1 },
      { id:10,label:'兵戊', type:'s',      x:2, y:4, w:1, h:1 },
    ]
  },
  {
    name: '兵分三路',
    desc: '高手关卡',
    minMoves: 120,
    pieces: [
      { id:0, label:'曹操', type:'caocao', x:1, y:0, w:2, h:2 },
      { id:1, label:'关羽', type:'h',      x:1, y:2, w:2, h:1 },
      { id:2, label:'张飞', type:'v',      x:0, y:0, w:1, h:2 },
      { id:3, label:'赵云', type:'v',      x:3, y:0, w:1, h:2 },
      { id:4, label:'马超', type:'v',      x:0, y:2, w:1, h:2 },
      { id:5, label:'黄忠', type:'v',      x:3, y:2, w:1, h:2 },
      { id:6, label:'兵甲', type:'h',      x:0, y:4, w:2, h:1 },
      { id:7, label:'兵乙', type:'h',      x:2, y:4, w:2, h:1 },
      { id:8, label:'兵丙', type:'s',      x:1, y:3, w:1, h:1 },
      { id:9, label:'兵丁', type:'s',      x:2, y:3, w:1, h:1 },
    ]
  },
  {
    name: '华容道真局',
    desc: '传说关卡',
    minMoves: 100,
    pieces: [
      { id:0, label:'曹操', type:'caocao', x:1, y:0, w:2, h:2 },
      { id:1, label:'关羽', type:'h',      x:1, y:2, w:2, h:1 },
      { id:2, label:'张飞', type:'v',      x:0, y:0, w:1, h:2 },
      { id:3, label:'赵云', type:'v',      x:3, y:0, w:1, h:2 },
      { id:4, label:'马超', type:'v',      x:0, y:3, w:1, h:2 },
      { id:5, label:'黄忠', type:'v',      x:3, y:3, w:1, h:2 },
      { id:6, label:'兵甲', type:'s',      x:1, y:3, w:1, h:1 },
      { id:7, label:'兵乙', type:'s',      x:2, y:3, w:1, h:1 },
      { id:8, label:'兵丙', type:'s',      x:1, y:4, w:1, h:1 },
      { id:9, label:'兵丁', type:'s',      x:2, y:4, w:1, h:1 },
      { id:10,label:'兵戊', type:'s',      x:0, y:2, w:1, h:1 },
      { id:11,label:'兵己', type:'s',      x:3, y:2, w:1, h:1 },
    ]
  }
];

// ── State ──
let CELL = 72;
const COLS = 4, ROWS = 5;
const GAP = 4; // gap between pieces in px

let currentLevel = 0;
let pieces = [];
let moves = 0;
let history = []; // stack of piece states
let bestMoves = {};
let gameActive = false;

// Drag state
let dragging = null;
let dragOffX = 0, dragOffY = 0;
let dragStartPX = 0, dragStartPY = 0;
let dragStartCol = 0, dragStartRow = 0;
let dragAxis = null; // 'h' or 'v' or null (undecided)
let touchId = null;

// ── DOM ──
const board = document.getElementById('board');
const uiMoves = document.getElementById('ui-moves');
const uiBest = document.getElementById('ui-best');
const btnRestart = document.getElementById('btnRestart');
const btnUndo = document.getElementById('btnUndo');
const btnHint = document.getElementById('btnHint');
const startOverlay = document.getElementById('startOverlay');
const winOverlay = document.getElementById('winOverlay');
const levelSelect = document.getElementById('levelSelect');

// ── Init ──
function getCellSize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  if (vw <= 480) return 52;
  if (vw <= 699) return 60;
  return 72;
}

function setupBoard() {
  CELL = getCellSize();
  const W = COLS * CELL;
  const H = ROWS * CELL;
  board.style.width = W + 'px';
  board.style.height = H + 'px';
}

function buildLevelSelect() {
  levelSelect.innerHTML = '';
  PUZZLES.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'level-btn' + (i === currentLevel ? ' active' : '');
    btn.textContent = `${i+1}. ${p.name}`;
    btn.title = p.desc;
    btn.addEventListener('click', () => loadLevel(i));
    levelSelect.appendChild(btn);
  });
}

function loadLevel(idx) {
  currentLevel = idx;
  const puzzle = PUZZLES[idx];
  // Deep copy pieces
  pieces = puzzle.pieces.map(p => ({ ...p }));
  moves = 0;
  history = [];
  gameActive = true;
  updateUI();
  renderPieces();
  buildLevelSelect();
  // Update best display
  const key = `klotski_best_${idx}`;
  const best = localStorage.getItem(key);
  uiBest.textContent = best || '--';
}

function updateUI() {
  uiMoves.textContent = moves;
  btnUndo.disabled = history.length === 0;
  const key = `klotski_best_${currentLevel}`;
  const best = localStorage.getItem(key);
  uiBest.textContent = best || '--';
}

// ── Rendering ──
function piecePixel(p) {
  return {
    x: p.x * CELL + GAP,
    y: p.y * CELL + GAP,
    w: p.w * CELL - GAP * 2,
    h: p.h * CELL - GAP * 2,
  };
}

function renderPieces() {
  board.innerHTML = '';
  pieces.forEach(p => {
    const el = document.createElement('div');
    el.className = `piece ${p.type === 'caocao' ? 'caocao' : (p.w === 2 || p.h === 2 ? 'hv' : 'small')}`;
    el.dataset.id = p.id;
    const px = piecePixel(p);
    el.style.left = px.x + 'px';
    el.style.top = px.y + 'px';
    el.style.width = px.w + 'px';
    el.style.height = px.h + 'px';
    el.style.fontSize = p.type === 'caocao' ? '18px' : (p.w === 2 || p.h === 2 ? '14px' : '12px');

    // Label
    const lbl = document.createElement('div');
    lbl.className = 'piece-label';
    if (p.type === 'caocao') {
      lbl.innerHTML = '曹<br>操';
      el.style.fontSize = '20px';
    } else if (p.w === 2 && p.h === 1) {
      // horizontal — show label inline
      lbl.textContent = p.label;
    } else if (p.w === 1 && p.h === 2) {
      // vertical — split label
      lbl.innerHTML = p.label.split('').join('<br>');
    } else {
      lbl.textContent = p.label.slice(-1);
    }
    el.appendChild(lbl);

    // Drag events
    el.addEventListener('mousedown', onMouseDown);
    el.addEventListener('touchstart', onTouchStart, { passive: false });

    board.appendChild(el);
  });
}

function updatePieceEl(p) {
  const el = board.querySelector(`[data-id="${p.id}"]`);
  if (!el) return;
  const px = piecePixel(p);
  el.style.left = px.x + 'px';
  el.style.top = px.y + 'px';
}

// ── Collision / movement ──
function buildGrid(excludeId = -1) {
  const grid = Array.from({ length: ROWS }, () => new Array(COLS).fill(-1));
  pieces.forEach(p => {
    if (p.id === excludeId) return;
    for (let r = p.y; r < p.y + p.h; r++)
      for (let c = p.x; c < p.x + p.w; c++)
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) grid[r][c] = p.id;
  });
  return grid;
}

function canPlace(p, nx, ny) {
  if (nx < 0 || ny < 0 || nx + p.w > COLS || ny + p.h > ROWS) return false;
  const grid = buildGrid(p.id);
  for (let r = ny; r < ny + p.h; r++)
    for (let c = nx; c < nx + p.w; c++)
      if (grid[r][c] !== -1) return false;
  return true;
}

function movePiece(pid, nx, ny) {
  const p = pieces.find(x => x.id === pid);
  if (!p || !canPlace(p, nx, ny)) return false;
  // Save history
  history.push(pieces.map(x => ({ ...x })));
  if (history.length > 200) history.shift();
  p.x = nx;
  p.y = ny;
  moves++;
  updateUI();
  updatePieceEl(p);
  checkWin();
  return true;
}

function checkWin() {
  const caocao = pieces.find(p => p.id === 0);
  if (caocao && caocao.x === 1 && caocao.y === 3) {
    gameActive = false;
    // Save best
    const key = `klotski_best_${currentLevel}`;
    const prev = parseInt(localStorage.getItem(key)) || Infinity;
    if (moves < prev) localStorage.setItem(key, moves);
    setTimeout(showWin, 300);
  }
}

function showWin() {
  const key = `klotski_best_${currentLevel}`;
  const best = localStorage.getItem(key);
  document.getElementById('winStats').textContent = `用了 ${moves} 步 · 最少 ${best || moves} 步`;
  winOverlay.classList.remove('hidden');
  // Flash caocao
  const caocaoEl = board.querySelector('[data-id="0"]');
  if (caocaoEl) caocaoEl.classList.add('solving-flash');
}

function undoMove() {
  if (history.length === 0) return;
  pieces = history.pop();
  moves = Math.max(0, moves - 1);
  updateUI();
  renderPieces();
}

// ── Simple hint: find the move that maximally reduces distance of caocao to goal ──
function showHint() {
  if (!gameActive) return;
  const caocao = pieces.find(p => p.id === 0);
  // BFS for shortest path (simplified: just highlight a piece that can move)
  // For now: highlight pieces adjacent to empty space
  const grid = buildGrid();
  const moves_possible = [];
  pieces.forEach(p => {
    const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
    dirs.forEach(([dc, dr]) => {
      if (canPlace(p, p.x + dc, p.y + dr)) {
        moves_possible.push({ id: p.id, nx: p.x + dc, ny: p.y + dr });
      }
    });
  });
  if (moves_possible.length === 0) return;
  // Pick move that brings caocao closest to (1,3)
  let best = null, bestScore = Infinity;
  moves_possible.forEach(m => {
    const score = m.id === 0
      ? Math.abs(m.nx - 1) + Math.abs(m.ny - 3)
      : (Math.abs(caocao.x - 1) + Math.abs(caocao.y - 3));
    if (score < bestScore) { bestScore = score; best = m; }
  });
  if (!best) best = moves_possible[0];
  // Flash that piece
  const el = board.querySelector(`[data-id="${best.id}"]`);
  if (el) {
    el.classList.add('solving-flash');
    setTimeout(() => el.classList.remove('solving-flash'), 500);
  }
}

// ── Drag handling ──
function getBoardRect() {
  return board.getBoundingClientRect();
}

function getClientXY(e) {
  if (e.touches) {
    const t = e.touches[0];
    return [t.clientX, t.clientY];
  }
  return [e.clientX, e.clientY];
}

function onMouseDown(e) {
  if (!gameActive) return;
  e.preventDefault();
  startDrag(e, parseInt(e.currentTarget.dataset.id));
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function onTouchStart(e) {
  if (!gameActive) return;
  if (dragging) return;
  e.preventDefault();
  const touch = e.touches[0];
  touchId = touch.identifier;
  startDrag(e, parseInt(e.currentTarget.dataset.id));
  document.addEventListener('touchmove', onTouchMove, { passive: false });
  document.addEventListener('touchend', onTouchEnd);
}

function startDrag(e, pid) {
  const p = pieces.find(x => x.id === pid);
  if (!p) return;
  dragging = p;
  dragAxis = null;
  const rect = getBoardRect();
  const [cx, cy] = getClientXY(e);
  const px = piecePixel(p);
  dragOffX = cx - rect.left - px.x;
  dragOffY = cy - rect.top - px.y;
  dragStartPX = cx;
  dragStartPY = cy;
  dragStartCol = p.x;
  dragStartRow = p.y;
  const el = board.querySelector(`[data-id="${pid}"]`);
  if (el) el.classList.add('dragging');
}

function onMouseMove(e) { handleMove(e); }
function onTouchMove(e) {
  e.preventDefault();
  const touch = Array.from(e.touches).find(t => t.identifier === touchId);
  if (touch) handleMove(e);
}

function handleMove(e) {
  if (!dragging) return;
  const rect = getBoardRect();
  const [cx, cy] = getClientXY(e);
  const rawX = cx - rect.left - dragOffX;
  const rawY = cy - rect.top - dragOffY;

  // Determine axis
  const dx = cx - dragStartPX;
  const dy = cy - dragStartPY;
  if (!dragAxis && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
    dragAxis = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
  }

  const p = dragging;
  let targetCol = Math.round(rawX / CELL);
  let targetRow = Math.round(rawY / CELL);

  // Constrain to axis
  if (dragAxis === 'h') targetRow = dragStartRow;
  if (dragAxis === 'v') targetCol = dragStartCol;

  // Clamp
  targetCol = Math.max(0, Math.min(COLS - p.w, targetCol));
  targetRow = Math.max(0, Math.min(ROWS - p.h, targetRow));

  // Find max reachable position along axis
  if (dragAxis === 'h') {
    const dir = targetCol > dragStartCol ? 1 : -1;
    let best = dragStartCol;
    for (let c = dragStartCol + dir; dir > 0 ? c <= targetCol : c >= targetCol; c += dir) {
      if (canPlace(p, c, p.y)) best = c;
      else break;
    }
    targetCol = best;
  } else if (dragAxis === 'v') {
    const dir = targetRow > dragStartRow ? 1 : -1;
    let best = dragStartRow;
    for (let r = dragStartRow + dir; dir > 0 ? r <= targetRow : r >= targetRow; r += dir) {
      if (canPlace(p, p.x, r)) best = r;
      else break;
    }
    targetRow = best;
  } else {
    // No axis yet — show floating
    const el = board.querySelector(`[data-id="${p.id}"]`);
    if (el) {
      el.style.left = Math.max(0, Math.min(COLS*CELL - piecePixel(p).w, rawX)) + 'px';
      el.style.top = Math.max(0, Math.min(ROWS*CELL - piecePixel(p).h, rawY)) + 'px';
    }
    return;
  }

  // Move preview
  const px = piecePixel({ ...p, x: targetCol, y: targetRow });
  const el = board.querySelector(`[data-id="${p.id}"]`);
  if (el) {
    el.style.left = px.x + 'px';
    el.style.top = px.y + 'px';
  }
}

function onMouseUp(e) {
  endDrag(e);
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseup', onMouseUp);
}

function onTouchEnd(e) {
  const touch = Array.from(e.changedTouches).find(t => t.identifier === touchId);
  if (touch) endDrag(e);
  touchId = null;
  document.removeEventListener('touchmove', onTouchMove);
  document.removeEventListener('touchend', onTouchEnd);
}

function endDrag(e) {
  if (!dragging) return;
  const p = dragging;
  const el = board.querySelector(`[data-id="${p.id}"]`);
  if (el) el.classList.remove('dragging');

  const rect = getBoardRect();
  const [cx, cy] = getClientXY(e.changedTouches ? e : e);
  let rawX, rawY;
  if (e.changedTouches) {
    const touch = Array.from(e.changedTouches).find(t => t.identifier === touchId) || e.changedTouches[0];
    rawX = touch.clientX - rect.left - dragOffX;
    rawY = touch.clientY - rect.top - dragOffY;
  } else {
    rawX = e.clientX - rect.left - dragOffX;
    rawY = e.clientY - rect.top - dragOffY;
  }

  let targetCol = Math.round(rawX / CELL);
  let targetRow = Math.round(rawY / CELL);
  if (dragAxis === 'h') targetRow = dragStartRow;
  if (dragAxis === 'v') targetCol = dragStartCol;
  targetCol = Math.max(0, Math.min(COLS - p.w, targetCol));
  targetRow = Math.max(0, Math.min(ROWS - p.h, targetRow));

  // Snap to valid position
  let snapped = false;
  if (dragAxis === 'h') {
    const dir = targetCol > dragStartCol ? 1 : (targetCol < dragStartCol ? -1 : 0);
    if (dir !== 0) {
      let best = dragStartCol;
      for (let c = dragStartCol + dir; dir > 0 ? c <= targetCol : c >= targetCol; c += dir) {
        if (canPlace(p, c, p.y)) best = c;
        else break;
      }
      if (best !== dragStartCol) {
        history.push(pieces.map(x => ({ ...x })));
        if (history.length > 200) history.shift();
        p.x = best;
        moves++;
        snapped = true;
      }
    }
  } else if (dragAxis === 'v') {
    const dir = targetRow > dragStartRow ? 1 : (targetRow < dragStartRow ? -1 : 0);
    if (dir !== 0) {
      let best = dragStartRow;
      for (let r = dragStartRow + dir; dir > 0 ? r <= targetRow : r >= targetRow; r += dir) {
        if (canPlace(p, p.x, r)) best = r;
        else break;
      }
      if (best !== dragStartRow) {
        history.push(pieces.map(x => ({ ...x })));
        if (history.length > 200) history.shift();
        p.y = best;
        moves++;
        snapped = true;
      }
    }
  }

  // Snap piece back to grid position
  const finalPx = piecePixel(p);
  if (el) {
    el.style.transition = 'left .12s, top .12s';
    el.style.left = finalPx.x + 'px';
    el.style.top = finalPx.y + 'px';
    setTimeout(() => { if (el) el.style.transition = ''; }, 150);
  }

  dragging = null;
  dragAxis = null;

  if (snapped) {
    updateUI();
    checkWin();
  }
}

// ── Buttons ──
btnRestart.addEventListener('click', () => loadLevel(currentLevel));
btnUndo.addEventListener('click', () => { if (gameActive || history.length) { gameActive = true; undoMove(); } });
btnHint.addEventListener('click', showHint);

document.getElementById('startBtn').addEventListener('click', () => {
  startOverlay.classList.add('hidden');
  loadLevel(0);
});

document.getElementById('winNextBtn').addEventListener('click', () => {
  winOverlay.classList.add('hidden');
  loadLevel((currentLevel + 1) % PUZZLES.length);
});

document.getElementById('winRetryBtn').addEventListener('click', () => {
  winOverlay.classList.add('hidden');
  loadLevel(currentLevel);
});

// ── Resize ──
window.addEventListener('resize', () => {
  setupBoard();
  renderPieces();
});

// ── Start ──
setupBoard();
buildLevelSelect();
startOverlay.classList.remove('hidden');
</script>
