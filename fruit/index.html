<script>
(function() {
'use strict';

// ─── Canvas setup ────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const maxW = Math.min(window.innerWidth, 420);
  const isMobile = window.innerWidth <= 600;
  if (isMobile) {
    canvas.width = window.innerWidth;
    canvas.height = Math.min(window.innerHeight - 120, 520);
  } else {
    canvas.width = 400;
    canvas.height = 500;
  }
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ─── State ───────────────────────────────────────────────────
let state = 'idle'; // idle | playing | dead
let score = 0;
let lives = 3;
let best = parseInt(localStorage.getItem('fruitBest') || '0');
let combo = 0;
let comboTimer = 0;
let spawnTimer = 0;
let spawnInterval = 120; // frames
let gameFrame = 0;
let shakeTimer = 0;
let shakeAmt = 0;

// ─── Object pools ────────────────────────────────────────────
let fruits = [];
let halves = [];
let particles = [];
let comboTexts = [];

// ─── Trail ───────────────────────────────────────────────────
let trail = []; // {x, y, t}

// ─── Fruit definitions ───────────────────────────────────────
const FRUIT_TYPES = [
  { id: 'watermelon', points: 3, r: 28 },
  { id: 'orange',     points: 2, r: 22 },
  { id: 'apple',      points: 2, r: 22 },
  { id: 'banana',     points: 2, r: 22 },
  { id: 'grape',      points: 1, r: 18 },
  { id: 'lemon',      points: 1, r: 20 },
];

// ─── Draw fruit helpers ───────────────────────────────────────
function drawWatermelon(c, x, y, r, rot) {
  c.save(); c.translate(x, y); c.rotate(rot);
  // Green rind
  c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2);
  c.fillStyle = '#2d8c2d'; c.fill();
  // Lighter green stripes
  c.save(); c.clip();
  c.strokeStyle = '#52c952'; c.lineWidth = 3;
  for (let i = -r; i < r; i += 9) {
    c.beginPath(); c.moveTo(i, -r); c.lineTo(i, r); c.stroke();
  }
  c.restore();
  // Red flesh inner circle
  c.beginPath(); c.arc(0, 0, r * 0.72, 0, Math.PI*2);
  c.fillStyle = '#e8253a'; c.fill();
  // Seeds
  c.fillStyle = '#1a0a00';
  const seeds = [[0,-r*0.35],[r*0.25,-r*0.1],[-r*0.25,-r*0.1],[r*0.15,r*0.25],[-r*0.15,r*0.25]];
  for (const [sx,sy] of seeds) {
    c.beginPath(); c.ellipse(sx, sy, 2.5, 4, 0.3, 0, Math.PI*2); c.fill();
  }
  c.restore();
}

function drawOrange(c, x, y, r, rot) {
  c.save(); c.translate(x, y); c.rotate(rot);
  const g = c.createRadialGradient(-r*0.25, -r*0.25, r*0.1, 0, 0, r);
  g.addColorStop(0, '#ffb84d'); g.addColorStop(1, '#e06000');
  c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2);
  c.fillStyle = g; c.fill();
  // Peel texture dots
  c.fillStyle = 'rgba(0,0,0,0.12)';
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    c.beginPath(); c.arc(Math.cos(a)*r*0.55, Math.sin(a)*r*0.55, 2, 0, Math.PI*2); c.fill();
  }
  // Stem
  c.fillStyle = '#5a3000';
  c.beginPath(); c.ellipse(0, -r+2, 3, 5, 0, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawApple(c, x, y, r, rot) {
  c.save(); c.translate(x, y); c.rotate(rot);
  const g = c.createRadialGradient(-r*0.2, -r*0.2, r*0.1, 0, 0, r);
  g.addColorStop(0, '#ff6060'); g.addColorStop(1, '#b80000');
  c.beginPath();
  c.moveTo(0, -r*0.85);
  c.bezierCurveTo(r*1.1, -r*0.9, r*1.1, r*0.9, 0, r*0.95);
  c.bezierCurveTo(-r*1.1, r*0.9, -r*1.1, -r*0.9, 0, -r*0.85);
  c.fillStyle = g; c.fill();
  // Shine
  c.fillStyle = 'rgba(255,255,255,0.25)';
  c.beginPath(); c.ellipse(-r*0.25, -r*0.3, r*0.2, r*0.35, -0.4, 0, Math.PI*2); c.fill();
  // Stem
  c.strokeStyle = '#5a3000'; c.lineWidth = 2.5;
  c.beginPath(); c.moveTo(0, -r*0.85); c.quadraticCurveTo(r*0.2, -r*1.25, r*0.05, -r*1.3); c.stroke();
  // Leaf
  c.fillStyle = '#2d8c2d';
  c.beginPath(); c.ellipse(r*0.12, -r*1.1, 7, 4, 0.6, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawBanana(c, x, y, r, rot) {
  c.save(); c.translate(x, y); c.rotate(rot);
  c.fillStyle = '#ffe033';
  c.strokeStyle = '#c8a000'; c.lineWidth = 1.5;
  // Banana crescent shape
  c.beginPath();
  c.moveTo(-r*0.9, r*0.2);
  c.quadraticCurveTo(-r*0.3, -r*1.1, r*0.9, -r*0.1);
  c.quadraticCurveTo(r*0.7, r*0.15, r*0.55, r*0.3);
  c.quadraticCurveTo(-r*0.1, -r*0.5, -r*0.7, r*0.45);
  c.closePath();
  c.fill(); c.stroke();
  // Tip ends dark
  c.fillStyle = '#8a6000';
  c.beginPath(); c.ellipse(-r*0.88, r*0.2, 4, 3, 0.8, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(r*0.9, -r*0.1, 4, 3, 0.5, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawGrape(c, x, y, r, rot) {
  c.save(); c.translate(x, y); c.rotate(rot);
  // Cluster of small circles
  const positions = [
    [0, r*0.3], [-r*0.35, r*0.05], [r*0.35, r*0.05],
    [-r*0.18, -r*0.28], [r*0.18, -r*0.28], [0, -r*0.55],
  ];
  const gr = r * 0.38;
  for (const [gx, gy] of positions) {
    const g = c.createRadialGradient(gx - gr*0.3, gy - gr*0.3, gr*0.1, gx, gy, gr);
    g.addColorStop(0, '#c060e0'); g.addColorStop(1, '#5a0880');
    c.beginPath(); c.arc(gx, gy, gr, 0, Math.PI*2);
    c.fillStyle = g; c.fill();
    // Shine
    c.fillStyle = 'rgba(255,255,255,0.3)';
    c.beginPath(); c.arc(gx - gr*0.28, gy - gr*0.28, gr*0.22, 0, Math.PI*2); c.fill();
  }
  // Stem
  c.strokeStyle = '#5a3000'; c.lineWidth = 2;
  c.beginPath(); c.moveTo(0, -r*0.55 - gr); c.quadraticCurveTo(r*0.3, -r*1.1, r*0.15, -r*1.25); c.stroke();
  c.restore();
}

function drawLemon(c, x, y, r, rot) {
  c.save(); c.translate(x, y); c.rotate(rot);
  const g = c.createRadialGradient(-r*0.2, -r*0.2, r*0.1, 0, 0, r);
  g.addColorStop(0, '#fff176'); g.addColorStop(1, '#e0c000');
  c.beginPath();
  c.ellipse(0, 0, r, r*0.72, 0, 0, Math.PI*2);
  c.fillStyle = g; c.fill();
  // Pointy tips
  c.fillStyle = '#c8a800';
  c.beginPath(); c.ellipse(r*0.88, 0, 5, 4, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(-r*0.88, 0, 5, 4, 0, 0, Math.PI*2); c.fill();
  // Texture dots
  c.fillStyle = 'rgba(0,0,0,0.1)';
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    c.beginPath(); c.arc(Math.cos(a)*r*0.4, Math.sin(a)*r*0.4*0.7, 2, 0, Math.PI*2); c.fill();
  }
  c.restore();
}

function drawBomb(c, x, y, r, rot) {
  c.save(); c.translate(x, y); c.rotate(rot);
  // Body
  const g = c.createRadialGradient(-r*0.25, -r*0.25, r*0.1, 0, 0, r);
  g.addColorStop(0, '#555'); g.addColorStop(1, '#111');
  c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2);
  c.fillStyle = g; c.fill();
  c.strokeStyle = '#333'; c.lineWidth = 1.5; c.stroke();
  // Shine
  c.fillStyle = 'rgba(255,255,255,0.18)';
  c.beginPath(); c.arc(-r*0.28, -r*0.28, r*0.22, 0, Math.PI*2); c.fill();
  // Fuse
  c.strokeStyle = '#8a6000'; c.lineWidth = 2.5;
  c.beginPath();
  c.moveTo(r*0.35, -r*0.7);
  c.quadraticCurveTo(r*0.6, -r*1.1, r*0.3, -r*1.35);
  c.stroke();
  // Fuse spark
  const spark = (Date.now() % 400) / 400;
  c.fillStyle = `hsl(${30 + spark*60},100%,${50 + spark*30}%)`;
  c.beginPath(); c.arc(r*0.3, -r*1.35, 3.5, 0, Math.PI*2); c.fill();
  c.restore();
}

function drawFruitHalf(c, type, x, y, r, rot, side) {
  c.save(); c.translate(x, y); c.rotate(rot);
  c.beginPath();
  // Clip to half
  if (side === 0) {
    c.rect(-r*1.5, -r*1.5, r*1.5, r*3);
  } else {
    c.rect(0, -r*1.5, r*1.5, r*3);
  }
  c.clip();
  // Draw full fruit (clipped to half)
  switch(type) {
    case 'watermelon': drawWatermelon(c, 0, 0, r, 0); break;
    case 'orange':     drawOrange(c, 0, 0, r, 0); break;
    case 'apple':      drawApple(c, 0, 0, r, 0); break;
    case 'banana':     drawBanana(c, 0, 0, r, 0); break;
    case 'grape':      drawGrape(c, 0, 0, r, 0); break;
    case 'lemon':      drawLemon(c, 0, 0, r, 0); break;
  }
  // Cut face (inner color)
  const innerColors = {
    watermelon: '#e8253a', orange: '#ff9933', apple: '#ffcccc',
    banana: '#fff8c0', grape: '#d080f0', lemon: '#fffaaa'
  };
  c.fillStyle = innerColors[type] || '#fff';
  c.beginPath();
  c.rect(side === 0 ? -1 : 0, -r*1.5, 2, r*3);
  c.fill();
  c.restore();
}

function drawFruit(c, type, x, y, r, rot) {
  switch(type) {
    case 'watermelon': drawWatermelon(c, x, y, r, rot); break;
    case 'orange':     drawOrange(c, x, y, r, rot); break;
    case 'apple':      drawApple(c, x, y, r, rot); break;
    case 'banana':     drawBanana(c, x, y, r, rot); break;
    case 'grape':      drawGrape(c, x, y, r, rot); break;
    case 'lemon':      drawLemon(c, x, y, r, rot); break;
    case 'bomb':       drawBomb(c, x, y, r, rot); break;
  }
}

// ─── Spawn ────────────────────────────────────────────────────
function spawnFruit() {
  const isBomb = Math.random() < 0.12;
  let type;
  if (isBomb) {
    type = 'bomb';
  } else {
    const t = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
    type = t.id;
  }

  const def = isBomb ? { r: 22, points: 0 } : FRUIT_TYPES.find(f => f.id === type);
  const r = def.r;
  const cx = canvas.width;
  const cy = canvas.height;

  // Random spawn from bottom, random side bias
  const x = r + Math.random() * (cx - r*2);
  const y = cy + r;

  // Velocity: upward with some horizontal
  const angle = -Math.PI/2 + (Math.random() - 0.5) * 1.1;
  const speed = 5 + Math.random() * 3.5 + gameFrame * 0.003;
  const vx = Math.cos(angle) * speed;
  const vy = Math.sin(angle) * speed;

  fruits.push({
    type,
    x, y, vx, vy,
    r,
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.12,
    points: def.points,
    alive: true
  });
}

// ─── Particles ────────────────────────────────────────────────
function spawnJuice(x, y, type) {
  const colors = {
    watermelon: ['#e8253a','#ff6080','#c00020'],
    orange:     ['#ff9933','#ffbb44','#dd6600'],
    apple:      ['#ff4444','#ffaaaa','#cc0000'],
    banana:     ['#ffe033','#fff8c0','#ccb000'],
    grape:      ['#c060e0','#e0a0ff','#800090'],
    lemon:      ['#ffe066','#fffaaa','#c8a800'],
    bomb:       ['#ff6600','#ff3300','#ff9900','#ffcc00'],
  };
  const pool = colors[type] || ['#fff'];
  const count = type === 'bomb' ? 28 : 16;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - (type === 'bomb' ? 1 : 0.5),
      r: 2 + Math.random() * 4,
      color: pool[Math.floor(Math.random() * pool.length)],
      life: 1,
      decay: 0.025 + Math.random() * 0.03,
      gravity: 0.15
    });
  }
}

// ─── COMBO text ───────────────────────────────────────────────
function spawnComboText(txt) {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  comboTexts.push({ x: cx, y: cy, txt, life: 1, scale: 0.4 });
}

// ─── Score text (floating) ────────────────────────────────────
let scoreTexts = [];
function spawnScoreText(x, y, pts) {
  scoreTexts.push({ x, y, txt: '+' + pts, life: 1, vy: -1.5 });
}

// ─── Intersection helper ─────────────────────────────────────
function segCircle(ax, ay, bx, by, cx, cy, cr) {
  const dx = bx - ax, dy = by - ay;
  const fx = ax - cx, fy = ay - cy;
  const a = dx*dx + dy*dy;
  if (a < 0.0001) return false;
  const b = 2*(fx*dx + fy*dy);
  const c = fx*fx + fy*fy - cr*cr;
  let disc = b*b - 4*a*c;
  if (disc < 0) return false;
  disc = Math.sqrt(disc);
  const t1 = (-b - disc) / (2*a);
  const t2 = (-b + disc) / (2*a);
  return (t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1) || (t1 < 0 && t2 > 1);
}

// ─── Slice ────────────────────────────────────────────────────
function sliceFruit(fruit) {
  if (!fruit.alive) return;
  fruit.alive = false;

  if (fruit.type === 'bomb') {
    spawnJuice(fruit.x, fruit.y, 'bomb');
    shakeTimer = 18; shakeAmt = 8;
    loseLife();
    return;
  }

  // Points with combo
  combo++;
  comboTimer = 48; // ~0.8s at 60fps
  const mult = Math.max(1, combo);
  const pts = fruit.points * mult;
  score += pts;
  spawnJuice(fruit.x, fruit.y, fruit.type);
  spawnScoreText(fruit.x, fruit.y - fruit.r, pts);

  if (combo >= 2) {
    spawnComboText('COMBO x' + combo + '!');
  }

  // Spawn halves
  const baseAngle = Math.atan2(
    trail.length > 1 ? trail[trail.length-1].y - trail[trail.length-2].y : -1,
    trail.length > 1 ? trail[trail.length-1].x - trail[trail.length-2].x : 0
  );
  for (let side = 0; side < 2; side++) {
    const perp = baseAngle + Math.PI/2;
    const sign = side === 0 ? -1 : 1;
    halves.push({
      type: fruit.type,
      x: fruit.x, y: fruit.y,
      vx: fruit.vx*0.5 + Math.cos(perp)*sign*2.5,
      vy: fruit.vy*0.5 + Math.sin(perp)*sign*2.5 - 1,
      r: fruit.r,
      rot: fruit.rot,
      rotV: sign * (0.08 + Math.random()*0.1),
      side,
      life: 1,
      decay: 0.012
    });
  }

  updateUI();
}

// ─── Life management ─────────────────────────────────────────
function loseLife() {
  lives--;
  updateUI();
  if (lives <= 0) {
    endGame();
  }
}

// ─── Trail-based slicing ──────────────────────────────────────
function checkSlice() {
  if (trail.length < 2) return;
  const a = trail[trail.length - 2];
  const b = trail[trail.length - 1];
  for (const fruit of fruits) {
    if (!fruit.alive) continue;
    if (segCircle(a.x, a.y, b.x, b.y, fruit.x, fruit.y, fruit.r * 0.85)) {
      sliceFruit(fruit);
    }
  }
}

// ─── Input ───────────────────────────────────────────────────
function addTrailPoint(x, y) {
  trail.push({ x, y, t: Date.now() });
  if (trail.length > 20) trail.shift();
  checkSlice();
}

canvas.addEventListener('mousemove', e => {
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  addTrailPoint(e.clientX - rect.left, e.clientY - rect.top);
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  addTrailPoint(t.clientX - rect.left, t.clientY - rect.top);
}, { passive: false });

canvas.addEventListener('mouseleave', () => { trail = []; });
canvas.addEventListener('touchend', () => { trail = []; });

// ─── Game flow ────────────────────────────────────────────────
function startGame() {
  state = 'playing';
  score = 0; lives = 3; combo = 0; comboTimer = 0;
  spawnTimer = 0; spawnInterval = 120; gameFrame = 0;
  shakeTimer = 0; shakeAmt = 0;
  fruits = []; halves = []; particles = []; comboTexts = []; scoreTexts = [];
  trail = [];
  document.getElementById('overlay').classList.add('hidden');
  updateUI();
}

function endGame() {
  state = 'dead';
  if (score > best) {
    best = score;
    localStorage.setItem('fruitBest', best);
  }
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalBest').textContent = best;
  document.getElementById('overlayTitle').textContent = '游戏结束';
  document.getElementById('overlayScore').style.display = '';
  document.getElementById('overlayBest').style.display = '';
  document.getElementById('startBtn').textContent = '再来一局';
  document.getElementById('overlay').classList.remove('hidden');
  updateUI();
}

document.getElementById('startBtn').addEventListener('click', startGame);

// ─── UI update ───────────────────────────────────────────────
function livesStr(n) {
  return '♥'.repeat(Math.max(0, n)) + '♡'.repeat(Math.max(0, 3 - n));
}

function updateUI() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('bestDisplay').textContent = best;
  document.getElementById('livesDisplay').textContent = livesStr(lives);
  document.getElementById('comboDisplay').textContent = combo >= 2 ? 'x' + combo : '-';
  // Mobile
  document.getElementById('mScore').textContent = score;
  document.getElementById('mBest').textContent = best;
  document.getElementById('mLives').textContent = livesStr(lives);
  document.getElementById('mCombo').textContent = combo >= 2 ? 'x' + combo : '-';
}
updateUI();

// ─── Main loop ────────────────────────────────────────────────
let lastTime = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min(ts - lastTime, 50); lastTime = ts;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (state !== 'playing') return;

  gameFrame++;

  // Shake offset
  let sx = 0, sy = 0;
  if (shakeTimer > 0) {
    shakeTimer--;
    sx = (Math.random()-0.5)*shakeAmt;
    sy = (Math.random()-0.5)*shakeAmt;
    shakeAmt *= 0.88;
    ctx.save(); ctx.translate(sx, sy);
  }

  // ── Combo timer ──
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) {
      combo = 0;
      updateUI();
    }
  }

  // ── Spawn ──
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    // Difficulty: decrease interval over time
    spawnInterval = Math.max(35, 120 - Math.floor(gameFrame / 300) * 8);
    // Occasionally spawn 2-3 at once
    const count = Math.random() < 0.3 ? 2 : 1;
    for (let i = 0; i < count; i++) spawnFruit();
  }

  const G = 0.18;

  // ── Update fruits ──
  for (let i = fruits.length - 1; i >= 0; i--) {
    const f = fruits[i];
    if (!f.alive) { fruits.splice(i, 1); continue; }
    f.vy += G;
    f.x += f.vx; f.y += f.vy;
    f.rot += f.rotV;
    // Out of bounds
    if (f.y > canvas.height + f.r + 20) {
      fruits.splice(i, 1);
      if (f.type !== 'bomb') loseLife();
      continue;
    }
    if (f.x < -f.r*2 || f.x > canvas.width + f.r*2) {
      fruits.splice(i, 1);
      continue;
    }
  }

  // ── Update halves ──
  for (let i = halves.length - 1; i >= 0; i--) {
    const h = halves[i];
    h.vy += G;
    h.x += h.vx; h.y += h.vy;
    h.rot += h.rotV;
    h.life -= h.decay;
    if (h.life <= 0 || h.y > canvas.height + 60) { halves.splice(i, 1); }
  }

  // ── Update particles ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.vy += p.gravity;
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); }
  }

  // ── Update comboTexts ──
  for (let i = comboTexts.length - 1; i >= 0; i--) {
    const ct = comboTexts[i];
    ct.life -= 0.022;
    ct.y -= 1;
    ct.scale = Math.min(1.2, ct.scale + 0.06);
    if (ct.life <= 0) { comboTexts.splice(i, 1); }
  }

  // ── Update scoreTexts ──
  for (let i = scoreTexts.length - 1; i >= 0; i--) {
    const st = scoreTexts[i];
    st.life -= 0.025;
    st.y += st.vy;
    if (st.life <= 0) { scoreTexts.splice(i, 1); }
  }

  // ─── Draw ─────────────────────────────────────────────────

  // Halves
  for (const h of halves) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, h.life * 2);
    drawFruitHalf(ctx, h.type, h.x, h.y, h.r, h.rot, h.side);
    ctx.restore();
  }

  // Fruits
  for (const f of fruits) {
    if (!f.alive) continue;
    ctx.save();
    ctx.globalAlpha = 1;
    drawFruit(ctx, f.type, f.x, f.y, f.r, f.rot);
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Trail
  const now = Date.now();
  const recentTrail = trail.filter(pt => now - pt.t < 150);
  if (recentTrail.length >= 2) {
    for (let i = 1; i < recentTrail.length; i++) {
      const a = recentTrail[i-1], b = recentTrail[i];
      const age = (now - b.t) / 150;
      const alpha = 1 - age;
      const width = (1 - age) * 6 + 1;
      ctx.save();
      ctx.strokeStyle = `rgba(57,255,20,${alpha * 0.9})`;
      ctx.shadowColor = '#39ff14';
      ctx.shadowBlur = 8;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      ctx.restore();
    }
  }

  // Score texts
  for (const st of scoreTexts) {
    ctx.save();
    ctx.globalAlpha = st.life;
    ctx.font = 'bold 20px Arial';
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 8;
    ctx.textAlign = 'center';
    ctx.fillText(st.txt, st.x, st.y);
    ctx.restore();
  }

  // Combo texts
  for (const ct of comboTexts) {
    ctx.save();
    ctx.globalAlpha = ct.life * ct.life;
    ctx.font = `bold ${Math.floor(32 * ct.scale)}px Arial`;
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 16;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ct.txt, ct.x, ct.y);
    ctx.restore();
  }

  if (shakeTimer >= 0 && sx !== 0) ctx.restore();
}

requestAnimationFrame(loop);

})();
</script>
