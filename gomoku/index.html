<script>
// ==================== Constants ====================
const BOARD_SIZE = 15;
const CELL = 30;
const MARGIN = 30;
const CANVAS_SIZE = MARGIN * 2 + CELL * (BOARD_SIZE - 1);

const BLACK = 1;
const WHITE = 2;
const EMPTY = 0;

// Directions: right, down, diag-down-right, diag-down-left
const DIRS = [[0,1],[1,0],[1,1],[1,-1]];

// ==================== State ====================
let board = [];
let currentPlayer = BLACK;
let gameMode = 'ai';    // 'ai' | 'pvp'
let aiDifficulty = 'medium'; // 'easy'|'medium'|'hard'
let gameOver = false;
let aiThinking = false;
let moveHistory = [];
let lastMove = null;
let winLine = null;
let animPiece = null;  // {r, c, player, scale, t}
let animFrame = null;
let scores = { black: 0, white: 0, draw: 0 };

// ==================== Canvas Setup ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function setupCanvas() {
  const maxW = Math.min(window.innerWidth - 24, 540);
  const scale = maxW < CANVAS_SIZE ? maxW / CANVAS_SIZE : 1;
  const size = Math.floor(CANVAS_SIZE * scale);
  canvas.width = size;
  canvas.height = size;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  drawBoard();
}

function cellSize() {
  return canvas.width / CANVAS_SIZE * CELL;
}
function margin() {
  return canvas.width / CANVAS_SIZE * MARGIN;
}

// ==================== Drawing ====================
function drawBoard() {
  const w = canvas.width;
  const m = margin();
  const c = cellSize();
  ctx.clearRect(0, 0, w, w);

  // Board background
  const bg = ctx.createRadialGradient(w/2, w/2, 0, w/2, w/2, w*0.7);
  bg.addColorStop(0, '#3d2b1a');
  bg.addColorStop(1, '#1e1409');
  ctx.fillStyle = bg;
  roundRect(ctx, 0, 0, w, w, 10);
  ctx.fill();

  // Grid lines
  ctx.strokeStyle = '#c8922a';
  ctx.lineWidth = canvas.width / CANVAS_SIZE * 0.6;
  ctx.globalAlpha = 0.7;
  for (let i = 0; i < BOARD_SIZE; i++) {
    // horizontal
    ctx.beginPath();
    ctx.moveTo(m, m + i * c);
    ctx.lineTo(m + (BOARD_SIZE - 1) * c, m + i * c);
    ctx.stroke();
    // vertical
    ctx.beginPath();
    ctx.moveTo(m + i * c, m);
    ctx.lineTo(m + i * c, m + (BOARD_SIZE - 1) * c);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Star points
  const stars = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];
  ctx.fillStyle = '#c8922a';
  for (const [sr, sc] of stars) {
    ctx.beginPath();
    ctx.arc(m + sc * c, m + sr * c, canvas.width / CANVAS_SIZE * 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw pieces
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let col = 0; col < BOARD_SIZE; col++) {
      if (board[r][col] !== EMPTY) {
        // Skip animated piece position (draw at end)
        if (animPiece && animPiece.r === r && animPiece.c === col) continue;
        drawPiece(r, col, board[r][col], 1);
      }
    }
  }

  // Draw animated piece
  if (animPiece) {
    drawPiece(animPiece.r, animPiece.c, animPiece.player, animPiece.scale);
  }

  // Last move marker
  if (lastMove && !animPiece) {
    const x = m + lastMove.c * c;
    const y = m + lastMove.r * c;
    ctx.beginPath();
    ctx.arc(x, y, c * 0.13, 0, Math.PI * 2);
    ctx.fillStyle = '#ff4444';
    ctx.fill();
  }

  // Win line
  if (winLine) {
    drawWinLine();
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawPiece(r, col, player, scale) {
  const m = margin();
  const c = cellSize();
  const x = m + col * c;
  const y = m + r * c;
  const radius = c * 0.44 * scale;

  ctx.save();
  ctx.translate(x, y);

  if (player === BLACK) {
    const grad = ctx.createRadialGradient(-radius*0.3, -radius*0.3, radius*0.05, 0, 0, radius);
    grad.addColorStop(0, '#888');
    grad.addColorStop(0.4, '#333');
    grad.addColorStop(1, '#0a0a0a');
    ctx.beginPath();
    ctx.arc(0, 0, radius, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = c * 0.3 * scale;
    ctx.shadowOffsetX = c * 0.05;
    ctx.shadowOffsetY = c * 0.08;
    ctx.fill();
    ctx.shadowColor = 'transparent';
    // Gloss
    const glow = ctx.createRadialGradient(-radius*0.35, -radius*0.38, 0, -radius*0.2, -radius*0.2, radius*0.55);
    glow.addColorStop(0, 'rgba(255,255,255,0.45)');
    glow.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(0, 0, radius, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
  } else {
    const grad = ctx.createRadialGradient(-radius*0.3, -radius*0.3, radius*0.05, 0, 0, radius);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.5, '#e8e8e8');
    grad.addColorStop(1, '#aaaaaa');
    ctx.beginPath();
    ctx.arc(0, 0, radius, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = c * 0.25 * scale;
    ctx.shadowOffsetX = c * 0.05;
    ctx.shadowOffsetY = c * 0.08;
    ctx.fill();
    ctx.shadowColor = 'transparent';
    // Gloss
    const glow = ctx.createRadialGradient(-radius*0.35, -radius*0.38, 0, -radius*0.2, -radius*0.2, radius*0.55);
    glow.addColorStop(0, 'rgba(255,255,255,0.75)');
    glow.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(0, 0, radius, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
  }

  ctx.restore();
}

function drawWinLine() {
  if (!winLine) return;
  const m = margin();
  const c = cellSize();
  const {r1, c1, r2, c2} = winLine;
  const x1 = m + c1 * c;
  const y1 = m + r1 * c;
  const x2 = m + c2 * c;
  const y2 = m + r2 * c;

  // Glow effect
  ctx.save();
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = c * 0.18;
  ctx.lineCap = 'round';
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = c * 0.5;
  ctx.globalAlpha = 0.85;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.shadowBlur = c * 1.2;
  ctx.globalAlpha = 0.4;
  ctx.lineWidth = c * 0.35;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.restore();

  // Redraw last move marker on top
  if (lastMove) {
    const x = m + lastMove.c * c;
    const y = m + lastMove.r * c;
    ctx.beginPath();
    ctx.arc(x, y, c * 0.13, 0, Math.PI * 2);
    ctx.fillStyle = '#ff4444';
    ctx.fill();
  }
}

// ==================== Animation ====================
function animatePiece(r, c, player, onDone) {
  if (animFrame) cancelAnimationFrame(animFrame);
  const startTime = performance.now();
  const duration = 280;

  function frame(now) {
    const t = Math.min((now - startTime) / duration, 1);
    // Bounce scale: overshoot then settle
    let scale;
    if (t < 0.6) {
      scale = t / 0.6;
    } else if (t < 0.8) {
      scale = 1.0 + 0.18 * Math.sin((t - 0.6) / 0.2 * Math.PI);
    } else {
      scale = 1.0 + 0.05 * Math.sin((t - 0.8) / 0.2 * Math.PI);
    }
    animPiece = { r, c, player, scale, t };
    drawBoard();
    if (t < 1) {
      animFrame = requestAnimationFrame(frame);
    } else {
      animPiece = null;
      animFrame = null;
      drawBoard();
      if (onDone) onDone();
    }
  }
  animFrame = requestAnimationFrame(frame);
}

// ==================== Game Logic ====================
function initBoard() {
  board = [];
  for (let i = 0; i < BOARD_SIZE; i++) {
    board.push(new Array(BOARD_SIZE).fill(EMPTY));
  }
}

function newGame() {
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = null; // must reset or all future clicks are blocked
  animPiece = null;
  initBoard();
  currentPlayer = BLACK;
  gameOver = false;
  aiThinking = false;
  moveHistory = [];
  lastMove = null;
  winLine = null;
  updateUI();
  drawBoard();
  document.getElementById('overlay').classList.remove('show');
}

function placePiece(r, c) {
  if (gameOver || aiThinking) return false;
  if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) return false;
  if (board[r][c] !== EMPTY) return false;

  board[r][c] = currentPlayer;
  moveHistory.push({ r, c, player: currentPlayer });
  lastMove = { r, c };

  const winner = checkWin(r, c, currentPlayer);
  const isDraw = !winner && isBoardFull();

  animatePiece(r, c, currentPlayer, () => {
    if (winner) {
      winLine = winner;
      drawBoard();
      gameOver = true;
      scores[currentPlayer === BLACK ? 'black' : 'white']++;
      updateUI();
      updateScores();
      setTimeout(() => showOverlay(currentPlayer), 600);
    } else if (isDraw) {
      gameOver = true;
      scores.draw++;
      updateUI();
      updateScores();
      setTimeout(() => showOverlay(null), 600);
    } else {
      currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
      updateUI();
      if (gameMode === 'ai' && currentPlayer === WHITE) {
        aiThinking = true;
        updateUI();
        setTimeout(doAIMove, 100);
      }
    }
  });
  return true;
}

function isBoardFull() {
  for (let r = 0; r < BOARD_SIZE; r++)
    for (let c = 0; c < BOARD_SIZE; c++)
      if (board[r][c] === EMPTY) return false;
  return true;
}

function checkWin(r, c, player) {
  for (const [dr, dc] of DIRS) {
    let count = 1;
    let minR = r, minC = c, maxR = r, maxC = c;
    for (let d = 1; d <= 4; d++) {
      const nr = r + dr * d, nc = c + dc * d;
      if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;
      if (board[nr][nc] !== player) break;
      count++;
      maxR = nr; maxC = nc;
    }
    for (let d = 1; d <= 4; d++) {
      const nr = r - dr * d, nc = c - dc * d;
      if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;
      if (board[nr][nc] !== player) break;
      count++;
      minR = nr; minC = nc;
    }
    if (count >= 5) {
      return { r1: minR, c1: minC, r2: maxR, c2: maxC };
    }
  }
  return null;
}

function undoMove() {
  if (gameOver || aiThinking || moveHistory.length === 0) return;
  if (animFrame) return;

  if (gameMode === 'ai') {
    // Pop AI move + player move
    if (moveHistory.length >= 2) {
      const m2 = moveHistory.pop();
      board[m2.r][m2.c] = EMPTY;
      const m1 = moveHistory.pop();
      board[m1.r][m1.c] = EMPTY;
    } else if (moveHistory.length === 1) {
      const m1 = moveHistory.pop();
      board[m1.r][m1.c] = EMPTY;
    }
  } else {
    const m = moveHistory.pop();
    board[m.r][m.c] = EMPTY;
    currentPlayer = m.player;
  }

  lastMove = moveHistory.length > 0 ? { r: moveHistory[moveHistory.length-1].r, c: moveHistory[moveHistory.length-1].c } : null;
  currentPlayer = BLACK; // After undo in AI mode, always player's turn
  if (gameMode === 'pvp' && moveHistory.length > 0) {
    currentPlayer = moveHistory[moveHistory.length - 1].player === BLACK ? WHITE : BLACK;
  } else if (gameMode === 'pvp' && moveHistory.length === 0) {
    currentPlayer = BLACK;
  }
  winLine = null;
  gameOver = false;
  updateUI();
  drawBoard();
}

// ==================== Input Handling ====================
function getCell(px, py) {
  const m = margin();
  const c = cellSize();
  const col = Math.round((px - m) / c);
  const row = Math.round((py - m) / c);
  return { r: row, c: col };
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  if (e.touches) {
    return {
      x: (e.touches[0].clientX - rect.left) * scaleX,
      y: (e.touches[0].clientY - rect.top) * scaleY
    };
  }
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

canvas.addEventListener('click', (e) => {
  if (gameOver || aiThinking || animFrame) return;
  if (gameMode === 'ai' && currentPlayer === WHITE) return;
  const pos = getCanvasPos(e);
  const { r, c } = getCell(pos.x, pos.y);
  placePiece(r, c);
});

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (gameOver || aiThinking || animFrame) return;
  if (gameMode === 'ai' && currentPlayer === WHITE) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const touch = e.changedTouches[0];
  const x = (touch.clientX - rect.left) * scaleX;
  const y = (touch.clientY - rect.top) * scaleY;
  const { r, c } = getCell(x, y);
  placePiece(r, c);
}, { passive: false });

// ==================== UI Updates ====================
function setMode(mode) {
  gameMode = mode;
  // Update buttons in both panels
  document.querySelectorAll('[data-mode]').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  document.getElementById('rModeAI').classList.toggle('active', mode === 'ai');
  document.getElementById('rModePVP').classList.toggle('active', mode === 'pvp');
  document.getElementById('diffGroup').style.display = mode === 'ai' ? '' : 'none';
  updateUI();
  newGame();
}

function setDiff(diff) {
  aiDifficulty = diff;
  document.querySelectorAll('[data-diff]').forEach(b => {
    b.classList.toggle('active', b.dataset.diff === diff);
  });
  document.getElementById('rDiffEasy').classList.toggle('active', diff === 'easy');
  document.getElementById('rDiffMedium').classList.toggle('active', diff === 'medium');
  document.getElementById('rDiffHard').classList.toggle('active', diff === 'hard');
  newGame();
}

function updateUI() {
  const isBlack = currentPlayer === BLACK;
  const stoneClass = isBlack ? 'black' : 'white';
  const thinking = aiThinking ? ' (思考中...)' : '';
  const label = gameOver ? '对局结束' : (isBlack ? '黑方落子' : '白方落子') + thinking;

  // Desktop
  const ts = document.getElementById('turnStone');
  ts.className = 'turn-stone ' + stoneClass;
  document.getElementById('turnLabel').textContent = label;
  document.getElementById('statusText').textContent = thinking ? 'AI 思考中...' : '';

  // Mobile
  const mts = document.getElementById('mobileTurnStone');
  mts.className = 'turn-stone ' + stoneClass;
  document.getElementById('mobileTurnLabel').textContent = label;
  document.getElementById('mobileStatus').textContent = thinking ? 'AI思考中...' : '';

  // Mode toggle button label
  const modeToggle = document.getElementById('mobileToggleMode');
  if (modeToggle) {
    modeToggle.textContent = gameMode === 'ai' ? '切换双人' : '切换人机';
  }

  // Names
  const blackName = gameMode === 'ai' ? '玩家' : '黑方';
  const whiteName = gameMode === 'ai' ? 'AI' : '白方';
  document.getElementById('blackName').textContent = blackName;
  document.getElementById('whiteName').textContent = whiteName;
}

function updateScores() {
  document.getElementById('scoreB').textContent = scores.black;
  document.getElementById('scoreW').textContent = scores.white;
  document.getElementById('scoreDraw').textContent = scores.draw;
  document.getElementById('mobileScoreB').textContent = scores.black;
  document.getElementById('mobileScoreW').textContent = scores.white;
}

function showOverlay(winner) {
  const overlay = document.getElementById('overlay');
  const title = document.getElementById('overlayTitle');
  const winnerEl = document.getElementById('overlayWinner');
  if (winner === null) {
    title.textContent = '平局！';
    winnerEl.innerHTML = '棋盘已满，双方势均力敌！';
  } else if (winner === BLACK) {
    title.textContent = '胜利！';
    const name = gameMode === 'ai' ? '玩家（黑方）' : '黑方';
    winnerEl.innerHTML = '<strong>' + name + '</strong> 获胜！';
  } else {
    title.textContent = gameMode === 'ai' ? 'AI 获胜！' : '胜利！';
    const name = gameMode === 'ai' ? 'AI（白方）' : '白方';
    winnerEl.innerHTML = '<strong>' + name + '</strong> 获胜！';
  }
  overlay.classList.add('show');
  // Try to push AdSense ad
  try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
  newGame();
}

// ==================== AI ====================
function doAIMove() {
  if (!aiThinking || gameOver) return;
  const depth = { easy: 2, medium: 3, hard: 4 }[aiDifficulty];
  const move = getBestMove(WHITE, depth);
  aiThinking = false;
  if (move) {
    const ok = placePiece(move.r, move.c);
    if (!ok) {
      // placePiece failed (e.g. cell occupied) — hand turn back to player
      currentPlayer = BLACK;
      updateUI();
    }
  } else {
    // no valid move at all — hand back to player
    currentPlayer = BLACK;
    updateUI();
  }
}

function getBestMove(player, depth) {
  // Quick win / block checks first
  const winMove = findWinningMove(player);
  if (winMove) return winMove;
  const blockMove = findWinningMove(player === BLACK ? WHITE : BLACK);
  if (blockMove) return blockMove;

  // Get candidate moves
  const candidates = getCandidates();
  if (candidates.length === 0) {
    // fallback: any empty cell (handles very full boards)
    for (let r = 0; r < BOARD_SIZE; r++)
      for (let c = 0; c < BOARD_SIZE; c++)
        if (board[r][c] === EMPTY) return { r, c };
    return null;
  }
  if (candidates.length === 1) return candidates[0];

  let bestScore = -Infinity;
  let bestMove = candidates[0];

  for (const move of candidates) {
    board[move.r][move.c] = player;
    const score = minimax(board, depth - 1, -Infinity, Infinity, false, player);
    board[move.r][move.c] = EMPTY;
    if (score > bestScore) {
      bestScore = score;
      bestMove = move;
    }
  }
  return bestMove;
}

function findWinningMove(player) {
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      if (board[r][c] === EMPTY) {
        board[r][c] = player;
        const win = checkWin(r, c, player);
        board[r][c] = EMPTY;
        if (win) return { r, c };
      }
    }
  }
  return null;
}

function getCandidates() {
  const range = 2;
  const candidates = new Set();
  let hasStones = false;

  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      if (board[r][c] !== EMPTY) {
        hasStones = true;
        for (let dr = -range; dr <= range; dr++) {
          for (let dc = -range; dc <= range; dc++) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr][nc] === EMPTY) {
              candidates.add(nr * BOARD_SIZE + nc);
            }
          }
        }
      }
    }
  }

  if (!hasStones) return [{ r: 7, c: 7 }];

  return Array.from(candidates).map(key => ({
    r: Math.floor(key / BOARD_SIZE),
    c: key % BOARD_SIZE
  })).sort((a, b) => quickScore(b.r, b.c) - quickScore(a.r, a.c)).slice(0, 20);
}

function quickScore(r, c) {
  return evalPos(r, c, WHITE) + evalPos(r, c, BLACK) * 0.9;
}

function evalPos(r, c, player) {
  board[r][c] = player;
  const s = evalCell(r, c, player);
  board[r][c] = EMPTY;
  return s;
}

function minimax(board, depth, alpha, beta, isMax, aiPlayer) {
  const humanPlayer = aiPlayer === BLACK ? WHITE : BLACK;
  const currentP = isMax ? aiPlayer : humanPlayer;

  if (depth === 0) return evalBoard(aiPlayer);

  const candidates = getCandidates();
  if (candidates.length === 0) return 0;

  if (isMax) {
    let maxScore = -Infinity;
    for (const move of candidates) {
      board[move.r][move.c] = currentP;
      const win = checkWin(move.r, move.c, currentP);
      if (win) {
        board[move.r][move.c] = EMPTY;
        return 100000 + depth;
      }
      const score = minimax(board, depth - 1, alpha, beta, false, aiPlayer);
      board[move.r][move.c] = EMPTY;
      maxScore = Math.max(maxScore, score);
      alpha = Math.max(alpha, score);
      if (beta <= alpha) break;
    }
    return maxScore;
  } else {
    let minScore = Infinity;
    for (const move of candidates) {
      board[move.r][move.c] = currentP;
      const win = checkWin(move.r, move.c, currentP);
      if (win) {
        board[move.r][move.c] = EMPTY;
        return -(100000 + depth);
      }
      const score = minimax(board, depth - 1, alpha, beta, true, aiPlayer);
      board[move.r][move.c] = EMPTY;
      minScore = Math.min(minScore, score);
      beta = Math.min(beta, score);
      if (beta <= alpha) break;
    }
    return minScore;
  }
}

function evalBoard(aiPlayer) {
  let score = 0;
  const humanPlayer = aiPlayer === BLACK ? WHITE : BLACK;
  for (let r = 0; r < BOARD_SIZE; r++) {
    for (let c = 0; c < BOARD_SIZE; c++) {
      if (board[r][c] === aiPlayer) {
        score += evalCell(r, c, aiPlayer);
      } else if (board[r][c] === humanPlayer) {
        score -= evalCell(r, c, humanPlayer) * 1.1;
      }
    }
  }
  return score;
}

function evalCell(r, c, player) {
  let total = 0;
  for (const [dr, dc] of DIRS) {
    total += evalLine(r, c, dr, dc, player);
  }
  return total;
}

function evalLine(r, c, dr, dc, player) {
  const opp = player === BLACK ? WHITE : BLACK;
  let count = 1;
  let openEnds = 0;
  let blocked = 0;

  // Forward
  let blocked1 = true;
  for (let d = 1; d <= 4; d++) {
    const nr = r + dr * d, nc = c + dc * d;
    if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;
    if (board[nr][nc] === player) { count++; }
    else if (board[nr][nc] === EMPTY) { openEnds++; blocked1 = false; break; }
    else { break; }
  }
  if (blocked1) blocked++;

  // Backward
  let blocked2 = true;
  for (let d = 1; d <= 4; d++) {
    const nr = r - dr * d, nc = c - dc * d;
    if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) break;
    if (board[nr][nc] === player) { count++; }
    else if (board[nr][nc] === EMPTY) { openEnds++; blocked2 = false; break; }
    else { break; }
  }
  if (blocked2) blocked++;

  if (count >= 5) return 50000;
  if (blocked >= 2) return 0;

  const scores = {
    4: { 2: 10000, 1: 1000 },
    3: { 2: 1000,  1: 100 },
    2: { 2: 100,   1: 10 },
    1: { 2: 10,    1: 1 }
  };

  const s = scores[Math.min(count, 4)];
  return s ? (s[openEnds] || 0) : 0;
}

// ==================== Init ====================
window.addEventListener('resize', () => {
  setupCanvas();
});

initBoard();
setupCanvas();
updateUI();
updateScores();

// Init difficulty buttons display
document.getElementById('diffGroup').style.display = gameMode === 'ai' ? '' : 'none';
