// ─── STATE ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let state = 'overlay'; // overlay | playing | levelEnd
let currentLevel = 0;
let score = 0;
let bestScore = parseInt(localStorage.getItem('ab_best')||'0');
let birds = [];       // queue of bird type strings
let blocks = [];      // {mat, x, y, w, h, hp, maxHp, vx, vy, va, angle, alive}
let pigs = [];        // {x, y, r, hp, maxHp, vx, vy, alive}
let particles = [];   // {x,y,vx,vy,life,maxLife,color,r}
let activeBird = null;// {type, x, y, vx, vy, r, alive, used, color, hiColor, mass, activated}
let trailPoints = []; // [{x,y,t}]
let dragStart = null; // {x,y}
let dragCurrent = null;
let aimAngle = 0, aimPower = 0;
let waitTimer = 0;    // frames after bird lands before next
let clearedLevels = JSON.parse(localStorage.getItem('ab_cleared')||'[]');
let frameCount = 0;

// ─── INIT ─────────────────────────────────────────────────────────────────────
function initLevel(idx) {
  currentLevel = idx;
  score = 0;
  const lvl = LEVELS[idx];
  birds = [...lvl.birds];
  blocks = [];
  pigs = [];
  particles = [];
  activeBird = null;
  trailPoints = [];
  dragStart = null;
  dragCurrent = null;
  waitTimer = 0;

  lvl.items.forEach(item => {
    if (item.type === 'pig') {
      pigs.push({
        x: item.x, y: item.y, r: item.r||20,
        hp: 60, maxHp: 60, vx:0, vy:0, alive:true,
        angle: 0
      });
    } else if (item.type === 'block') {
      const m = MATERIAL[item.mat];
      blocks.push({
        mat: item.mat, x: item.x, y: item.y, w: item.w, h: item.h,
        hp: m.hp, maxHp: m.hp,
        vx:0, vy:0, va:0, angle:0, alive:true,
        mass: m.density * item.w * item.h / 400
      });
    }
  });

  updateUI();
  document.getElementById('level-desc').textContent = lvl.desc;
}

function spawnNextBird() {
  if (birds.length === 0) {
    activeBird = null;
    return;
  }
  const type = birds[0];
  const info = BIRD_TYPES[type];
  activeBird = {
    type, x: SLING_X, y: SLING_Y - info.radius - 4,
    vx:0, vy:0, r: info.radius,
    color: info.color, hiColor: info.hiColor, mass: info.mass,
    alive: true, flying: false, launched: false, activated: false,
    angle: 0, trail: []
  };
}

// ─── PHYSICS ──────────────────────────────────────────────────────────────────
function updatePhysics() {
  frameCount++;
  if (!activeBird) return;

  const b = activeBird;
  if (!b.flying) return;

  // update bird
  b.vy += GRAVITY;
  b.x += b.vx;
  b.y += b.vy;
  b.angle = Math.atan2(b.vy, b.vx);

  // trail
  trailPoints.push({x: b.x, y: b.y, t: frameCount});
  if (trailPoints.length > 60) trailPoints.shift();

  // bird vs ground
  if (b.y + b.r >= GROUND_Y) {
    b.y = GROUND_Y - b.r;
    b.vx *= 0.5;
    b.vy *= -0.3;
    if (Math.abs(b.vy) < 1) { b.vx = 0; b.vy = 0; b.flying = false; waitTimer = 80; }
    spawnParticles(b.x, GROUND_Y, '#44aa44', 5);
  }
  // bird off left/right/top
  if (b.x > CANVAS_W + 50 || b.x < -50 || b.y < -200) {
    b.alive = false;
    waitTimer = 90;
  }

  // bird vs blocks
  blocks.forEach(blk => {
    if (!blk.alive) return;
    const col = circlRectCollide(b.x, b.y, b.r, blk.x, blk.y, blk.w, blk.h);
    if (col) {
      const speed = Math.hypot(b.vx, b.vy);
      const m = MATERIAL[blk.mat];
      const dmg = Math.max(0, speed * b.mass * 5 - m.defense);
      blk.hp -= dmg;
      if (blk.hp <= 0) { blk.alive = false; score += m.score; spawnParticles(blk.x+blk.w/2, blk.y+blk.h/2, m.color, 12); }
      // transfer momentum
      const imp = speed * b.mass / (blk.mass + 1);
      blk.vx += b.vx * imp * 0.2;
      blk.vy += b.vy * imp * 0.2;
      // bounce bird
      b.vx *= -0.25; b.vy *= -0.25;
      if (Math.hypot(b.vx,b.vy) < 1) { b.flying = false; waitTimer = 80; }
      updateUI();
    }
  });

  // bird vs pigs
  pigs.forEach(pig => {
    if (!pig.alive) return;
    const dist = Math.hypot(b.x - pig.x, b.y - pig.y);
    if (dist < b.r + pig.r) {
      const speed = Math.hypot(b.vx, b.vy);
      const dmg = speed * b.mass * 6;
      pig.hp -= dmg;
      if (pig.hp <= 0) { pig.alive = false; score += 3000; spawnParticles(pig.x, pig.y, '#44cc44', 15); }
      // bounce
      const nx = (pig.x - b.x) / dist, ny = (pig.y - b.y) / dist;
      pig.vx += nx * speed * 0.5;
      pig.vy += ny * speed * 0.5;
      b.vx *= -0.3; b.vy *= -0.3;
      if (Math.hypot(b.vx,b.vy) < 1) { b.flying = false; waitTimer = 80; }
      updateUI();
    }
  });
}

function updateBlocks() {
  blocks.forEach(blk => {
    if (!blk.alive) return;
    if (Math.abs(blk.vx) < 0.05 && Math.abs(blk.vy) < 0.05 && blk.vy >= 0) return;

    blk.vy += GRAVITY * 0.5;
    blk.x += blk.vx;
    blk.y += blk.vy;
    blk.angle += blk.va;
    blk.vx *= 0.96;
    blk.va *= 0.94;

    // ground collision for blocks
    const bottomY = blk.y + blk.h;
    if (bottomY >= GROUND_Y) {
      blk.y = GROUND_Y - blk.h;
      blk.vy *= -0.3;
      if (Math.abs(blk.vy) < 0.5) blk.vy = 0;
      blk.vx *= 0.8;
      blk.va *= 0.7;
      // damage pigs under block
      pigs.forEach(pig => {
        if (!pig.alive) return;
        if (circlRectCollide(pig.x, pig.y, pig.r, blk.x, blk.y, blk.w, blk.h)) {
          const impactSpeed = Math.abs(blk.vy) + Math.abs(blk.vx);
          pig.hp -= impactSpeed * blk.mass * 4;
          if (pig.hp <= 0) { pig.alive = false; score += 3000; spawnParticles(pig.x, pig.y, '#44cc44', 15); updateUI(); }
        }
      });
    }
  });

  // block-block collisions (simplified)
  for (let i=0; i<blocks.length; i++) {
    for (let j=i+1; j<blocks.length; j++) {
      const a = blocks[i], bb = blocks[j];
      if (!a.alive || !bb.alive) continue;
      if (rectsOverlap(a, bb)) {
        // push apart
        const cx = (a.x+a.w/2), cy = (a.y+a.h/2);
        const dx = (bb.x+bb.w/2) - cx, dy = (bb.y+bb.h/2) - cy;
        const dist = Math.hypot(dx,dy)||1;
        const push = 0.5;
        const fx = (dx/dist)*push, fy = (dy/dist)*push;
        if (a.vy > 0.5 || Math.abs(a.vx)>0.5) {
          bb.vx += fx; bb.vy += fy;
          a.vx -= fx*0.3; a.vy -= fy*0.3;
        }
        // damage on impact
        const relSpeed = Math.hypot(a.vx-bb.vx, a.vy-bb.vy);
        if (relSpeed > 2) {
          const dmg = relSpeed * Math.min(a.mass,bb.mass) * 2;
          a.hp -= dmg * 0.4; bb.hp -= dmg * 0.4;
          if (a.hp <= 0) { a.alive = false; score += MATERIAL[a.mat].score; spawnParticles(a.x+a.w/2,a.y+a.h/2,MATERIAL[a.mat].color,8); updateUI(); }
          if (bb.hp <= 0) { bb.alive = false; score += MATERIAL[bb.mat].score; spawnParticles(bb.x+bb.w/2,bb.y+bb.h/2,MATERIAL[bb.mat].color,8); updateUI(); }
          // pig damage from block collision
          pigs.forEach(pig => {
            if (!pig.alive) return;
            if (circlRectCollide(pig.x,pig.y,pig.r,a.x,a.y,a.w,a.h) || circlRectCollide(pig.x,pig.y,pig.r,bb.x,bb.y,bb.w,bb.h)) {
              pig.hp -= relSpeed * 2;
              if (pig.hp <= 0) { pig.alive = false; score += 3000; spawnParticles(pig.x,pig.y,'#44cc44',15); updateUI(); }
            }
          });
        }
      }
    }
  }
}

function updatePigs() {
  pigs.forEach(pig => {
    if (!pig.alive) return;
    pig.vy += GRAVITY * 0.4;
    pig.x += pig.vx;
    pig.y += pig.vy;
    pig.vx *= 0.92;
    pig.vy *= 0.92;
    if (pig.y + pig.r >= GROUND_Y) {
      pig.y = GROUND_Y - pig.r;
      pig.vy *= -0.3;
      if (Math.abs(pig.vy) < 0.5) pig.vy = 0;
    }
  });
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.vx *= 0.97;
    p.life--;
  });
}

// ─── COLLISION HELPERS ────────────────────────────────────────────────────────
function circlRectCollide(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = Math.max(rx, Math.min(cx, rx+rw));
  const nearY = Math.max(ry, Math.min(cy, ry+rh));
  return Math.hypot(cx-nearX, cy-nearY) < cr;
}
function rectsOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i=0; i<count; i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = 1+Math.random()*4;
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 2,
      life: 25+Math.random()*20|0,
      maxLife: 45,
      color,
      r: 2+Math.random()*4
    });
  }
}

// ─── BIRD SPECIAL ─────────────────────────────────────────────────────────────
function activateBird() {
  if (!activeBird || !activeBird.flying || activeBird.activated) return;
  activeBird.activated = true;
  if (activeBird.type === 'yellow') {
    const speed = Math.hypot(activeBird.vx, activeBird.vy);
    const angle = Math.atan2(activeBird.vy, activeBird.vx);
    activeBird.vx = Math.cos(angle) * (speed * 2.5);
    activeBird.vy = Math.sin(angle) * (speed * 2.5) - 2;
    spawnParticles(activeBird.x, activeBird.y, '#ffdd00', 10);
  } else if (activeBird.type === 'blue') {
    // split into 3
    const b = activeBird;
    const angles = [-0.3, 0, 0.3];
    angles.forEach((da, i) => {
      if (i === 1) return; // keep main
      const speed = Math.hypot(b.vx, b.vy);
      const baseAngle = Math.atan2(b.vy, b.vx) + da;
      const nb = {
        type:'blue', x:b.x, y:b.y,
        vx: Math.cos(baseAngle)*speed*0.9,
        vy: Math.sin(baseAngle)*speed*0.9,
        r: BIRD_TYPES.blue.radius,
        color: BIRD_TYPES.blue.color, hiColor: BIRD_TYPES.blue.hiColor,
        mass: BIRD_TYPES.blue.mass * 0.5,
        alive:true, flying:true, activated:true, angle:0, trail:[]
      };
      splitBirds.push(nb);
    });
    b.vx = Math.cos(Math.atan2(b.vy,b.vx)+0.3)*Math.hypot(b.vx,b.vy)*0.9;
    spawnParticles(b.x, b.y, '#4488ff', 12);
  }
}
let splitBirds = [];

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function drawBackground() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0,0,0,GROUND_Y);
  skyGrad.addColorStop(0, '#1a3a6e');
  skyGrad.addColorStop(1, '#5599dd');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

  // Clouds
  drawCloud(80, 60, 50);
  drawCloud(250, 40, 40);
  drawCloud(500, 70, 60);
  drawCloud(680, 50, 45);

  // Ground
  const groundGrad = ctx.createLinearGradient(0,GROUND_Y,0,CANVAS_H);
  groundGrad.addColorStop(0,'#338833');
  groundGrad.addColorStop(0.15,'#226622');
  groundGrad.addColorStop(1,'#1a4a1a');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0,GROUND_Y,CANVAS_W,CANVAS_H-GROUND_Y);

  // Grass edge
  ctx.fillStyle = '#44bb44';
  ctx.fillRect(0, GROUND_Y, CANVAS_W, 4);
}

function drawCloud(x, y, size) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(x, y, size*0.5, 0, Math.PI*2);
  ctx.arc(x+size*0.4, y+size*0.1, size*0.4, 0, Math.PI*2);
  ctx.arc(x-size*0.35, y+size*0.1, size*0.35, 0, Math.PI*2);
  ctx.arc(x+size*0.15, y+size*0.2, size*0.38, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawSlingshot() {
  ctx.save();
  ctx.strokeStyle = '#6b3a1f';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';

  // Left fork
  ctx.beginPath();
  ctx.moveTo(SLING_X, GROUND_Y-10);
  ctx.lineTo(SLING_X-15, SLING_Y-20);
  ctx.stroke();

  // Right fork
  ctx.beginPath();
  ctx.moveTo(SLING_X, GROUND_Y-10);
  ctx.lineTo(SLING_X+15, SLING_Y-20);
  ctx.stroke();

  // Sling band (when dragging)
  if (dragCurrent && state === 'playing') {
    const {bx, by} = getClampedDrag();
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(SLING_X-15, SLING_Y-20);
    ctx.lineTo(bx, by);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(SLING_X+15, SLING_Y-20);
    ctx.lineTo(bx, by);
    ctx.stroke();
  } else {
    // elastic band relaxed
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(SLING_X-15, SLING_Y-20);
    ctx.lineTo(SLING_X, SLING_Y-4);
    ctx.lineTo(SLING_X+15, SLING_Y-20);
    ctx.stroke();
  }
  ctx.restore();
}

function getClampedDrag() {
  if (!dragCurrent) return {bx: SLING_X, by: SLING_Y};
  let dx = dragCurrent.x - SLING_X;
  let dy = dragCurrent.y - SLING_Y;
  const dist = Math.hypot(dx,dy);
  if (dist > MAX_PULL) { dx = dx/dist*MAX_PULL; dy = dy/dist*MAX_PULL; }
  return {bx: SLING_X+dx, by: SLING_Y+dy};
}

function drawTrajectoryPreview() {
  if (!dragCurrent || !activeBird || activeBird.flying) return;
  const {bx, by} = getClampedDrag();
  const dx = SLING_X - bx, dy = SLING_Y - by;
  const speed = Math.hypot(dx,dy) * 0.22;
  const angle = Math.atan2(dy, dx);
  let pvx = Math.cos(angle)*speed, pvy = Math.sin(angle)*speed;
  let px = SLING_X, py = SLING_Y;

  ctx.save();
  ctx.setLineDash([6,8]);
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(px, py);
  for (let i=0; i<40; i++) {
    pvy += GRAVITY;
    px += pvx; py += pvy;
    if (py > GROUND_Y || px > CANVAS_W) break;
    ctx.lineTo(px, py);
  }
  ctx.stroke();
  ctx.restore();
}

function drawTrail() {
  if (trailPoints.length < 2) return;
  ctx.save();
  for (let i=1; i<trailPoints.length; i++) {
    const alpha = i/trailPoints.length*0.5;
    ctx.beginPath();
    ctx.arc(trailPoints[i].x, trailPoints[i].y, 3*(i/trailPoints.length), 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,200,100,${alpha})`;
    ctx.fill();
  }
  ctx.restore();
}

function drawBird(x, y, r, type, angle, isDragging) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  const info = BIRD_TYPES[type];
  // Body gradient
  const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
  grad.addColorStop(0, info.hiColor);
  grad.addColorStop(1, info.color);

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = darken(info.color, 0.6);
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Bird features
  ctx.rotate(-angle); // keep face upright

  if (type === 'red') {
    // Tuft
    ctx.beginPath();
    ctx.moveTo(-3, -r+2);
    ctx.lineTo(0, -r-6);
    ctx.lineTo(3, -r+2);
    ctx.fillStyle = '#cc1133';
    ctx.fill();
    // White eye areas
    drawEyes(r, '#fff', '#111', true);
    // Angry brows
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-r*0.5, -r*0.3);
    ctx.lineTo(-r*0.1, -r*0.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(r*0.5, -r*0.3);
    ctx.lineTo(r*0.1, -r*0.5);
    ctx.stroke();
    // Beak
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.moveTo(-r*0.2, r*0.1);
    ctx.lineTo(r*0.2, r*0.1);
    ctx.lineTo(0, r*0.35);
    ctx.closePath();
    ctx.fill();
  } else if (type === 'yellow') {
    // Triangle body accent
    ctx.fillStyle = 'rgba(255,200,0,0.5)';
    ctx.beginPath();
    ctx.moveTo(0,-r*0.8);
    ctx.lineTo(r*0.7, r*0.5);
    ctx.lineTo(-r*0.7, r*0.5);
    ctx.closePath();
    ctx.fill();
    drawEyes(r*0.85, '#fff', '#111', false);
    ctx.strokeStyle = '#aa6600';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-r*0.45,-r*0.25); ctx.lineTo(-r*0.1,-r*0.45); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(r*0.45,-r*0.25); ctx.lineTo(r*0.1,-r*0.45); ctx.stroke();
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.moveTo(-r*0.15, r*0.1); ctx.lineTo(r*0.15, r*0.1); ctx.lineTo(0, r*0.3); ctx.closePath(); ctx.fill();
  } else if (type === 'blue') {
    drawEyes(r*0.85, '#fff', '#111', false);
    ctx.strokeStyle = '#003388';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-r*0.45,-r*0.2); ctx.lineTo(-r*0.1,-r*0.4); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(r*0.45,-r*0.2); ctx.lineTo(r*0.1,-r*0.4); ctx.stroke();
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.moveTo(-r*0.12, r*0.05); ctx.lineTo(r*0.12, r*0.05); ctx.lineTo(0, r*0.25); ctx.closePath(); ctx.fill();
  }

  ctx.restore();
}

function drawEyes(scale, white, pupil, large) {
  const s = large ? scale : scale*0.85;
  // Left eye
  ctx.beginPath();
  ctx.arc(-s*0.3, -s*0.2, s*0.22, 0, Math.PI*2);
  ctx.fillStyle = white; ctx.fill();
  ctx.beginPath();
  ctx.arc(-s*0.22, -s*0.18, s*0.12, 0, Math.PI*2);
  ctx.fillStyle = pupil; ctx.fill();
  // Right eye
  ctx.beginPath();
  ctx.arc(s*0.3, -s*0.2, s*0.22, 0, Math.PI*2);
  ctx.fillStyle = white; ctx.fill();
  ctx.beginPath();
  ctx.arc(s*0.38, -s*0.18, s*0.12, 0, Math.PI*2);
  ctx.fillStyle = pupil; ctx.fill();
}

function darken(hex, factor) {
  // Simple color darkening for hex / rgba
  return hex; // just return same for rgba; for real colors we'll use CSS
}

function drawBlock(blk) {
  if (!blk.alive) return;
  const m = MATERIAL[blk.mat];
  const cx = blk.x + blk.w/2, cy = blk.y + blk.h/2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(blk.angle);

  // Health tint
  const hpRatio = blk.hp / blk.maxHp;
  ctx.beginPath();
  ctx.rect(-blk.w/2, -blk.h/2, blk.w, blk.h);

  // Fill
  if (blk.mat === 'glass') {
    ctx.fillStyle = hpRatio > 0.5 ? 'rgba(170,220,255,0.5)' : 'rgba(170,220,255,0.25)';
  } else {
    ctx.fillStyle = hpRatio > 0.5 ? m.color : darkenColor(m.color, hpRatio);
  }
  ctx.fill();

  // Border
  ctx.strokeStyle = blk.mat==='glass' ? '#88ccff' : darkenColor(m.color, 0.7);
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Wood grain lines
  if (blk.mat === 'wood') {
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    for (let g=-blk.w/2+8; g<blk.w/2; g+=12) {
      ctx.beginPath();
      ctx.moveTo(g, -blk.h/2);
      ctx.lineTo(g, blk.h/2);
      ctx.stroke();
    }
  } else if (blk.mat === 'stone') {
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-blk.w/2, 0); ctx.lineTo(blk.w/2, 0); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, -blk.h/2); ctx.lineTo(0, blk.h/2); ctx.stroke();
  }

  // Cracks when damaged
  if (hpRatio < 0.5) {
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-5,-10); ctx.lineTo(5,0); ctx.lineTo(-3,10); ctx.stroke();
  }

  ctx.restore();
}

function darkenColor(color, factor) {
  // Map named colors to hex
  if (color === '#8B5E3C') { return `rgb(${Math.round(139*factor)},${Math.round(94*factor)},${Math.round(60*factor)})`; }
  if (color === '#777')    { return `rgb(${Math.round(119*factor)},${Math.round(119*factor)},${Math.round(119*factor)})`; }
  return color;
}

function drawPig(pig) {
  if (!pig.alive) return;
  const hpRatio = pig.hp / pig.maxHp;
  ctx.save();
  ctx.translate(pig.x, pig.y);

  // Body
  const green1 = hpRatio > 0.5 ? '#44bb44' : '#886633';
  const green2 = hpRatio > 0.5 ? '#228822' : '#664422';
  const grad = ctx.createRadialGradient(-pig.r*0.3,-pig.r*0.3,pig.r*0.1,0,0,pig.r);
  grad.addColorStop(0, green1);
  grad.addColorStop(1, green2);
  ctx.beginPath();
  ctx.arc(0, 0, pig.r, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#1a6a1a';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Ears
  ctx.fillStyle = '#339933';
  ctx.beginPath();
  ctx.ellipse(-pig.r*0.65, -pig.r*0.6, pig.r*0.25, pig.r*0.2, -0.4, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(pig.r*0.65, -pig.r*0.6, pig.r*0.25, pig.r*0.2, 0.4, 0, Math.PI*2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-pig.r*0.3, -pig.r*0.15, pig.r*0.22, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(pig.r*0.3, -pig.r*0.15, pig.r*0.22, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(-pig.r*0.25, -pig.r*0.12, pig.r*0.12, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(pig.r*0.35, -pig.r*0.12, pig.r*0.12, 0, Math.PI*2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#55cc55';
  ctx.beginPath();
  ctx.ellipse(0, pig.r*0.25, pig.r*0.32, pig.r*0.22, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#228822';
  ctx.beginPath();
  ctx.arc(-pig.r*0.12, pig.r*0.25, pig.r*0.09, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(pig.r*0.12, pig.r*0.25, pig.r*0.09, 0, Math.PI*2);
  ctx.fill();

  // Smile or frown
  if (hpRatio < 0.5) {
    // Frown + stars
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, pig.r*0.55, pig.r*0.25, 0, Math.PI);
    ctx.stroke();
    // Stars around head
    ctx.fillStyle = '#ffdd00';
    ctx.font = `${pig.r*0.5}px Arial`;
    ctx.fillText('*', pig.r*0.8, -pig.r*0.7);
    ctx.fillText('*', -pig.r*1.1, -pig.r*0.5);
  } else {
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, pig.r*0.32, pig.r*0.2, 0, Math.PI, true);
    ctx.stroke();
  }

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function drawBirdQueue() {
  // Birds in queue on ground near slingshot
  const queueBirds = activeBird ? birds.slice(1) : birds;
  queueBirds.forEach((type, i) => {
    const x = 60 + i * 38;
    const y = GROUND_Y - 14;
    drawBird(x, y, 13, type, 0, false);
  });
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
let lastTime = 0;
function gameLoop(ts) {
  requestAnimationFrame(gameLoop);
  if (state !== 'playing') return;

  // Update
  updatePhysics();
  updateBlocks();
  updatePigs();
  updateParticles();

  // Update split birds
  splitBirds = splitBirds.filter(sb => sb.alive && sb.x < CANVAS_W+50 && sb.y < GROUND_Y+50);
  splitBirds.forEach(sb => {
    sb.vy += GRAVITY;
    sb.x += sb.vx; sb.y += sb.vy;
    sb.angle = Math.atan2(sb.vy, sb.vx);
    if (sb.y + sb.r >= GROUND_Y) { sb.alive = false; }
    // collisions
    blocks.forEach(blk => {
      if (!blk.alive) return;
      if (circlRectCollide(sb.x, sb.y, sb.r, blk.x, blk.y, blk.w, blk.h)) {
        const speed = Math.hypot(sb.vx, sb.vy);
        const m = MATERIAL[blk.mat];
        const dmg = Math.max(0, speed * sb.mass * 4 - m.defense);
        blk.hp -= dmg;
        if (blk.hp <= 0) { blk.alive = false; score += m.score; spawnParticles(blk.x+blk.w/2,blk.y+blk.h/2,m.color,8); }
        sb.alive = false;
        updateUI();
      }
    });
    pigs.forEach(pig => {
      if (!pig.alive) return;
      if (Math.hypot(sb.x-pig.x, sb.y-pig.y) < sb.r+pig.r) {
        pig.hp -= Math.hypot(sb.vx,sb.vy)*sb.mass*5;
        if (pig.hp <= 0) { pig.alive=false; score+=3000; spawnParticles(pig.x,pig.y,'#44cc44',15); }
        sb.alive = false;
        updateUI();
      }
    });
  });

  // Check if bird settled (only after it has been launched)
  if (activeBird && activeBird.launched && !activeBird.flying && activeBird.alive) {
    waitTimer--;
    if (waitTimer <= 0) {
      activeBird = null;
      birds.shift();
      spawnNextBird();
    }
  }
  if (activeBird && activeBird.launched && !activeBird.alive) {
    waitTimer--;
    if (waitTimer <= 0) {
      activeBird = null;
      birds.shift();
      spawnNextBird();
    }
  }

  // Check win/loss
  const alivePigs = pigs.filter(p=>p.alive).length;
  if (alivePigs === 0) {
    // Win!
    const remaining = birds.length; // birds[] still includes active bird (not yet shifted)
    score += remaining * 10000;
    endLevel(true);
    return;
  }
  if (!activeBird && birds.length === 0 && splitBirds.length === 0 && alivePigs > 0) {
    // all birds used, still pigs alive
    // wait for blocks to settle
    const anyMoving = blocks.some(b=>b.alive && (Math.abs(b.vx)>0.1||Math.abs(b.vy)>0.1));
    const pigsMoving = pigs.some(p=>p.alive && (Math.abs(p.vx)>0.1||Math.abs(p.vy)>0.1));
    if (!anyMoving && !pigsMoving) {
      endLevel(false);
      return;
    }
  }

  // Draw
  drawBackground();
  drawTrail();
  drawSlingshot();
  drawTrajectoryPreview();
  blocks.forEach(drawBlock);
  pigs.forEach(drawPig);
  drawParticles();
  splitBirds.forEach(sb => drawBird(sb.x, sb.y, sb.r, sb.type, sb.angle, false));
  if (activeBird) {
    if (dragCurrent && !activeBird.flying) {
      const {bx, by} = getClampedDrag();
      drawBird(bx, by, activeBird.r, activeBird.type, 0, true);
    } else {
      drawBird(activeBird.x, activeBird.y, activeBird.r, activeBird.type, activeBird.angle, false);
    }
  }
  drawBirdQueue();

  // Score display on canvas
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(CANVAS_W-140, 8, 132, 32);
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px Arial';
  ctx.fillText('分数: '+score, CANVAS_W-132, 29);
}

// ─── LEVEL END ────────────────────────────────────────────────────────────────
function endLevel(win) {
  state = 'levelEnd';
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('ab_best', bestScore);
  }
  if (win && !clearedLevels.includes(currentLevel)) {
    clearedLevels.push(currentLevel);
    localStorage.setItem('ab_cleared', JSON.stringify(clearedLevels));
  }

  const stars = win ? (score > 50000 ? 3 : score > 25000 ? 2 : 1) : 0;
  document.getElementById('overlay-title').textContent = win ? '关卡完成！' : '失败...';
  document.getElementById('overlay-sub').textContent = win
    ? `所有猪已消灭！`
    : `还有 ${pigs.filter(p=>p.alive).length} 只猪存活`;
  document.getElementById('overlay-score').style.display = 'block';
  document.getElementById('overlay-score').textContent = '得分: ' + score;

  const starsDiv = document.getElementById('overlay-stars');
  starsDiv.innerHTML = '';
  for (let i=0; i<3; i++) {
    const s = document.createElement('span');
    s.className = 'star';
    s.textContent = i < stars ? '⭐' : '☆';
    s.style.color = i < stars ? '#ffd700' : '#555';
    s.style.animationDelay = (i*0.15)+'s';
    starsDiv.appendChild(s);
  }

  const btnText = win && currentLevel < LEVELS.length-1 ? '下一关' : win ? '重玩' : '重试';
  document.getElementById('overlay-btn').textContent = btnText;
  document.getElementById('overlay-btn2').style.display = 'inline-block';
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('overlay-sub2').textContent = '';
  updateLevelButtons();

  // Draw final frame
  drawBackground();
  blocks.forEach(drawBlock);
  pigs.forEach(drawPig);
  drawParticles();
  if (activeBird) drawBird(activeBird.x, activeBird.y, activeBird.r, activeBird.type, activeBird.angle, false);
  drawBirdQueue();

  // AdSense
  try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e){}
}

// ─── UI ───────────────────────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('ui-level').textContent = currentLevel+1;
  document.getElementById('ui-score').textContent = score;
  document.getElementById('ui-best').textContent = bestScore;
  document.getElementById('ui-pigs').textContent = pigs.filter(p=>p.alive).length;

  const qDiv = document.getElementById('bird-queue');
  qDiv.innerHTML = '';
  // Show queued birds
  const list = (activeBird ? [activeBird.type] : []).concat(birds.slice(0, birds.length-(activeBird?1:0)+0));
  // Actually show: current bird + remaining queue
  const showList = activeBird ? [activeBird.type, ...birds] : [...birds];
  showList.forEach((type, i) => {
    const d = document.createElement('div');
    d.className = `bird-icon bird-${type}`;
    d.textContent = i===0 ? '→' : '';
    d.style.opacity = i===0 ? '1' : '0.7';
    qDiv.appendChild(d);
  });
}

function updateLevelButtons() {
  const container = document.getElementById('level-select-btns');
  container.innerHTML = '';
  LEVELS.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'lvl-btn';
    if (i === currentLevel) btn.classList.add('current');
    if (clearedLevels.includes(i)) btn.classList.add('cleared');
    btn.textContent = i+1;
    btn.onclick = () => {
      loadLevel(i);
    };
    container.appendChild(btn);
  });
}

function loadLevel(idx) {
  document.getElementById('overlay').style.display = 'none';
  state = 'playing';
  splitBirds = [];
  initLevel(idx);
  spawnNextBird();
  updateLevelButtons();
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

function isNearSling(x, y) {
  return Math.hypot(x-SLING_X, y-SLING_Y) < 60;
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('touchstart', onDown, {passive:false});
function onDown(e) {
  e.preventDefault();
  if (state !== 'playing') return;
  const pos = getCanvasPos(e);
  if (activeBird && !activeBird.flying && isNearSling(pos.x, pos.y)) {
    dragStart = pos;
    dragCurrent = pos;
  } else if (activeBird && activeBird.flying) {
    // Activate special ability
    activateBird();
  }
}

canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('touchmove', onMove, {passive:false});
function onMove(e) {
  e.preventDefault();
  if (!dragStart) return;
  dragCurrent = getCanvasPos(e);
}

canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('touchend', onUp);
function onUp(e) {
  if (!dragStart || !dragCurrent || !activeBird) {
    dragStart = null; dragCurrent = null;
    return;
  }
  const {bx, by} = getClampedDrag();
  const dx = SLING_X - bx;
  const dy = SLING_Y - by;
  const speed = Math.hypot(dx, dy) * 0.22;
  if (speed < 1) { dragStart=null; dragCurrent=null; return; }
  const angle = Math.atan2(dy, dx);
  activeBird.x = bx;
  activeBird.y = by;
  activeBird.vx = Math.cos(angle)*speed;
  activeBird.vy = Math.sin(angle)*speed;
  activeBird.flying = true;
  activeBird.launched = true;
  trailPoints = [];
  dragStart = null;
  dragCurrent = null;
}

// ─── OVERLAY BUTTONS ─────────────────────────────────────────────────────────
document.getElementById('overlay-btn').addEventListener('click', () => {
  const title = document.getElementById('overlay-title').textContent;
  if (title === '愤怒小鸟') {
    // first start
    loadLevel(0);
  } else if (title === '关卡完成！' && currentLevel < LEVELS.length-1) {
    loadLevel(currentLevel+1);
  } else {
    loadLevel(currentLevel);
  }
});

document.getElementById('overlay-btn2').addEventListener('click', () => {
  // Show level select — just stay on overlay but user can click level buttons
  // Reload to show overlay from start
  document.getElementById('overlay-title').textContent = '选择关卡';
  document.getElementById('overlay-sub').textContent = '点击下方按钮选择关卡';
  document.getElementById('overlay-sub2').textContent = '';
  document.getElementById('overlay-score').style.display = 'none';
  document.getElementById('overlay-stars').innerHTML = '';
  document.getElementById('overlay-btn').textContent = '重玩当前';
  document.getElementById('overlay-btn2').style.display = 'none';
  state = 'overlay';
  updateLevelButtons();
});

// ─── STARTUP ──────────────────────────────────────────────────────────────────
// Show initial overlay
document.getElementById('overlay-score').style.display = 'none';
document.getElementById('overlay-btn2').style.display = 'none';
document.getElementById('overlay').style.display = 'flex';

// Initial draw
initLevel(0);
updateLevelButtons();
updateUI();

// Draw static start screen
drawBackground();
drawSlingshot();
blocks.forEach(drawBlock);
pigs.forEach(drawPig);

// ─── PORTRAIT NOTICE DISMISS ──────────────────────────────────────────────────
document.getElementById('dismiss-portrait').addEventListener('click', () => {
  document.getElementById('portrait-notice').classList.add('dismissed');
});

// ─── LANDSCAPE SCALING ────────────────────────────────────────────────────────
function handleResize() {
  // Mobile landscape: short & wide screen (height < 500px)
  const isLandscapeMobile = window.innerHeight < 500 && window.innerWidth > window.innerHeight;
  if (isLandscapeMobile) {
    const scale = Math.min(window.innerWidth / CANVAS_W, window.innerHeight / CANVAS_H);
    canvas.style.width  = (CANVAS_W * scale) + 'px';
    canvas.style.height = (CANVAS_H * scale) + 'px';
  } else {
    canvas.style.width  = '';
    canvas.style.height = '';
  }
}
window.addEventListener('resize', handleResize);
window.addEventListener('orientationchange', handleResize);
handleResize();

requestAnimationFrame(gameLoop);

})();
