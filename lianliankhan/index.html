<script>
// ============================================================
//  CONSTANTS & CONFIG
// ============================================================
const COLS = 9;
const ROWS = 8;
const BASE_TIME = 120;

// 8 shape types
const SHAPES = ['circle','square','triangle','diamond','star','heart','hexagon','cross'];

// Colors for each shape type (neon palette)
const SHAPE_COLORS = [
  '#ff4466', // circle  - red-pink
  '#ffcc00', // square  - gold
  '#00ff88', // triangle- green
  '#aa44ff', // diamond - purple
  '#ff8800', // star    - orange
  '#ff44cc', // heart   - magenta
  '#00ccff', // hexagon - cyan
  '#44ffff', // cross   - aqua
];

// ============================================================
//  STATE
// ============================================================
let canvas, ctx;
let CELL_W, CELL_H;
let canvasW, canvasH;

let board = [];         // ROWS x COLS, null = empty, else {type, color}
let selected = null;    // {r, c}
let score = 0;
let level = 1;
let timeLeft = BASE_TIME;
let bestScore = parseInt(localStorage.getItem('llk_best') || '0');
let gameRunning = false;
let timerInterval = null;

let particles = [];     // active particle effects
let linePath = null;    // { points, alpha } for path display
let hintPair = null;    // { a: {r,c}, b: {r,c} }
let hintTimer = 0;

// ============================================================
//  INIT & RESIZE
// ============================================================
function init() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');

  resize();
  window.addEventListener('resize', resize);

  canvas.addEventListener('click', onCanvasClick);
  canvas.addEventListener('touchend', onCanvasTouch, { passive: false });

  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('restart-btn').addEventListener('click', restartGame);
  document.getElementById('hint-btn').addEventListener('click', showHint);
  document.getElementById('shuffle-btn').addEventListener('click', () => shuffleBoard(true));

  updateUI();
  requestAnimationFrame(gameLoop);
}

function resize() {
  const isMobile = window.innerWidth <= 600;
  const maxW = isMobile ? Math.min(window.innerWidth, 480) : Math.min(window.innerWidth - 320, 560);
  const maxH = isMobile ? (window.innerHeight - 70) : (window.innerHeight - 40);

  // Compute cell size
  CELL_W = Math.floor(Math.min(maxW / COLS, maxH / ROWS));
  CELL_H = CELL_W;
  canvasW = CELL_W * COLS;
  canvasH = CELL_H * ROWS;

  canvas.width = canvasW;
  canvas.height = canvasH;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
}

// ============================================================
//  GAME FLOW
// ============================================================
function startGame() {
  score = 0;
  level = 1;
  timeLeft = BASE_TIME;
  particles = [];
  linePath = null;
  hintPair = null;
  selected = null;

  buildBoard();
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('gameover-overlay').classList.add('hidden');
  gameRunning = true;

  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(tickTimer, 1000);

  updateUI();
}

function restartGame() {
  document.getElementById('gameover-overlay').classList.add('hidden');
  startGame();
}

function endGame(won) {
  gameRunning = false;
  clearInterval(timerInterval);

  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('llk_best', bestScore);
  }

  const overlay = document.getElementById('gameover-overlay');
  document.getElementById('gameover-title').textContent = won ? '恭喜通关！' : '时间到';
  document.getElementById('gameover-sub').textContent = won ? 'YOU WIN' : 'GAME OVER';
  document.getElementById('final-score').textContent = score;
  overlay.classList.remove('hidden');

  try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}

  updateUI();
}

function tickTimer() {
  if (!gameRunning) return;
  timeLeft--;
  if (timeLeft <= 0) {
    timeLeft = 0;
    updateUI();
    endGame(false);
  } else {
    updateUI();
  }
}

function nextLevel() {
  level++;
  timeLeft = Math.max(60, BASE_TIME - (level - 1) * 10);
  selected = null;
  hintPair = null;
  particles = [];
  linePath = null;

  buildBoard();
  updateUI();

  const toast = document.getElementById('level-toast');
  document.getElementById('toast-level-sub').textContent = 'LEVEL ' + level;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

// ============================================================
//  BOARD GENERATION
// ============================================================
function numTypes() {
  // level 1: 4 types, increases up to 8
  return Math.min(4 + (level - 1), 8);
}

function buildBoard() {
  const types = numTypes();
  const totalCells = ROWS * COLS; // 72
  // Must be even count per type; each type appears even number of times
  // Distribute evenly: 72 / types, ensure even
  let counts = new Array(types).fill(0);
  const pairsTotal = totalCells / 2; // 36 pairs
  // Distribute pairs roughly equally
  for (let i = 0; i < pairsTotal; i++) {
    counts[i % types]++;
  }

  let cells = [];
  for (let t = 0; t < types; t++) {
    for (let k = 0; k < counts[t] * 2; k++) {
      cells.push(t);
    }
  }

  // Shuffle cells
  shuffle(cells);

  // Build board 2D
  board = [];
  let idx = 0;
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      const t = cells[idx++];
      board[r][c] = { type: t };
    }
  }

  // Ensure at least one valid pair exists (reshuffle if not)
  let attempts = 0;
  while (!hasAnyMatch() && attempts < 200) {
    shuffle(cells);
    idx = 0;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        board[r][c] = { type: cells[idx++] };
      }
    }
    attempts++;
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function shuffleBoard(showToast) {
  if (!gameRunning) return;

  // Collect all remaining cells
  let remaining = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = board[r] && board[r][c];
      if (cell !== null && cell !== undefined) {
        remaining.push(cell.type);
      }
    }
  }

  if (remaining.length === 0) return;

  shuffle(remaining);

  let idx = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r] && board[r][c] !== null && board[r][c] !== undefined) {
        board[r][c] = { type: remaining[idx++] };
      }
    }
  }

  // Try until match found
  let attempts = 0;
  while (!hasAnyMatch() && attempts < 300 && remaining.length >= 2) {
    shuffle(remaining);
    idx = 0;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (board[r] && board[r][c] !== null && board[r][c] !== undefined) {
          board[r][c] = { type: remaining[idx++] };
        }
      }
    }
    attempts++;
  }

  selected = null;
  hintPair = null;

  if (showToast) {
    const toast = document.getElementById('shuffle-toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1200);
  }
}

// ============================================================
//  MATCHING & PATH FINDING
// ============================================================

function getCell(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return undefined;
  if (!board[r]) return undefined;
  return board[r][c];
}

function isEmpty(r, c) {
  // Out of board bounds: treat as passable (the "virtual border")
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return true;
  const cell = getCell(r, c);
  return cell === null || cell === undefined;
}

// Check if two cells can be connected with at most 2 bends.
// Returns the path (array of {r,c} points) or null.
function findPath(r1, c1, r2, c2) {
  if (r1 === r2 && c1 === c2) return null;

  // Direct line: 0 bends
  if (r1 === r2) {
    if (lineClear(r1, c1, r1, c2, r1, c1, r2, c2)) {
      return [{r:r1,c:c1}, {r:r2,c:c2}];
    }
  }
  if (c1 === c2) {
    if (lineClear(r1, c1, r2, c2, r1, c1, r2, c2)) {
      return [{r:r1,c:c1}, {r:r2,c:c2}];
    }
  }

  // 1 bend: L-shape via corner (r1,c2) or (r2,c1)
  // Corner (r1, c2)
  {
    const cr = r1, cc = c2;
    if (isEmpty(cr, cc) &&
        lineClear(r1, c1, cr, cc, r1, c1, r2, c2) &&
        lineClear(cr, cc, r2, c2, r1, c1, r2, c2)) {
      return [{r:r1,c:c1}, {r:cr,c:cc}, {r:r2,c:c2}];
    }
  }
  // Corner (r2, c1)
  {
    const cr = r2, cc = c1;
    if (isEmpty(cr, cc) &&
        lineClear(r1, c1, cr, cc, r1, c1, r2, c2) &&
        lineClear(cr, cc, r2, c2, r1, c1, r2, c2)) {
      return [{r:r1,c:c1}, {r:cr,c:cc}, {r:r2,c:c2}];
    }
  }

  // 2 bends: try every row as intermediate row, then every col
  // Two bends via same row segment:
  // (r1,c1) -> (r1,cx) -> (r2,cx) -> (r2,c2)  for any valid cx (including outside board)
  // Extend col range to include virtual border
  for (let cx = -1; cx <= COLS; cx++) {
    if (cx === c1 && cx === c2) continue; // already covered by 1 bend
    if (isEmpty(r1, cx) && isEmpty(r2, cx) &&
        lineClear(r1, c1, r1, cx, r1, c1, r2, c2) &&
        lineClear(r1, cx, r2, cx, r1, c1, r2, c2) &&
        lineClear(r2, cx, r2, c2, r1, c1, r2, c2)) {
      return [{r:r1,c:c1}, {r:r1,c:cx}, {r:r2,c:cx}, {r:r2,c:c2}];
    }
  }

  // Two bends via same col segment:
  // (r1,c1) -> (ry,c1) -> (ry,c2) -> (r2,c2)  for any valid ry
  for (let ry = -1; ry <= ROWS; ry++) {
    if (ry === r1 && ry === r2) continue;
    if (isEmpty(ry, c1) && isEmpty(ry, c2) &&
        lineClear(r1, c1, ry, c1, r1, c1, r2, c2) &&
        lineClear(ry, c1, ry, c2, r1, c1, r2, c2) &&
        lineClear(ry, c2, r2, c2, r1, c1, r2, c2)) {
      return [{r:r1,c:c1}, {r:ry,c:c1}, {r:ry,c:c2}, {r:r2,c:c2}];
    }
  }

  return null;
}

// Check if a straight line from (r1,c1) to (r2,c2) is clear.
// The line must be horizontal or vertical.
// Ignores the two original tile positions (sr1,sc1) and (sr2,sc2).
function lineClear(r1, c1, r2, c2, sr1, sc1, sr2, sc2) {
  if (r1 === r2) {
    const minC = Math.min(c1, c2);
    const maxC = Math.max(c1, c2);
    for (let c = minC + 1; c < maxC; c++) {
      if (!isCellPassable(r1, c, sr1, sc1, sr2, sc2)) return false;
    }
    return true;
  }
  if (c1 === c2) {
    const minR = Math.min(r1, r2);
    const maxR = Math.max(r1, r2);
    for (let r = minR + 1; r < maxR; r++) {
      if (!isCellPassable(r, c1, sr1, sc1, sr2, sc2)) return false;
    }
    return true;
  }
  return false; // Not straight line
}

function isCellPassable(r, c, sr1, sc1, sr2, sc2) {
  // Out of board -> passable (virtual border)
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return true;
  // The two selected tiles themselves are "passable" for path through them
  if (r === sr1 && c === sc1) return true;
  if (r === sr2 && c === sc2) return true;
  return isEmpty(r, c);
}

function hasAnyMatch() {
  const pairs = findAllPairs();
  return pairs.length > 0;
}

function findAllPairs() {
  const pairs = [];
  const cells = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = getCell(r, c);
      if (cell !== null && cell !== undefined) {
        cells.push({r, c, type: cell.type});
      }
    }
  }

  for (let i = 0; i < cells.length; i++) {
    for (let j = i + 1; j < cells.length; j++) {
      if (cells[i].type === cells[j].type) {
        const path = findPath(cells[i].r, cells[i].c, cells[j].r, cells[j].c);
        if (path) {
          pairs.push({a: cells[i], b: cells[j], path});
          if (pairs.length >= 5) return pairs; // enough for hint check
        }
      }
    }
  }
  return pairs;
}

function isBoardEmpty() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = getCell(r, c);
      if (cell !== null && cell !== undefined) return false;
    }
  }
  return true;
}

// ============================================================
//  INTERACTION
// ============================================================
function getCellFromPos(x, y) {
  const c = Math.floor(x / CELL_W);
  const r = Math.floor(y / CELL_H);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
  return {r, c};
}

function onCanvasClick(e) {
  if (!gameRunning) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  handleSelect(x, y);
}

function onCanvasTouch(e) {
  e.preventDefault();
  if (!gameRunning) return;
  if (e.changedTouches.length === 0) return;
  const rect = canvas.getBoundingClientRect();
  const touch = e.changedTouches[0];
  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;
  handleSelect(x, y);
}

function handleSelect(x, y) {
  hintPair = null;
  const pos = getCellFromPos(x, y);
  if (!pos) return;
  const {r, c} = pos;

  const cell = getCell(r, c);
  if (cell === null || cell === undefined) {
    // Clicked empty cell
    selected = null;
    return;
  }

  if (!selected) {
    selected = {r, c};
    return;
  }

  // Same cell -> deselect
  if (selected.r === r && selected.c === c) {
    selected = null;
    return;
  }

  const selCell = getCell(selected.r, selected.c);
  if (!selCell) { selected = {r, c}; return; }

  if (selCell.type === cell.type) {
    // Try to connect
    const path = findPath(selected.r, selected.c, r, c);
    if (path) {
      // Eliminate!
      eliminatePair(selected.r, selected.c, r, c, path);
      selected = null;
      linePath = null;
    } else {
      // Can't connect, re-select new cell
      selected = {r, c};
    }
  } else {
    // Different type
    selected = {r, c};
  }
}

function eliminatePair(r1, c1, r2, c2, path) {
  // Spawn particles
  spawnParticles(r1, c1);
  spawnParticles(r2, c2);

  // Show path briefly
  linePath = { points: path, alpha: 1.0, timer: 0 };

  // Remove cells
  board[r1][c1] = null;
  board[r2][c2] = null;

  // Score
  score += 100 * level;
  updateUI();

  // Check win
  if (isBoardEmpty()) {
    setTimeout(() => {
      nextLevel();
    }, 600);
    return;
  }

  // Check if any match remains
  setTimeout(() => {
    if (!gameRunning) return;
    if (!hasAnyMatch()) {
      shuffleBoard(true);
    }
  }, 300);
}

function showHint() {
  if (!gameRunning) return;
  const pairs = findAllPairs();
  if (pairs.length > 0) {
    const p = pairs[Math.floor(Math.random() * pairs.length)];
    hintPair = {a: p.a, b: p.b};
    hintTimer = 0;
  } else {
    shuffleBoard(true);
  }
}

// ============================================================
//  PARTICLES
// ============================================================
function spawnParticles(r, c) {
  const cx = c * CELL_W + CELL_W / 2;
  const cy = r * CELL_H + CELL_H / 2;
  const cell = getCell(r, c);
  const color = cell ? SHAPE_COLORS[cell.type] : '#00ccff';

  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 * i) / 12 + Math.random() * 0.3;
    const speed = 1.5 + Math.random() * 2.5;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.025 + Math.random() * 0.02,
      size: 2 + Math.random() * 3,
      color
    });
  }
}

// ============================================================
//  RENDERING
// ============================================================
let lastTime = 0;
function gameLoop(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  update(dt);
  draw();

  requestAnimationFrame(gameLoop);
}

function update(dt) {
  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08; // gravity
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update line path
  if (linePath) {
    linePath.timer += dt;
    linePath.alpha = Math.max(0, 1 - linePath.timer / 400);
    if (linePath.alpha <= 0) linePath = null;
  }

  // Update hint blink
  if (hintPair) {
    hintTimer += dt;
  }
}

function draw() {
  ctx.clearRect(0, 0, canvasW, canvasH);

  // Background grid
  drawGrid();

  // Cells
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = getCell(r, c);
      if (cell !== null && cell !== undefined) {
        drawCell(r, c, cell);
      }
    }
  }

  // Selection highlight
  if (selected) {
    const cell = getCell(selected.r, selected.c);
    if (cell !== null && cell !== undefined) {
      drawSelection(selected.r, selected.c);
    }
  }

  // Hint highlight
  if (hintPair) {
    const blinkOn = Math.floor(hintTimer / 300) % 2 === 0;
    if (blinkOn) {
      drawHint(hintPair.a.r, hintPair.a.c);
      drawHint(hintPair.b.r, hintPair.b.c);
    }
  }

  // Line path
  if (linePath && linePath.alpha > 0) {
    drawLinePath(linePath);
  }

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawGrid() {
  ctx.save();
  ctx.strokeStyle = 'rgba(0, 204, 255, 0.07)';
  ctx.lineWidth = 1;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * CELL_H);
    ctx.lineTo(canvasW, r * CELL_H);
    ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c * CELL_W, 0);
    ctx.lineTo(c * CELL_W, canvasH);
    ctx.stroke();
  }
  ctx.restore();
}

function drawCell(r, c, cell) {
  const x = c * CELL_W;
  const y = r * CELL_H;
  const pad = Math.max(4, CELL_W * 0.1);
  const color = SHAPE_COLORS[cell.type];
  const shape = SHAPES[cell.type];

  // Cell background
  ctx.save();
  ctx.fillStyle = 'rgba(0,30,60,0.5)';
  roundRect(ctx, x + 1, y + 1, CELL_W - 2, CELL_H - 2, 4);
  ctx.fill();

  // Draw shape
  const cx = x + CELL_W / 2;
  const cy = y + CELL_H / 2;
  const size = (Math.min(CELL_W, CELL_H) / 2) - pad;

  ctx.shadowColor = color;
  ctx.shadowBlur = 10;
  ctx.fillStyle = color;
  ctx.strokeStyle = color;

  drawShape(ctx, shape, cx, cy, size);

  ctx.restore();
}

function drawShape(ctx, shape, cx, cy, size) {
  ctx.beginPath();
  switch (shape) {
    case 'circle':
      ctx.arc(cx, cy, size, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'square':
      ctx.fillRect(cx - size * 0.85, cy - size * 0.85, size * 1.7, size * 1.7);
      break;

    case 'triangle':
      ctx.moveTo(cx, cy - size);
      ctx.lineTo(cx + size * 0.866, cy + size * 0.5);
      ctx.lineTo(cx - size * 0.866, cy + size * 0.5);
      ctx.closePath();
      ctx.fill();
      break;

    case 'diamond':
      ctx.moveTo(cx, cy - size);
      ctx.lineTo(cx + size * 0.7, cy);
      ctx.lineTo(cx, cy + size);
      ctx.lineTo(cx - size * 0.7, cy);
      ctx.closePath();
      ctx.fill();
      break;

    case 'star':
      drawStar(ctx, cx, cy, 5, size, size * 0.42);
      ctx.fill();
      break;

    case 'heart':
      drawHeart(ctx, cx, cy, size);
      ctx.fill();
      break;

    case 'hexagon':
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 6;
        const hx = cx + size * Math.cos(angle);
        const hy = cy + size * Math.sin(angle);
        if (i === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
      }
      ctx.closePath();
      ctx.fill();
      break;

    case 'cross':
      const arm = size * 0.35;
      ctx.fillRect(cx - arm, cy - size, arm * 2, size * 2);
      ctx.fillRect(cx - size, cy - arm, size * 2, arm * 2);
      break;
  }
}

function drawStar(ctx, cx, cy, points, outerR, innerR) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = (Math.PI * i) / points - Math.PI / 2;
    const r = i % 2 === 0 ? outerR : innerR;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function drawHeart(ctx, cx, cy, size) {
  const s = size * 0.9;
  ctx.beginPath();
  ctx.moveTo(cx, cy + s * 0.8);
  ctx.bezierCurveTo(cx - s * 1.2, cy + s * 0.2, cx - s * 1.2, cy - s * 0.8, cx, cy - s * 0.2);
  ctx.bezierCurveTo(cx + s * 1.2, cy - s * 0.8, cx + s * 1.2, cy + s * 0.2, cx, cy + s * 0.8);
  ctx.closePath();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawSelection(r, c) {
  const x = c * CELL_W + 1;
  const y = r * CELL_H + 1;
  const w = CELL_W - 2;
  const h = CELL_H - 2;

  ctx.save();
  ctx.strokeStyle = '#00ccff';
  ctx.lineWidth = 2.5;
  ctx.shadowColor = '#00ccff';
  ctx.shadowBlur = 12;
  roundRect(ctx, x, y, w, h, 4);
  ctx.stroke();
  ctx.restore();
}

function drawHint(r, c) {
  const x = c * CELL_W + 1;
  const y = r * CELL_H + 1;
  const w = CELL_W - 2;
  const h = CELL_H - 2;

  ctx.save();
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 2.5;
  ctx.shadowColor = '#ffcc00';
  ctx.shadowBlur = 16;
  roundRect(ctx, x, y, w, h, 4);
  ctx.stroke();
  ctx.restore();
}

function drawLinePath(lp) {
  if (!lp || lp.points.length < 2) return;

  ctx.save();
  ctx.globalAlpha = lp.alpha;
  ctx.strokeStyle = '#00ccff';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#00ccff';
  ctx.shadowBlur = 12;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.setLineDash([6, 4]);

  ctx.beginPath();
  for (let i = 0; i < lp.points.length; i++) {
    const pt = lp.points[i];
    // Clamp coordinates to canvas for virtual border points
    const px = Math.max(0, Math.min(canvasW - 1, pt.c * CELL_W + CELL_W / 2));
    const py = Math.max(0, Math.min(canvasH - 1, pt.r * CELL_H + CELL_H / 2));
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.stroke();
  ctx.restore();
}

// ============================================================
//  UI UPDATE
// ============================================================
function updateUI() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('level-display').textContent = level;
  document.getElementById('time-display').textContent = timeLeft;
  document.getElementById('best-display').textContent = bestScore;

  document.getElementById('m-score').textContent = score;
  document.getElementById('m-level').textContent = level;
  document.getElementById('m-time').textContent = timeLeft;
  document.getElementById('m-best').textContent = bestScore;

  // Time bar
  const maxTime = Math.max(60, BASE_TIME - (level - 1) * 10);
  const pct = Math.max(0, timeLeft / maxTime * 100);
  const bar = document.getElementById('time-bar');
  bar.style.width = pct + '%';
  if (pct > 50) {
    bar.style.background = 'linear-gradient(90deg, #00ccff, #0066ff)';
  } else if (pct > 25) {
    bar.style.background = 'linear-gradient(90deg, #ffaa00, #ff6600)';
  } else {
    bar.style.background = 'linear-gradient(90deg, #ff3300, #ff0066)';
  }
}

// ============================================================
//  START
// ============================================================
window.addEventListener('DOMContentLoaded', init);
</script>
