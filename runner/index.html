<script>
(function() {
'use strict';

// ─── Canvas setup ───────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const CW = canvas.width;   // 560
const CH = canvas.height;  // 320
const GROUND_Y = CH - 52;  // y of top of ground

// ─── Game state ─────────────────────────────────────────────────
let state = 'idle'; // idle | running | dead
let score = 0;
let bestScore = parseInt(localStorage.getItem('runner_best') || '0');
let coins = 0;
let gameSpeed = 3.5;
let frameCount = 0;
let lastTime = 0;
let animId = null;

// ─── Player ─────────────────────────────────────────────────────
const PLAYER_W = 26;
const PLAYER_H = 36;
const PLAYER_X = 80;
const GRAVITY = 0.52;
const JUMP_VY = -11.5;
const JUMP2_VY = -10;

let player = {};

function resetPlayer() {
  player = {
    x: PLAYER_X,
    y: GROUND_Y - PLAYER_H,
    vy: 0,
    onGround: false,
    jumpsLeft: 2,
    frame: 0,
    frameTick: 0,
    // powerups
    shieldTimer: 0,
    springTimer: 0,
    magnetTimer: 0,
    invincibleFlash: 0,
    dead: false
  };
}

// ─── Background layers ──────────────────────────────────────────
const bgLayers = [
  { offset: 0, speed: 0.3, shapes: generateBgLayer(0) },
  { offset: 0, speed: 0.65, shapes: generateBgLayer(1) },
  { offset: 0, speed: 1.1, shapes: generateBgLayer(2) }
];

function generateBgLayer(layerIndex) {
  const shapes = [];
  const count = 12;
  for (let i = 0; i < count; i++) {
    const x = (CW / count) * i + Math.random() * 30;
    if (layerIndex === 0) {
      // Far mountains
      shapes.push({ type: 'mountain', x, w: 60 + Math.random() * 80, h: 40 + Math.random() * 50 });
    } else if (layerIndex === 1) {
      // City silhouette
      shapes.push({ type: 'building', x, w: 20 + Math.random() * 30, h: 50 + Math.random() * 80 });
    } else {
      // Near buildings
      shapes.push({ type: 'nearBuilding', x, w: 14 + Math.random() * 18, h: 30 + Math.random() * 60 });
    }
  }
  return shapes;
}

// ─── Obstacles ──────────────────────────────────────────────────
let obstacles = [];
let obstacleTimer = 0;
let obstacleInterval = 90; // frames

function spawnObstacle() {
  const types = ['short', 'tall', 'combo', 'air', 'platform'];
  const weights = [30, 20, 15, 20, 15];
  const type = weightedRandom(types, weights);

  if (type === 'short') {
    obstacles.push({ x: CW + 10, y: GROUND_Y - 28, w: 22, h: 28, color: '#cc44ff', glowColor: 'rgba(200,40,255,0.6)', moving: false });
  } else if (type === 'tall') {
    obstacles.push({ x: CW + 10, y: GROUND_Y - 56, w: 18, h: 56, color: '#ff3333', glowColor: 'rgba(255,40,40,0.6)', moving: false });
  } else if (type === 'combo') {
    obstacles.push({ x: CW + 10, y: GROUND_Y - 28, w: 20, h: 28, color: '#cc44ff', glowColor: 'rgba(200,40,255,0.6)', moving: false });
    obstacles.push({ x: CW + 42, y: GROUND_Y - 44, w: 16, h: 44, color: '#ff3333', glowColor: 'rgba(255,40,40,0.6)', moving: false });
  } else if (type === 'air') {
    const airY = GROUND_Y - 100 - Math.random() * 40;
    obstacles.push({ x: CW + 10, y: airY, w: 32, h: 22, color: '#ff6622', glowColor: 'rgba(255,80,20,0.6)', moving: false });
  } else if (type === 'platform') {
    const platY = GROUND_Y - 70 - Math.random() * 30;
    obstacles.push({ x: CW + 10, y: platY, w: 70, h: 14, color: '#00e5ff', glowColor: 'rgba(0,229,255,0.5)', moving: true, isPlatform: true, vy: 0, baseY: platY });
  }
}

function weightedRandom(items, weights) {
  let total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < items.length; i++) {
    r -= weights[i];
    if (r <= 0) return items[i];
  }
  return items[0];
}

// ─── Coins ──────────────────────────────────────────────────────
let coinObjects = [];
let coinTimer = 0;
let coinInterval = 55;

function spawnCoins() {
  const count = 3 + Math.floor(Math.random() * 4);
  const startX = CW + 20;
  const y = GROUND_Y - 40 - Math.random() * 60;
  for (let i = 0; i < count; i++) {
    coinObjects.push({ x: startX + i * 28, y, r: 8, angle: 0, collected: false });
  }
}

// ─── Powerups ────────────────────────────────────────────────────
let powerups = [];
let powerupTimer = 0;
const POWERUP_INTERVAL = 420;

function spawnPowerup() {
  const types = ['shield', 'spring', 'magnet'];
  const type = types[Math.floor(Math.random() * types.length)];
  powerups.push({
    x: CW + 20,
    y: GROUND_Y - 50 - Math.random() * 40,
    type,
    r: 12,
    angle: 0
  });
}

// ─── Particles ──────────────────────────────────────────────────
let particles = [];

function emitFootParticle(x, y) {
  for (let i = 0; i < 5; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 10,
      y,
      vx: (Math.random() - 0.5) * 2,
      vy: -Math.random() * 2,
      life: 1,
      decay: 0.06 + Math.random() * 0.04,
      size: 2 + Math.random() * 3,
      color: '#ff8c00'
    });
  }
}

function emitExplosion(x, y) {
  for (let i = 0; i < 22; i++) {
    const angle = (Math.PI * 2 / 22) * i + Math.random() * 0.3;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.03 + Math.random() * 0.03,
      size: 3 + Math.random() * 5,
      color: ['#ff8c00', '#ff4500', '#ffd700', '#ffffff'][Math.floor(Math.random() * 4)]
    });
  }
}

// ─── Input ──────────────────────────────────────────────────────
let lastTapTime = 0;

function doJump() {
  if (state !== 'running') return;
  if (player.springTimer > 0 && player.jumpsLeft >= 2) {
    // spring super jump
    player.vy = JUMP_VY * 1.6;
    player.jumpsLeft--;
    player.onGround = false;
  } else if (player.jumpsLeft > 0) {
    player.vy = player.jumpsLeft === 2 ? JUMP_VY : JUMP2_VY;
    player.jumpsLeft--;
    player.onGround = false;
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    doJump();
  }
});

canvas.addEventListener('click', () => doJump());
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const now = Date.now();
  doJump();
  lastTapTime = now;
}, { passive: false });

document.getElementById('btnStart').addEventListener('click', startGame);
document.getElementById('btnRestart').addEventListener('click', startGame);

// ─── UI helpers ─────────────────────────────────────────────────
function updateUI() {
  const sc = Math.floor(score);
  const sp = gameSpeed.toFixed(1) + '×';
  document.getElementById('pScore').textContent = sc;
  document.getElementById('pBest').textContent = bestScore;
  document.getElementById('pCoins').textContent = coins;
  document.getElementById('pSpeed').textContent = sp;
  document.getElementById('mScore').textContent = sc;
  document.getElementById('mBest').textContent = bestScore;
  document.getElementById('mCoins').textContent = coins;
  document.getElementById('mSpeed').textContent = sp;
}

function showStartOverlay() {
  document.getElementById('startOverlay').style.display = 'flex';
  document.getElementById('gameOverOverlay').style.display = 'none';
}

function showGameOver() {
  document.getElementById('gameOverOverlay').style.display = 'flex';
  document.getElementById('oScore').textContent = Math.floor(score);
  document.getElementById('oBest').textContent = bestScore;
  document.getElementById('oCoins').textContent = coins;
  // Try to push adsense
  try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
}

// ─── Game lifecycle ──────────────────────────────────────────────
function startGame() {
  document.getElementById('startOverlay').style.display = 'none';
  document.getElementById('gameOverOverlay').style.display = 'none';

  state = 'running';
  score = 0;
  coins = 0;
  gameSpeed = 3.5;
  frameCount = 0;
  obstacles = [];
  coinObjects = [];
  powerups = [];
  particles = [];
  obstacleTimer = 0;
  coinTimer = 0;
  powerupTimer = 0;

  resetPlayer();

  // reset bg offsets
  bgLayers.forEach(l => l.offset = 0);

  if (animId) cancelAnimationFrame(animId);
  lastTime = performance.now();
  animId = requestAnimationFrame(gameLoop);
}

// ─── Main loop ───────────────────────────────────────────────────
function gameLoop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 2.5); // cap at 2.5x frame
  lastTime = ts;

  if (state === 'running') {
    update(dt);
  }
  render();
  updateUI();

  if (state !== 'dead') {
    animId = requestAnimationFrame(gameLoop);
  }
}

// ─── Update ─────────────────────────────────────────────────────
function update(dt) {
  frameCount++;

  // Speed increase
  gameSpeed += 0.0008 * dt;
  if (gameSpeed > 12) gameSpeed = 12;

  // Score
  score += gameSpeed * 0.05 * dt;
  if (score > bestScore) {
    bestScore = Math.floor(score);
    localStorage.setItem('runner_best', bestScore);
  }

  // Obstacle interval shrinks with speed
  obstacleInterval = Math.max(55, 90 - (gameSpeed - 3.5) * 6);

  // Spawn obstacles
  obstacleTimer += dt;
  if (obstacleTimer >= obstacleInterval) {
    obstacleTimer = 0;
    spawnObstacle();
  }

  // Spawn coins
  coinTimer += dt;
  if (coinTimer >= coinInterval) {
    coinTimer = 0;
    spawnCoins();
  }

  // Spawn powerups
  powerupTimer += dt;
  if (powerupTimer >= POWERUP_INTERVAL) {
    powerupTimer = 0;
    spawnPowerup();
  }

  // BG parallax
  bgLayers.forEach(l => {
    l.offset += l.speed * gameSpeed * 0.5 * dt;
  });

  // Player physics
  player.vy += GRAVITY * dt;
  player.y += player.vy * dt;

  // Ground collision
  if (player.y >= GROUND_Y - PLAYER_H) {
    player.y = GROUND_Y - PLAYER_H;
    if (player.vy > 0) {
      if (!player.onGround) {
        emitFootParticle(player.x + PLAYER_W / 2, GROUND_Y);
      }
      player.vy = 0;
      player.onGround = true;
      player.jumpsLeft = 2;
    }
  } else {
    player.onGround = false;
  }

  // Player run animation
  if (player.onGround) {
    player.frameTick += dt;
    if (player.frameTick >= 6) {
      player.frameTick = 0;
      player.frame = (player.frame + 1) % 4;
    }
  }

  // Power-up timers
  if (player.shieldTimer > 0) player.shieldTimer -= dt;
  if (player.springTimer > 0) player.springTimer -= dt;
  if (player.magnetTimer > 0) player.magnetTimer -= dt;
  if (player.invincibleFlash > 0) player.invincibleFlash -= dt;

  // Move & cull obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    if (!o) continue;
    o.x -= gameSpeed * dt;
    if (o.isPlatform) {
      // slight vertical oscillation
      o.baseY = o.baseY || o.y;
      o.angle = (o.angle || 0) + 0.03 * dt;
      o.y = o.baseY + Math.sin(o.angle) * 12;
    }
    if (o.x + o.w < -20) {
      obstacles.splice(i, 1);
      continue;
    }
    // Platform: player can stand on top
    if (o.isPlatform) {
      const margin = 6;
      const px = player.x + margin, pw = PLAYER_W - margin * 2;
      const prevBottom = player.y + PLAYER_H - player.vy * dt;
      const curBottom = player.y + PLAYER_H;
      const overlapX = px < o.x + o.w && px + pw > o.x;
      if (overlapX && player.vy >= 0 && prevBottom <= o.y + 2 && curBottom >= o.y) {
        player.y = o.y - PLAYER_H;
        player.vy = 0;
        player.onGround = true;
        player.jumpsLeft = 2;
        if (!player.onGround) emitFootParticle(player.x + PLAYER_W / 2, o.y);
      }
      continue; // platforms don't kill
    }
    // Collision (AABB with margin)
    if (player.shieldTimer > 0 || player.invincibleFlash > 0) continue;
    if (aabbCollide(player, o, 4)) {
      killPlayer();
      return;
    }
  }

  // Move & collect coins
  const magnetRange = player.magnetTimer > 0 ? 120 : 0;
  for (let i = coinObjects.length - 1; i >= 0; i--) {
    const c = coinObjects[i];
    if (!c) continue;
    c.x -= gameSpeed * dt;
    c.angle += 0.08 * dt;
    // Magnet
    if (magnetRange > 0) {
      const dx = player.x + PLAYER_W / 2 - c.x;
      const dy = player.y + PLAYER_H / 2 - c.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < magnetRange) {
        c.x += dx * 0.12 * dt;
        c.y += dy * 0.12 * dt;
      }
    }
    if (c.x + c.r < -10) { coinObjects.splice(i, 1); continue; }
    if (!c.collected) {
      const cx = player.x + PLAYER_W / 2, cy = player.y + PLAYER_H / 2;
      const dist = Math.sqrt((cx - c.x) ** 2 + (cy - c.y) ** 2);
      if (dist < c.r + 14) {
        c.collected = true;
        coins++;
        score += 5;
        coinObjects.splice(i, 1);
      }
    }
  }

  // Move & collect powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    if (!p) continue;
    p.x -= gameSpeed * dt;
    p.angle += 0.06 * dt;
    if (p.x + p.r < -10) { powerups.splice(i, 1); continue; }
    const cx = player.x + PLAYER_W / 2, cy = player.y + PLAYER_H / 2;
    const dist = Math.sqrt((cx - p.x) ** 2 + (cy - p.y) ** 2);
    if (dist < p.r + 14) {
      if (p.type === 'shield') player.shieldTimer = 180;
      if (p.type === 'spring') player.springTimer = 240;
      if (p.type === 'magnet') player.magnetTimer = 300;
      powerups.splice(i, 1);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    if (!p) continue;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.15 * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function aabbCollide(p, o, margin) {
  return (
    p.x + margin < o.x + o.w - margin &&
    p.x + PLAYER_W - margin > o.x + margin &&
    p.y + margin < o.y + o.h - margin &&
    p.y + PLAYER_H - margin > o.y + margin
  );
}

function killPlayer() {
  state = 'dead';
  player.dead = true;
  emitExplosion(player.x + PLAYER_W / 2, player.y + PLAYER_H / 2);
  // Render one more frame then show overlay
  render();
  setTimeout(() => {
    showGameOver();
  }, 800);
}

// ─── Render ─────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, CW, CH);

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  skyGrad.addColorStop(0, '#07080f');
  skyGrad.addColorStop(1, '#110820');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, CW, GROUND_Y);

  // Background layers
  drawBgLayer(0, 'rgba(40,15,60,0.5)', 'rgba(30,10,50,0.3)');
  drawBgLayer(1, 'rgba(60,20,100,0.6)', 'rgba(40,15,80,0.4)');
  drawBgLayer(2, 'rgba(20,20,50,0.8)', 'rgba(10,10,30,0.6)');

  // Ground
  drawGround();

  // Obstacles
  obstacles.forEach(o => { if (o) drawObstacle(o); });

  // Coins
  coinObjects.forEach(c => { if (c) drawCoin(c); });

  // Powerups
  powerups.forEach(p => { if (p) drawPowerup(p); });

  // Player
  if (!player.dead || (player.dead && particles.length > 0)) {
    drawPlayer();
  }

  // Particles
  particles.forEach(p => { if (p) drawParticle(p); });

  // HUD overlay (speed trail)
  if (gameSpeed > 7) {
    const alpha = Math.min((gameSpeed - 7) / 5, 0.15);
    ctx.fillStyle = `rgba(255,60,0,${alpha})`;
    ctx.fillRect(0, 0, CW, CH);
  }
}

function drawBgLayer(idx, fillColor, accentColor) {
  const layer = bgLayers[idx];
  const shapes = layer.shapes;
  const off = layer.offset % CW;

  for (let rep = -1; rep <= 1; rep++) {
    shapes.forEach(s => {
      const sx = ((s.x - off + CW * 10) % (CW * 1.2)) - 20 + rep * CW * 1.2;
      if (sx > CW + 100 || sx + (s.w || 60) < -100) return;

      ctx.fillStyle = fillColor;
      ctx.shadowColor = accentColor;
      ctx.shadowBlur = 8;

      if (s.type === 'mountain') {
        ctx.beginPath();
        ctx.moveTo(sx, GROUND_Y - 10);
        ctx.lineTo(sx + s.w / 2, GROUND_Y - 10 - s.h);
        ctx.lineTo(sx + s.w, GROUND_Y - 10);
        ctx.closePath();
        ctx.fill();
      } else if (s.type === 'building') {
        ctx.fillRect(sx, GROUND_Y - s.h - 8, s.w, s.h);
        // windows
        ctx.fillStyle = accentColor;
        ctx.shadowBlur = 0;
        for (let wy = GROUND_Y - s.h; wy < GROUND_Y - 12; wy += 12) {
          for (let wx = sx + 4; wx < sx + s.w - 4; wx += 8) {
            if (Math.random() > 0.4) ctx.fillRect(wx, wy, 4, 6);
          }
        }
      } else {
        ctx.fillRect(sx, GROUND_Y - s.h - 4, s.w, s.h);
      }

      ctx.shadowBlur = 0;
    });
  }
}

function drawGround() {
  // Ground base
  const grad = ctx.createLinearGradient(0, GROUND_Y, 0, CH);
  grad.addColorStop(0, '#1a0a30');
  grad.addColorStop(1, '#0a0510');
  ctx.fillStyle = grad;
  ctx.fillRect(0, GROUND_Y, CW, CH - GROUND_Y);

  // Neon ground line
  ctx.save();
  ctx.shadowColor = '#ff8c00';
  ctx.shadowBlur = 18;
  ctx.strokeStyle = '#ff8c00';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(CW, GROUND_Y);
  ctx.stroke();

  // Secondary glow lines
  ctx.shadowBlur = 6;
  ctx.strokeStyle = 'rgba(255,140,0,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 6);
  ctx.lineTo(CW, GROUND_Y + 6);
  ctx.stroke();
  ctx.restore();

  // Grid lines on ground (parallax)
  const gridOff = (bgLayers[2].offset * 1.5) % 40;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,140,0,0.08)';
  ctx.lineWidth = 1;
  for (let gx = -gridOff; gx < CW; gx += 40) {
    ctx.beginPath();
    ctx.moveTo(gx, GROUND_Y);
    ctx.lineTo(gx - 20, CH);
    ctx.stroke();
  }
  ctx.restore();
}

function drawObstacle(o) {
  ctx.save();
  ctx.shadowColor = o.glowColor;
  ctx.shadowBlur = 14;
  ctx.fillStyle = o.color;
  ctx.fillRect(o.x, o.y, o.w, o.h);

  // Edge highlight
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.strokeRect(o.x, o.y, o.w, o.h);
  ctx.restore();
}

function drawCoin(c) {
  const scaleX = Math.abs(Math.cos(c.angle));
  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.scale(scaleX, 1);
  ctx.shadowColor = 'rgba(255,215,0,0.8)';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(0, 0, c.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffe44d';
  ctx.beginPath();
  ctx.arc(-2, -2, c.r * 0.45, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawPowerup(p) {
  const colors = { shield: '#a0cfff', spring: '#b8ff80', magnet: '#ffd700' };
  const glows = { shield: 'rgba(100,180,255,0.8)', spring: 'rgba(150,255,100,0.8)', magnet: 'rgba(255,215,0,0.8)' };
  const labels = { shield: 'S', spring: '↑', magnet: 'M' };

  ctx.save();
  ctx.translate(p.x, p.y + Math.sin(p.angle) * 4);
  ctx.shadowColor = glows[p.type];
  ctx.shadowBlur = 18;

  // Outer ring
  ctx.strokeStyle = colors[p.type];
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, p.r, 0, Math.PI * 2);
  ctx.stroke();

  // Fill
  ctx.fillStyle = colors[p.type] + '33';
  ctx.fill();

  // Label
  ctx.shadowBlur = 0;
  ctx.fillStyle = colors[p.type];
  ctx.font = `bold ${p.r}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(labels[p.type], 0, 0);
  ctx.restore();
}

function drawPlayer() {
  if (player.dead) return;

  const px = player.x;
  const py = player.y;
  const flash = player.invincibleFlash > 0 && Math.floor(player.invincibleFlash / 4) % 2 === 0;
  if (flash) return;

  ctx.save();

  // Shield bubble
  if (player.shieldTimer > 0) {
    const alpha = Math.min(player.shieldTimer / 60, 1) * 0.5;
    ctx.shadowColor = 'rgba(100,180,255,0.9)';
    ctx.shadowBlur = 20;
    ctx.strokeStyle = `rgba(100,180,255,${alpha + 0.4})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(px + PLAYER_W / 2, py + PLAYER_H / 2, PLAYER_W * 0.85, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Magnet aura
  if (player.magnetTimer > 0) {
    ctx.strokeStyle = 'rgba(255,215,0,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.arc(px + PLAYER_W / 2, py + PLAYER_H / 2, 60, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.shadowColor = 'rgba(255,140,0,0.9)';
  ctx.shadowBlur = 16;

  const frame = player.frame;
  const legY = py + PLAYER_H - 10;

  // Legs (4-frame animation)
  const legPositions = [
    [[-4, 0], [4, -6]],
    [[-6, -3], [2, 0]],
    [[-4, -6], [4, 0]],
    [[-2, 0], [6, -3]]
  ];
  const lp = legPositions[frame];

  ctx.fillStyle = '#cc5500';
  // Leg 1
  ctx.fillRect(px + PLAYER_W / 2 - 7, legY, 6, 10 + lp[0][1]);
  ctx.fillRect(px + PLAYER_W / 2 - 7 + lp[0][0], legY + 10 + lp[0][1], 8, 4);
  // Leg 2
  ctx.fillRect(px + PLAYER_W / 2 + 1, legY, 6, 10 + lp[1][1]);
  ctx.fillRect(px + PLAYER_W / 2 + 1 + lp[1][0], legY + 10 + lp[1][1], 8, 4);

  // Body
  ctx.fillStyle = '#ff8c00';
  ctx.fillRect(px + 3, py + 14, PLAYER_W - 6, PLAYER_H - 24);

  // Arms
  const armSwing = Math.sin(frame * Math.PI / 2) * 4;
  ctx.fillStyle = '#cc5500';
  ctx.fillRect(px - 2, py + 16 + armSwing, 5, 10);
  ctx.fillRect(px + PLAYER_W - 3, py + 16 - armSwing, 5, 10);

  // Head
  ctx.fillStyle = '#ffaa22';
  ctx.beginPath();
  ctx.arc(px + PLAYER_W / 2, py + 8, 9, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#07080f';
  ctx.beginPath();
  ctx.arc(px + PLAYER_W / 2 + 3, py + 7, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(px + PLAYER_W / 2 + 4, py + 6.5, 1, 0, Math.PI * 2);
  ctx.fill();

  // Spring glow tint
  if (player.springTimer > 0) {
    ctx.fillStyle = 'rgba(150,255,100,0.25)';
    ctx.fillRect(px, py, PLAYER_W, PLAYER_H);
  }

  ctx.restore();
}

function drawParticle(p) {
  ctx.save();
  ctx.globalAlpha = Math.max(p.life, 0);
  ctx.fillStyle = p.color;
  ctx.shadowColor = p.color;
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(p.x, p.y, Math.max(p.size * p.life, 0.1), 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ─── Initial render ──────────────────────────────────────────────
resetPlayer();
render();
updateUI();

})();
</script>
</body>
</html>
