<script>
(function() {
'use strict';

// ─── Canvas & context ───────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const CW = 560, CH = 420;
canvas.width = CW; canvas.height = CH;

// ─── Grid ───────────────────────────────────────────────────────────────────
const CELL = 28; // cell size px
const COLS = Math.floor(CW / CELL); // 20
const ROWS = Math.floor(CH / CELL); // 15

// ─── Path definition (grid coordinates, waypoints) ──────────────────────────
// Path goes: left edge → right → down → left → down → right → exit right
const PATH_POINTS = [
  {x:0,  y:2},
  {x:6,  y:2},
  {x:6,  y:6},
  {x:13, y:6},
  {x:13, y:11},
  {x:4,  y:11},
  {x:4,  y:14},  // bottom row
  {x:20, y:14},  // exit
];

// Convert grid path to pixel path (center of cells)
function gridToPixel(gx, gy) {
  return { x: gx * CELL + CELL/2, y: gy * CELL + CELL/2 };
}

const PATH_PIXELS = PATH_POINTS.map(p => gridToPixel(p.x, p.y));

// Compute segment lengths & total path length
const PATH_SEGS = [];
let TOTAL_PATH_LEN = 0;
for (let i = 0; i < PATH_PIXELS.length - 1; i++) {
  const dx = PATH_PIXELS[i+1].x - PATH_PIXELS[i].x;
  const dy = PATH_PIXELS[i+1].y - PATH_PIXELS[i].y;
  const len = Math.sqrt(dx*dx + dy*dy);
  PATH_SEGS.push({ dx, dy, len, startLen: TOTAL_PATH_LEN });
  TOTAL_PATH_LEN += len;
}

// Get pixel position along path for a given distance traveled
function posOnPath(dist) {
  if (dist >= TOTAL_PATH_LEN) {
    const last = PATH_PIXELS[PATH_PIXELS.length - 1];
    return { x: last.x, y: last.y };
  }
  for (let i = 0; i < PATH_SEGS.length; i++) {
    const seg = PATH_SEGS[i];
    const endLen = seg.startLen + seg.len;
    if (dist <= endLen) {
      const t = (dist - seg.startLen) / seg.len;
      return {
        x: PATH_PIXELS[i].x + seg.dx * t,
        y: PATH_PIXELS[i].y + seg.dy * t,
      };
    }
  }
  const last = PATH_PIXELS[PATH_PIXELS.length - 1];
  return { x: last.x, y: last.y };
}

// Collect all path cells (for blocking tower placement)
function getPathCells() {
  const cells = new Set();
  // For each segment, mark cells along the way
  for (let s = 0; s < PATH_SEGS.length; s++) {
    const p1 = PATH_PIXELS[s];
    const p2 = PATH_PIXELS[s+1];
    const steps = Math.ceil(PATH_SEGS[s].len / (CELL * 0.5));
    for (let t = 0; t <= steps; t++) {
      const frac = t / steps;
      const px = p1.x + (p2.x - p1.x) * frac;
      const py = p1.y + (p2.y - p1.y) * frac;
      const col = Math.floor(px / CELL);
      const row = Math.floor(py / CELL);
      if (col >= 0 && col < COLS && row >= 0 && row < ROWS)
        cells.add(row * COLS + col);
    }
  }
  return cells;
}
const PATH_CELLS = getPathCells();

// ─── Tower definitions ────────────────────────────────────────────────────
const TOWER_DEFS = {
  arrow: {
    name: '箭塔',
    cost: 50,
    color: '#88dd44',
    range: [120, 145, 170],
    damage: [15, 25, 38],

  },
  cannon: {

    cost: 100,
    color: '#ff6600',
    range: [110, 135, 160],
    damage: [60, 100, 150],
    cooldown: [2000, 1700, 1400],
    splashRadius: [50, 65, 80],
    type: 'splash',
  },
  ice: {
    name: '冰塔',
    cost: 75,
    color: '#44ccff',
    range: [140, 165, 195],
    damage: [0, 0, 0],
    cooldown: [1200, 1000, 800],
    slowFactor: [0.45, 0.35, 0.25],
    slowDuration: [1500, 2000, 2500],
    type: 'slow',
  },
  laser: {
    name: '激光塔',
    cost: 150,
    color: '#ff44aa',
    range: [180, 210, 250],
    damage: [8, 14, 22],   // per-frame continuous
    cooldown: [0, 0, 0],
    type: 'laser',
  },
};

// ─── Enemy definitions ───────────────────────────────────────────────────
const ENEMY_DEFS = {
  normal: {
    name: '普通兵',
    color: '#44ff88',
    hp: 80,
    speed: 70,  // px/sec
    reward: 10,
    size: 9,
    flying: false,
  },
  heavy: {
    name: '重甲兵',
    color: '#ee8844',
    hp: 300,
    speed: 35,
    reward: 25,
    size: 13,
    flying: false,
  },
  flying: {
    name: '飞行兵',
    color: '#cc88ff',
    hp: 60,
    speed: 90,
    reward: 20,
    size: 8,
    flying: true,
  },
};

// ─── State ────────────────────────────────────────────────────────────────
let gold, hp, wave, score;
let towers = [];      // {col, row, type, level, angle, cooldownLeft, laserTarget}
let enemies = [];     // {type, dist, x, y, hp, maxHp, slowTimer, slowFactor, flying, dead}
let bullets = [];     // {x, y, tx, ty, target, dmg, spd, color, splash, splashR, slow, slowF, slowDur}
let particles = [];   // {x,y,vx,vy,life,maxLife,color,r}
let laserBeams = [];  // {x1,y1,x2,y2,color,life}
let selectedCell = null;  // {col, row}
let selectedTowerType = null;
let hoverCell = null;
let waveInProgress = false;
let waveEnded = false;
let waveTimer = 0;   // ms countdown for next wave
let waveTimerActive = false;
let spawnQueue = [];  // [{type, delay}]
let spawnTimer = 0;
let lastTime = 0;
let gameOver = false;
let gameStarted = false;
const WAVE_PAUSE = 15000; // ms

// DOM refs
const statGold = document.getElementById('stat-gold');
const statHp = document.getElementById('stat-hp');
const statWave = document.getElementById('stat-wave');
const statScore = document.getElementById('stat-score');
const btnStartWave = document.getElementById('btn-start-wave');
const waveTimerEl = document.getElementById('wave-timer');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayMsg = document.getElementById('overlay-msg');
const btnRestart = document.getElementById('btn-restart');
const infoPanel = document.getElementById('info-panel');
const btnUpgrade = document.getElementById('btn-upgrade');
const btnSell = document.getElementById('btn-sell');

// ─── Init / Reset ─────────────────────────────────────────────────────────
function init() {
  gold = 200; hp = 20; wave = 1; score = 0;
  towers = []; enemies = []; bullets = []; particles = []; laserBeams = [];
  selectedCell = null; selectedTowerType = null; hoverCell = null;
  waveInProgress = false; waveEnded = false; waveTimer = 0; waveTimerActive = false;
  spawnQueue = []; spawnTimer = 0;
  gameOver = false; gameStarted = false;
  overlay.classList.remove('show');
  btnStartWave.disabled = false;
  btnStartWave.textContent = '开始第1波';
  waveTimerEl.textContent = '';
  btnUpgrade.style.display = 'none';
  btnSell.style.display = 'none';
  infoPanel.innerHTML = '<div style="color:#555;font-style:italic;">点击格子建塔或选择已建塔</div>';
  updateStats();
}

function updateStats() {
  statGold.textContent = gold;
  statHp.textContent = hp;
  statWave.textContent = wave;
  statScore.textContent = score;
  // Update tower button affordability
  document.querySelectorAll('.tower-btn').forEach(btn => {
    const type = btn.dataset.type;
    const cost = TOWER_DEFS[type].cost;
    if (gold < cost) btn.classList.add('cant-afford');
    else btn.classList.remove('cant-afford');
  });
}

// ─── Wave generation ──────────────────────────────────────────────────────
function buildWave(waveNum) {
  const queue = [];
  const count = 5 + waveNum * 3;
  const hpScale = 1 + (waveNum - 1) * 0.25;
  for (let i = 0; i < count; i++) {
    let type;
    const r = Math.random();
    if (waveNum < 3) {
      type = r < 0.7 ? 'normal' : 'heavy';
    } else if (waveNum < 6) {
      type = r < 0.5 ? 'normal' : (r < 0.75 ? 'heavy' : 'flying');
    } else {
      type = r < 0.35 ? 'normal' : (r < 0.65 ? 'heavy' : 'flying');
    }
    queue.push({ type, delay: i * 1000, hpScale });
  }
  return queue;
}

function startWave() {
  if (waveInProgress || gameOver) return;
  waveInProgress = true;
  waveEnded = false;
  waveTimerActive = false;
  waveTimerEl.textContent = '';
  btnStartWave.disabled = true;
  btnStartWave.textContent = `第${wave}波进行中`;
  spawnQueue = buildWave(wave);
  spawnTimer = 0;
}

// ─── Spawn enemy ──────────────────────────────────────────────────────────
function spawnEnemy(type, hpScale) {
  const def = ENEMY_DEFS[type];
  const e = {
    type, def,
    dist: 0,
    x: PATH_PIXELS[0].x,
    y: PATH_PIXELS[0].y,
    hp: Math.round(def.hp * hpScale),
    maxHp: Math.round(def.hp * hpScale),
    slowTimer: 0,
    slowFactor: 1,
    flying: def.flying,
    dead: false,
    reached: false,
    id: Math.random(),
  };
  // Flying enemies go directly start → end
  if (e.flying) {
    e.flyStartX = PATH_PIXELS[0].x;
    e.flyStartY = PATH_PIXELS[0].y;
    const last = PATH_PIXELS[PATH_PIXELS.length - 1];
    e.flyEndX = last.x;
    e.flyEndY = last.y;
    e.flyDist = 0;
    e.flyTotal = Math.hypot(last.x - PATH_PIXELS[0].x, last.y - PATH_PIXELS[0].y);
  }
  enemies.push(e);
}

// ─── Tower placement ──────────────────────────────────────────────────────
function canBuildAt(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
  if (PATH_CELLS.has(row * COLS + col)) return false;
  if (towers.find(t => t.col === col && t.row === row)) return false;
  return true;
}

function buildTower(col, row, type) {
  const def = TOWER_DEFS[type];
  if (gold < def.cost) return false;
  if (!canBuildAt(col, row)) return false;
  gold -= def.cost;
  towers.push({
    col, row,
    x: col * CELL + CELL/2,
    y: row * CELL + CELL/2,
    type, def,
    level: 0, // 0=lv1, 1=lv2, 2=lv3
    angle: 0,
    cooldownLeft: 0,
    laserTarget: null,
    laserOn: false,
  });
  updateStats();
  return true;
}

function upgradeCost(tower) {
  const baseCost = TOWER_DEFS[tower.type].cost;
  return Math.round(baseCost * (tower.level + 1) * 0.8);
}

function sellValue(tower) {
  const baseCost = TOWER_DEFS[tower.type].cost;
  let total = baseCost;
  for (let l = 0; l < tower.level; l++) total += Math.round(baseCost * (l + 1) * 0.8);
  return Math.round(total * 0.6);
}

// ─── Selection / Info panel ───────────────────────────────────────────────
function selectCell(col, row) {
  selectedCell = { col, row };
  const tower = towers.find(t => t.col === col && t.row === row);
  if (tower) {
    selectedTowerType = null;
    const def = TOWER_DEFS[tower.type];
    const lv = tower.level + 1;
    const maxLv = 3;
    let html = `<h3>${def.name} Lv${lv}</h3>`;
    html += `<div>射程: ${def.range[tower.level]}</div>`;
    if (tower.type !== 'ice') html += `<div>伤害: ${def.damage[tower.level]}</div>`;
    if (tower.type === 'ice') html += `<div>减速: ${Math.round((1-def.slowFactor[tower.level])*100)}%</div>`;
    if (tower.type !== 'laser') html += `<div>冷却: ${(def.cooldown[tower.level]/1000).toFixed(1)}s</div>`;
    infoPanel.innerHTML = html;
    if (tower.level < maxLv - 1) {
      const cost = upgradeCost(tower);
      btnUpgrade.textContent = `升级 (${cost}💰)`;
      btnUpgrade.style.display = 'block';
      btnUpgrade.disabled = gold < cost;
    } else {
      btnUpgrade.textContent = '已满级';
      btnUpgrade.style.display = 'block';
      btnUpgrade.disabled = true;
    }
    const sv = sellValue(tower);
    btnSell.textContent = `出售 (+${sv}💰)`;
    btnSell.style.display = 'block';
  } else {
    infoPanel.innerHTML = canBuildAt(col, row)
      ? '<div style="color:#88ff88;">可建造</div><div style="color:#666;font-size:0.65rem;">在左侧选择塔类型后点击此格建造</div>'
      : '<div style="color:#ff4444;">不可建造</div>';
    btnUpgrade.style.display = 'none';
    btnSell.style.display = 'none';
  }
}

function clearSelection() {
  selectedCell = null;
  infoPanel.innerHTML = '<div style="color:#555;font-style:italic;">点击格子建塔或选择已建塔</div>';
  btnUpgrade.style.display = 'none';
  btnSell.style.display = 'none';
}

// ─── Particles ────────────────────────────────────────────────────────────
function spawnExplosion(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 40 + Math.random() * 80;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0,
      maxLife: 400 + Math.random() * 300,
      color,
      r: 2 + Math.random() * 3,
    });
  }
}

function spawnSplashRing(x, y, radius, color) {
  particles.push({ splash: true, x, y, radius, maxR: radius, life: 0, maxLife: 300, color });
}

// ─── Bullet creation ──────────────────────────────────────────────────────
function fireBullet(tower, target) {
  const def = TOWER_DEFS[tower.type];
  const lv = tower.level;
  if (tower.type === 'arrow') {
    bullets.push({
      x: tower.x, y: tower.y,
      target,
      dmg: def.damage[lv],
      spd: 280,
      color: '#aaff44',
      type: 'single',
    });
  } else if (tower.type === 'cannon') {
    bullets.push({
      x: tower.x, y: tower.y,
      target,
      dmg: def.damage[lv],
      spd: 200,
      color: '#ff8800',
      type: 'splash',
      splashR: def.splashRadius[lv],
    });
  } else if (tower.type === 'ice') {
    bullets.push({
      x: tower.x, y: tower.y,
      target,
      dmg: 0,
      spd: 220,
      color: '#88eeff',
      type: 'slow',
      slowF: def.slowFactor[lv],
      slowDur: def.slowDuration[lv],
    });
  }
}

// ─── Dist helper ──────────────────────────────────────────────────────────
function dist2(ax, ay, bx, by) {
  const dx = ax - bx, dy = ay - by;
  return dx*dx + dy*dy;
}

// ─── Update enemies ───────────────────────────────────────────────────────
function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.dead) { enemies.splice(i, 1); continue; }
    if (e.reached) { enemies.splice(i, 1); continue; }

    // Slow timer decay
    if (e.slowTimer > 0) {
      e.slowTimer -= dt;
      if (e.slowTimer <= 0) { e.slowTimer = 0; e.slowFactor = 1; }
    }

    const spd = e.def.speed * e.slowFactor;

    if (e.flying) {
      e.flyDist += spd * dt / 1000;
      if (e.flyDist >= e.flyTotal) {
        // Reached end
        hp = Math.max(0, hp - 1);
        e.reached = true;
        updateStats();
        if (hp <= 0) triggerGameOver();
        continue;
      }
      const t = e.flyDist / e.flyTotal;
      e.x = e.flyStartX + (e.flyEndX - e.flyStartX) * t;
      e.y = e.flyStartY + (e.flyEndY - e.flyStartY) * t;
    } else {
      e.dist += spd * dt / 1000;
      if (e.dist >= TOTAL_PATH_LEN) {
        hp = Math.max(0, hp - 1);
        e.reached = true;
        updateStats();
        if (hp <= 0) triggerGameOver();
        continue;
      }
      const pos = posOnPath(e.dist);
      e.x = pos.x; e.y = pos.y;
    }
  }
}

// ─── Update towers & shooting ─────────────────────────────────────────────
function updateTowers(dt) {
  for (const tower of towers) {
    tower.cooldownLeft = Math.max(0, tower.cooldownLeft - dt);
    const def = TOWER_DEFS[tower.type];
    const range = def.range[tower.level];
    const range2 = range * range;

    // Find enemies in range
    const inRange = enemies.filter(e => !e.dead && !e.reached && dist2(tower.x, tower.y, e.x, e.y) <= range2);

    if (inRange.length === 0) {
      tower.laserOn = false;
      tower.laserTarget = null;
      continue;
    }

    // Targeting: pick furthest along path (most progress)
    let target = null;
    let bestProgress = -1;
    for (const e of inRange) {
      const prog = e.flying ? e.flyDist : e.dist;
      if (prog > bestProgress) { bestProgress = prog; target = e; }
    }

    // Rotate tower toward target
    if (target) {
      tower.angle = Math.atan2(target.y - tower.y, target.x - tower.x);
    }

    if (tower.type === 'laser') {
      // Laser: continuous damage
      tower.laserOn = !!target;
      tower.laserTarget = target || null;
      if (target) {
        const dmg = def.damage[tower.level] * dt / 1000 * 60; // per-frame
        target.hp -= dmg;
        if (target.hp <= 0 && !target.dead) killEnemy(target);
        laserBeams.push({
          x1: tower.x, y1: tower.y,
          x2: target.x, y2: target.y,
          color: def.color,
          life: 60, // ms
        });
      }
    } else {
      if (tower.cooldownLeft <= 0 && target) {
        fireBullet(tower, target);
        tower.cooldownLeft = def.cooldown[tower.level];
      }
    }
  }
}

// ─── Update bullets ───────────────────────────────────────────────────────
function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    // If target is dead/reached, remove bullet (except splash/slow still go to last pos)
    if (!b.target || b.target.dead || b.target.reached) {
      bullets.splice(i, 1);
      continue;
    }
    const tx = b.target.x, ty = b.target.y;
    const dx = tx - b.x, dy = ty - b.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    const move = b.spd * dt / 1000;

    if (d <= move) {
      // Hit
      if (b.type === 'single') {
        b.target.hp -= b.dmg;
        spawnExplosion(tx, ty, b.color, 5);
        if (b.target.hp <= 0 && !b.target.dead) killEnemy(b.target);
      } else if (b.type === 'splash') {
        // AoE
        const sr2 = b.splashR * b.splashR;
        for (const e of enemies) {
          if (!e.dead && !e.reached && dist2(tx, ty, e.x, e.y) <= sr2) {
            e.hp -= b.dmg;
            if (e.hp <= 0 && !e.dead) killEnemy(e);
          }
        }
        spawnExplosion(tx, ty, '#ff8800', 18);
        spawnSplashRing(tx, ty, b.splashR, '#ff880066');
      } else if (b.type === 'slow') {
        b.target.slowFactor = b.slowF;
        b.target.slowTimer = b.slowDur;
        spawnExplosion(tx, ty, '#88eeff', 8);
      }
      bullets.splice(i, 1);
    } else {
      b.x += (dx/d) * move;
      b.y += (dy/d) * move;
    }
  }
}

// ─── Kill enemy ───────────────────────────────────────────────────────────
function killEnemy(e) {
  e.dead = true;
  gold += e.def.reward;
  score += e.def.reward * 2;
  spawnExplosion(e.x, e.y, e.def.color, 10);
  updateStats();
}

// ─── Update particles ─────────────────────────────────────────────────────
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life += dt;
    if (p.life >= p.maxLife) { particles.splice(i, 1); continue; }
    if (!p.splash) {
      p.x += p.vx * dt / 1000;
      p.y += p.vy * dt / 1000;
      p.vy += 60 * dt / 1000; // gravity
    }
  }
  for (let i = laserBeams.length - 1; i >= 0; i--) {
    laserBeams[i].life -= dt;
    if (laserBeams[i].life <= 0) laserBeams.splice(i, 1);
  }
}

// ─── Wave management ──────────────────────────────────────────────────────
function updateWave(dt) {
  if (!waveInProgress) {
    if (waveTimerActive) {
      waveTimer -= dt;
      if (waveTimer <= 0) {
        waveTimerActive = false;
        waveTimerEl.textContent = '';
      } else {
        waveTimerEl.textContent = `下波: ${Math.ceil(waveTimer/1000)}s`;
      }
    }
    return;
  }

  // Spawn
  if (spawnQueue.length > 0) {
    spawnTimer += dt;
    while (spawnQueue.length > 0 && spawnTimer >= spawnQueue[0].delay) {
      const item = spawnQueue.shift();
      spawnEnemy(item.type, item.hpScale);
      // Adjust remaining delays (relative)
      for (const q of spawnQueue) q.delay -= item.delay;
      spawnTimer = 0;
    }
  }

  // Check wave complete
  if (spawnQueue.length === 0 && enemies.length === 0 && !waveEnded) {
    waveEnded = true;
    waveInProgress = false;
    wave++;
    gold += 30 + wave * 5; // wave completion bonus
    score += 100 * (wave - 1);
    updateStats();
    if (!gameOver) {
      waveTimerActive = true;
      waveTimer = WAVE_PAUSE;
      btnStartWave.disabled = false;
      btnStartWave.textContent = `开始第${wave}波`;
    }
  }
}

// ─── Game over ────────────────────────────────────────────────────────────
function triggerGameOver() {
  if (gameOver) return;
  gameOver = true;
  waveInProgress = false;
  btnStartWave.disabled = true;
  overlayTitle.textContent = '游戏结束';
  overlayMsg.textContent = `你撑过了 ${wave} 波，得分：${score}`;
  overlay.classList.add('show');
}

// ─── Draw functions ───────────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle = '#0b0d19';
  ctx.fillRect(0, 0, CW, CH);

  // Grid
  ctx.strokeStyle = '#1a1d2e';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c*CELL, 0); ctx.lineTo(c*CELL, CH); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r*CELL); ctx.lineTo(CW, r*CELL); ctx.stroke();
  }

  // Hover highlight
  if (hoverCell) {
    const { col, row } = hoverCell;
    if (canBuildAt(col, row) && selectedTowerType) {
      const cost = TOWER_DEFS[selectedTowerType].cost;
      ctx.fillStyle = gold >= cost ? '#ff8c0022' : '#ff004422';
      ctx.fillRect(col*CELL, row*CELL, CELL, CELL);
      ctx.strokeStyle = gold >= cost ? '#ff8c0088' : '#ff004488';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(col*CELL+1, row*CELL+1, CELL-2, CELL-2);
    } else if (towers.find(t => t.col === col && t.row === row)) {
      ctx.fillStyle = '#ffffff11';
      ctx.fillRect(col*CELL, row*CELL, CELL, CELL);
    }
  }

  // Selected cell highlight
  if (selectedCell) {
    const { col, row } = selectedCell;
    ctx.strokeStyle = '#ff8c00';
    ctx.lineWidth = 2;
    ctx.strokeRect(col*CELL+1, row*CELL+1, CELL-2, CELL-2);
  }
}

function drawPath() {
  // Path glow
  ctx.save();
  ctx.shadowColor = '#ff8c00';
  ctx.shadowBlur = 8;
  ctx.strokeStyle = '#5a3800';
  ctx.lineWidth = CELL - 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(PATH_PIXELS[0].x, PATH_PIXELS[0].y);
  for (let i = 1; i < PATH_PIXELS.length; i++) ctx.lineTo(PATH_PIXELS[i].x, PATH_PIXELS[i].y);
  ctx.stroke();
  ctx.restore();

  // Path inner
  ctx.strokeStyle = '#2a1800';
  ctx.lineWidth = CELL - 6;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(PATH_PIXELS[0].x, PATH_PIXELS[0].y);
  for (let i = 1; i < PATH_PIXELS.length; i++) ctx.lineTo(PATH_PIXELS[i].x, PATH_PIXELS[i].y);
  ctx.stroke();

  // Path edge glow lines
  ctx.save();
  ctx.shadowColor = '#ff8c00aa';
  ctx.shadowBlur = 4;
  ctx.strokeStyle = '#ff8c0055';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PATH_PIXELS[0].x, PATH_PIXELS[0].y);
  for (let i = 1; i < PATH_PIXELS.length; i++) ctx.lineTo(PATH_PIXELS[i].x, PATH_PIXELS[i].y);
  ctx.stroke();
  ctx.restore();

  // Start/end markers
  ctx.save();
  ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#00ff88';
  ctx.beginPath();
  ctx.arc(PATH_PIXELS[0].x, PATH_PIXELS[0].y, 6, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#ff4444';
  const last = PATH_PIXELS[PATH_PIXELS.length - 1];
  ctx.beginPath();
  ctx.arc(last.x, last.y, 6, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawTower(tower) {
  const { x, y, type, level, angle } = tower;
  const def = TOWER_DEFS[type];
  const col = def.color;
  const lv = level + 1;

  ctx.save();
  ctx.translate(x, y);
  ctx.shadowColor = col;
  ctx.shadowBlur = 10;

  if (type === 'arrow') {
    // Octagonal base
    ctx.fillStyle = '#1e2a10';
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = (i/8) * Math.PI * 2 - Math.PI/8;
      const r = lv === 3 ? 11 : lv === 2 ? 10 : 9;
      i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Bow arm
    ctx.rotate(angle);
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -7*lv/3+2); ctx.lineTo(10, 0); ctx.moveTo(0, 7*lv/3-2); ctx.lineTo(10, 0);
    ctx.stroke();
    // Arrow
    ctx.strokeStyle = '#ffffaa';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-4, 0); ctx.lineTo(10, 0);
    ctx.stroke();

  } else if (type === 'cannon') {
    // Round base
    ctx.fillStyle = '#2a1000';
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 11 + lv, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    // Stars
    if (lv > 1) {
      ctx.fillStyle = col;
      for (let i = 0; i < lv; i++) {
        const a = (i/lv)*Math.PI*2;
        ctx.beginPath();
        ctx.arc(Math.cos(a)*6, Math.sin(a)*6, 2, 0, Math.PI*2);
        ctx.fill();
      }
    }
    // Barrel
    ctx.rotate(angle);
    ctx.fillStyle = '#555';
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    const bw = 5 + lv;
    ctx.beginPath();
    ctx.rect(0, -bw/2, 14+lv*2, bw);
    ctx.fill(); ctx.stroke();
    // Muzzle
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.rect(12+lv*2, -bw/2-1, 4, bw+2);
    ctx.fill();

  } else if (type === 'ice') {
    // Hexagonal
    ctx.fillStyle = '#001828';
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i/6)*Math.PI*2 - Math.PI/6;
      const r = 9 + lv;
      i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Snowflake
    ctx.strokeStyle = col + 'cc';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 6; i++) {
      const a = (i/6)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(Math.cos(a)*7, Math.sin(a)*7);
      ctx.stroke();
    }
    // Crystals on barrel direction
    ctx.rotate(angle);
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(2, 0); ctx.lineTo(12+lv, 0);
    ctx.stroke();
    // crystal tip
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(12+lv, -3); ctx.lineTo(16+lv, 0); ctx.lineTo(12+lv, 3);
    ctx.closePath(); ctx.fill();

  } else if (type === 'laser') {
    // Triangle base
    ctx.fillStyle = '#1a0018';
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    const r = 11 + lv;
    ctx.beginPath();
    for (let i = 0; i < 3; i++) {
      const a = (i/3)*Math.PI*2 - Math.PI/2;
      i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Laser emitter
    ctx.rotate(angle);
    ctx.fillStyle = col;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.rect(0, -3, 14+lv*2, 6);
    ctx.fill(); ctx.stroke();
    // Lens
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(14+lv*2, 0, 3, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.restore();

  // Level dots
  if (level > 0) {
    for (let l = 0; l < level; l++) {
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(x - 5 + l*5, y - 14, 2.5, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function drawEnemy(e) {
  const { x, y, hp, maxHp, def, type, slowTimer } = e;
  const ratio = hp / maxHp;
  const col = e.dead ? '#333' : def.color;

  ctx.save();
  ctx.translate(x, y);
  ctx.shadowColor = col;
  ctx.shadowBlur = 8;

  if (type === 'normal') {
    // Diamond
    ctx.fillStyle = col;
    const s = def.size;
    ctx.beginPath();
    ctx.moveTo(0, -s); ctx.lineTo(s, 0); ctx.lineTo(0, s); ctx.lineTo(-s, 0);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#ffffff44';
    ctx.lineWidth = 1;
    ctx.stroke();
  } else if (type === 'heavy') {
    // Pentagon
    ctx.fillStyle = col;
    const s = def.size;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i/5)*Math.PI*2 - Math.PI/2;
      i === 0 ? ctx.moveTo(Math.cos(a)*s, Math.sin(a)*s) : ctx.lineTo(Math.cos(a)*s, Math.sin(a)*s);
    }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#fff8';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Armor plates
    ctx.strokeStyle = '#fff5';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, s*0.6, 0, Math.PI*2);
    ctx.stroke();
  } else if (type === 'flying') {
    // Star/Wings
    ctx.fillStyle = col;
    const s = def.size;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i/6)*Math.PI*2;
      const r = i%2 === 0 ? s : s*0.5;
      i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill();
    // Wing lines
    ctx.strokeStyle = '#ffffff66';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-s, 0); ctx.lineTo(s, 0);
    ctx.stroke();
  }

  // Slow effect
  if (slowTimer > 0) {
    ctx.strokeStyle = '#88eeffaa';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, def.size + 3, 0, Math.PI*2);
    ctx.stroke();
  }

  ctx.restore();

  // HP bar
  const bw = 22, bh = 4;
  const bx = x - bw/2, by = y - def.size - 8;
  ctx.fillStyle = '#333';
  ctx.fillRect(bx, by, bw, bh);
  const hpColor = ratio > 0.5 ? '#44ff44' : ratio > 0.25 ? '#ffaa00' : '#ff2222';
  ctx.fillStyle = hpColor;
  ctx.fillRect(bx, by, bw * ratio, bh);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(bx, by, bw, bh);
}

function drawBullets() {
  for (const b of bullets) {
    ctx.save();
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = b.color;
    const r = b.type === 'splash' ? 5 : 3;
    ctx.beginPath();
    ctx.arc(b.x, b.y, r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawLasers() {
  for (const beam of laserBeams) {
    ctx.save();
    ctx.shadowColor = beam.color;
    ctx.shadowBlur = 12;
    ctx.strokeStyle = beam.color;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.moveTo(beam.x1, beam.y1);
    ctx.lineTo(beam.x2, beam.y2);
    ctx.stroke();
    // Inner bright line
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 0.8;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(beam.x1, beam.y1);
    ctx.lineTo(beam.x2, beam.y2);
    ctx.stroke();
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = 1 - p.life / p.maxLife;
    ctx.save();
    if (p.splash) {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = alpha;
      const r = (p.life / p.maxLife) * p.maxR;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI*2);
      ctx.stroke();
    } else {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (1 - p.life/p.maxLife * 0.5), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawTowerRange() {
  if (!selectedCell) return;
  const tower = towers.find(t => t.col === selectedCell.col && t.row === selectedCell.row);
  if (!tower) return;
  const range = TOWER_DEFS[tower.type].range[tower.level];
  ctx.save();
  ctx.strokeStyle = '#ff8c0055';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.arc(tower.x, tower.y, range, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

function drawHoverRange() {
  if (!hoverCell || !selectedTowerType) return;
  const { col, row } = hoverCell;
  if (!canBuildAt(col, row)) return;
  const def = TOWER_DEFS[selectedTowerType];
  const range = def.range[0];
  const cx = col*CELL + CELL/2, cy = row*CELL + CELL/2;
  ctx.save();
  ctx.strokeStyle = '#ffffff33';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.arc(cx, cy, range, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

// ─── Main loop ─────────────────────────────────────────────────────────────
function loop(ts) {
  if (!lastTime) lastTime = ts;
  let dt = ts - lastTime;
  lastTime = ts;
  if (dt > 200) dt = 200;

  if (!gameOver) {
    updateWave(dt);
    updateEnemies(dt);
    updateTowers(dt);
    updateBullets(dt);
    updateParticles(dt);
  }

  // Draw
  ctx.clearRect(0, 0, CW, CH);
  drawBackground();
  drawPath();
  drawHoverRange();
  drawTowerRange();
  for (const t of towers) drawTower(t);
  drawLasers();
  drawBullets();
  for (const e of enemies) { if (!e.dead && !e.reached) drawEnemy(e); }
  drawParticles();

  requestAnimationFrame(loop);
}

// ─── Input ────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CW / rect.width;
  const scaleY = CH / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const col = Math.floor(mx / CELL);
  const row = Math.floor(my / CELL);
  if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
    hoverCell = { col, row };
  } else {
    hoverCell = null;
  }
});

canvas.addEventListener('mouseleave', () => { hoverCell = null; });

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CW / rect.width;
  const scaleY = CH / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const col = Math.floor(mx / CELL);
  const row = Math.floor(my / CELL);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;

  const existingTower = towers.find(t => t.col === col && t.row === row);

  if (selectedTowerType && !existingTower && canBuildAt(col, row)) {
    if (buildTower(col, row, selectedTowerType)) {
      selectCell(col, row);
    } else {
      // Not enough gold
      infoPanel.innerHTML = '<div style="color:#ff4444;">金币不足！</div>';
    }
  } else {
    selectCell(col, row);
  }
});

// Tower selection buttons
document.querySelectorAll('.tower-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const type = btn.dataset.type;
    if (selectedTowerType === type) {
      selectedTowerType = null;
      document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
    } else {
      selectedTowerType = type;
      document.querySelectorAll('.tower-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      clearSelection();
      infoPanel.innerHTML = `<div style="color:#ff8c00;">已选择 <b>${TOWER_DEFS[type].name}</b></div><div style="color:#666;font-size:0.65rem;">点击空格建造</div>`;
      btnUpgrade.style.display = 'none';
      btnSell.style.display = 'none';
    }
  });
});

btnStartWave.addEventListener('click', () => {
  if (!gameOver) startWave();
});

btnUpgrade.addEventListener('click', () => {
  if (!selectedCell) return;
  const tower = towers.find(t => t.col === selectedCell.col && t.row === selectedCell.row);
  if (!tower || tower.level >= 2) return;
  const cost = upgradeCost(tower);
  if (gold < cost) return;
  gold -= cost;
  tower.level++;
  score += 10;
  updateStats();
  selectCell(selectedCell.col, selectedCell.row);
});

btnSell.addEventListener('click', () => {
  if (!selectedCell) return;
  const idx = towers.findIndex(t => t.col === selectedCell.col && t.row === selectedCell.row);
  if (idx < 0) return;
  const tower = towers[idx];
  gold += sellValue(tower);
  towers.splice(idx, 1);
  score += 5;
  updateStats();
  clearSelection();
});

btnRestart.addEventListener('click', () => {
  init();
  requestAnimationFrame(loop);
});

// Touch support for canvas
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = CW / rect.width;
  const scaleY = CH / rect.height;
  const mx = (touch.clientX - rect.left) * scaleX;
  const my = (touch.clientY - rect.top) * scaleY;
  const col = Math.floor(mx / CELL);
  const row = Math.floor(my / CELL);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;

  const existingTower = towers.find(t => t.col === col && t.row === row);
  if (selectedTowerType && !existingTower && canBuildAt(col, row)) {
    if (!buildTower(col, row, selectedTowerType)) {
      infoPanel.innerHTML = '<div style="color:#ff4444;">金币不足！</div>';
    } else {
      selectCell(col, row);
    }
  } else {
    selectCell(col, row);
  }
}, { passive: false });

// ─── Boot ──────────────────────────────────────────────────────────────────
init();
requestAnimationFrame(loop);

})();
</script>
