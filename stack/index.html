<script>
(function(){
'use strict';

// ── Canvas setup ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize(){
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', () => { resize(); if(state !== 'playing') drawIdle(); });

// ── Color palette (gradient pairs cycling) ───────────────────────────────────
const PALETTES = [
  ['#3b82f6','#6ee7f7'],  // blue → cyan
  ['#8b5cf6','#a78bfa'],  // violet → purple
  ['#ec4899','#f472b6'],  // pink → rose
  ['#f97316','#fb923c'],  // orange
  ['#eab308','#fde68a'],  // yellow
  ['#10b981','#6ee7b7'],  // green → teal
  ['#f43f5e','#fb7185'],  // red → pink
  ['#06b6d4','#67e8f9'],  // cyan
];

function getPalette(layer){
  return PALETTES[layer % PALETTES.length];
}

// ── Game constants ────────────────────────────────────────────────────────────
const BLOCK_HEIGHT = 28;
const BOTTOM_MARGIN = 44; // more-games bar
const INITIAL_BLOCK_W = () => Math.min(W * 0.55, 240);
const MIN_BLOCK_W = 20;
const STACK_COUNT = () => Math.floor((H - 120 - BOTTOM_MARGIN) / BLOCK_HEIGHT); // visible layers
const BASE_SPEED = 3.2;
const MAX_SPEED = 11;
const SPEED_STEP = 0.18; // per layer
const PERFECT_THRESHOLD = 4; // px

// ── Game state ────────────────────────────────────────────────────────────────
let state = 'idle'; // idle | playing | dead
let score = 0;
let bestScore = parseInt(localStorage.getItem('stack_best') || '0');
let layers = [];       // placed blocks: {x, w, y_logical, color pair index}
let currentBlock = {}; // moving block
let debris = [];       // falling pieces
let particles = [];    // perfect particles
let cameraY = 0;       // logical camera offset (blocks scroll down)
let targetCameraY = 0;
let animId = null;
let lastTime = 0;
let perfectFlashTimer = 0;

// ── UI refs ───────────────────────────────────────────────────────────────────
const overlay = document.getElementById('overlay');
const playBtn = document.getElementById('playBtn');
const scoreNum = document.getElementById('score-num');
const bestNum = document.getElementById('best-num');
const layerNum = document.getElementById('layer-num');
const finalScoreEl = document.getElementById('finalScore');
const finalScoreWrap = document.getElementById('finalScoreWrap');
const newBestWrap = document.getElementById('newBestWrap');
const flashEl = document.getElementById('flash');
const perfectTextEl = document.getElementById('perfect-text');

bestNum.textContent = bestScore;

// ── Init / Reset ──────────────────────────────────────────────────────────────
function initGame(){
  score = 0;
  layers = [];
  debris = [];
  particles = [];
  cameraY = 0;
  targetCameraY = 0;
  perfectFlashTimer = 0;

  // Base block (ground)
  const bw = INITIAL_BLOCK_W();
  const bx = (W - bw) / 2;
  layers.push({ x: bx, w: bw, layer: 0, colorIdx: 0 });

  spawnBlock();
  updateScoreUI();
}

function spawnBlock(){
  const prevLayer = layers[layers.length - 1];
  const layer = layers.length;
  const colorIdx = layer % PALETTES.length;
  const bw = prevLayer.w; // same width as last placed
  // direction: even layers go right-to-left, odd go left-to-right
  const goingRight = layer % 2 === 1;
  const startX = goingRight ? -bw - 10 : W + 10;

  currentBlock = {
    x: startX,
    w: bw,
    layer: layer,
    colorIdx: colorIdx,
    goingRight: goingRight,
    speed: Math.min(BASE_SPEED + SPEED_STEP * score, MAX_SPEED),
  };
}

// ── Logical Y → screen Y ──────────────────────────────────────────────────────
function layerToScreenY(layerIdx){
  // layer 0 at bottom, stack grows up
  const visibleLayers = STACK_COUNT();
  const baseY = H - BOTTOM_MARGIN - BLOCK_HEIGHT; // bottom block screen y
  return baseY - layerIdx * BLOCK_HEIGHT + cameraY;
}

// ── Drop block ────────────────────────────────────────────────────────────────
function dropBlock(){
  if(state !== 'playing') return;

  const prev = layers[layers.length - 1];
  const cur = currentBlock;

  // overlap
  const left = Math.max(cur.x, prev.x);
  const right = Math.min(cur.x + cur.w, prev.x + prev.w);
  const overlap = right - left;

  if(overlap <= 0){
    // complete miss → game over
    gameOver();
    return;
  }

  // Check cut ratio
  const cutAmount = cur.w - overlap;
  if(cutAmount > cur.w * 0.5){
    gameOver();
    return;
  }

  const isPerfect = cutAmount <= PERFECT_THRESHOLD;

  let newX, newW;
  if(isPerfect){
    // snap to perfect
    newX = prev.x;
    newW = prev.w;
    triggerPerfect();
    score += 2;
  } else {
    newX = left;
    newW = overlap;
    score += 1;

    // spawn debris
    spawnDebris(cur, prev, left, right);
  }

  layers.push({ x: newX, w: newW, layer: cur.layer, colorIdx: cur.colorIdx });

  // scroll camera up if stack is getting tall
  const topLayer = layers.length - 1;
  const visibleLayers = STACK_COUNT();
  if(topLayer >= visibleLayers - 2){
    targetCameraY = (topLayer - (visibleLayers - 3)) * BLOCK_HEIGHT;
  }

  updateScoreUI();
  spawnBlock();
}

function spawnDebris(cur, prev, keepLeft, keepRight){
  const [c1, c2] = getPalette(cur.colorIdx);
  // left piece
  if(cur.x < keepLeft){
    debris.push({
      x: cur.x, y: layerToScreenY(cur.layer),
      w: keepLeft - cur.x, h: BLOCK_HEIGHT,
      vx: -1.5 - Math.random(), vy: -1,
      gravity: 0.4, alpha: 1,
      c1, c2, rot: 0, rotV: (Math.random()-0.5)*0.08
    });
  }
  // right piece
  if(cur.x + cur.w > keepRight){
    debris.push({
      x: keepRight, y: layerToScreenY(cur.layer),
      w: (cur.x + cur.w) - keepRight, h: BLOCK_HEIGHT,
      vx: 1.5 + Math.random(), vy: -1,
      gravity: 0.4, alpha: 1,
      c1, c2, rot: 0, rotV: (Math.random()-0.5)*0.08
    });
  }
}

// ── Perfect effects ───────────────────────────────────────────────────────────
function triggerPerfect(){
  // Screen flash
  flashEl.style.background = 'rgba(110,231,247,0.18)';
  setTimeout(()=>{ flashEl.style.background = 'rgba(110,231,247,0)'; }, 180);

  // Perfect text
  perfectTextEl.style.opacity = '1';
  setTimeout(()=>{ perfectTextEl.style.opacity = '0'; }, 700);

  // Particles
  const cx = W / 2;
  const cy = layerToScreenY(currentBlock.layer) + BLOCK_HEIGHT / 2;
  for(let i = 0; i < 36; i++){
    const angle = (Math.PI * 2 * i) / 36 + Math.random() * 0.2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      alpha: 1, size: 3 + Math.random() * 3,
      gravity: 0.12,
      hue: 180 + Math.random() * 60
    });
  }
}

// ── Game over ─────────────────────────────────────────────────────────────────
function gameOver(){
  state = 'dead';
  if(animId) cancelAnimationFrame(animId);

  const isNewBest = score > bestScore;
  if(isNewBest){
    bestScore = score;
    localStorage.setItem('stack_best', bestScore);
    bestNum.textContent = bestScore;
  }

  finalScoreEl.textContent = score;
  finalScoreWrap.classList.add('visible');
  newBestWrap.classList.toggle('visible', isNewBest);
  playBtn.textContent = '再来一局';
  overlay.classList.remove('hidden');
}

// ── UI update ─────────────────────────────────────────────────────────────────
function updateScoreUI(){
  scoreNum.textContent = score;
  bestNum.textContent = Math.max(score, bestScore);
  layerNum.textContent = layers.length;
}

// ── Drawing helpers ───────────────────────────────────────────────────────────
function drawBlock(x, y, w, h, colorIdx, alpha, shadow){
  if(alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;

  const [c1, c2] = getPalette(colorIdx);

  // glow / shadow
  if(shadow !== false){
    ctx.shadowColor = c1;
    ctx.shadowBlur = 14;
  }

  // gradient fill
  const grad = ctx.createLinearGradient(x, y, x + w, y + h);
  grad.addColorStop(0, c1);
  grad.addColorStop(1, c2);
  ctx.fillStyle = grad;

  // slight 3d top edge
  const r = 4;
  roundRect(ctx, x, y, w, h, r);
  ctx.fill();

  // top highlight stripe
  ctx.shadowBlur = 0;
  const hiGrad = ctx.createLinearGradient(x, y, x, y + h * 0.35);
  hiGrad.addColorStop(0, 'rgba(255,255,255,0.22)');
  hiGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hiGrad;
  roundRect(ctx, x, y, w, h, r);
  ctx.fill();

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// ── Main draw ─────────────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0, 0, W, H);

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#07080f');
  bgGrad.addColorStop(1, '#0d1020');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Grid lines (subtle)
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  const gridSpacing = 40;
  for(let gx = 0; gx < W; gx += gridSpacing){
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
  }
  for(let gy = 0; gy < H; gy += gridSpacing){
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }
  ctx.restore();

  if(state === 'idle') return;

  // Placed layers
  const topLayer = layers.length - 1;
  for(let i = 0; i < layers.length; i++){
    const lyr = layers[i];
    const sy = layerToScreenY(i);
    if(sy > H + BLOCK_HEIGHT || sy < -BLOCK_HEIGHT * 3) continue;

    // fade older layers slightly
    const distFromTop = topLayer - i;
    const alpha = distFromTop > 20 ? 0.35 : 1 - distFromTop * 0.03;
    drawBlock(lyr.x, sy, lyr.w, BLOCK_HEIGHT, lyr.colorIdx, alpha);
  }

  // Moving block
  if(state === 'playing'){
    const msy = layerToScreenY(currentBlock.layer);
    drawBlock(currentBlock.x, msy, currentBlock.w, BLOCK_HEIGHT, currentBlock.colorIdx, 1);
  }

  // Debris
  for(const d of debris){
    ctx.save();
    ctx.globalAlpha = d.alpha;
    ctx.translate(d.x + d.w/2, d.y + d.h/2);
    ctx.rotate(d.rot);
    const dGrad = ctx.createLinearGradient(-d.w/2, -d.h/2, d.w/2, d.h/2);
    dGrad.addColorStop(0, d.c1);
    dGrad.addColorStop(1, d.c2);
    ctx.fillStyle = dGrad;
    ctx.shadowColor = d.c1;
    ctx.shadowBlur = 8;
    ctx.fillRect(-d.w/2, -d.h/2, d.w, d.h);
    ctx.restore();
  }

  // Particles
  for(const p of particles){
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = `hsla(${p.hue},90%,75%,1)`;
    ctx.shadowColor = `hsl(${p.hue},90%,75%)`;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawIdle(){
  ctx.clearRect(0, 0, W, H);
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#07080f');
  bgGrad.addColorStop(1, '#0d1020');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);
}

// ── Game loop ─────────────────────────────────────────────────────────────────
function loop(ts){
  const dt = Math.min((ts - lastTime) / 16.67, 3); // normalized to 60fps
  lastTime = ts;

  // Move current block
  if(state === 'playing'){
    currentBlock.x += currentBlock.goingRight
      ? currentBlock.speed * dt
      : -currentBlock.speed * dt;

    // Bounce off edges
    if(currentBlock.goingRight && currentBlock.x > W + 10){
      currentBlock.x = W + 10;
      currentBlock.goingRight = false;
    } else if(!currentBlock.goingRight && currentBlock.x + currentBlock.w < -10){
      currentBlock.x = -currentBlock.w - 10;
      currentBlock.goingRight = true;
    }
  }

  // Camera smooth scroll
  cameraY += (targetCameraY - cameraY) * 0.1 * dt;

  // Update debris
  for(let i = debris.length - 1; i >= 0; i--){
    const d = debris[i];
    d.x += d.vx * dt;
    d.y += d.vy * dt;
    d.vy += d.gravity * dt;
    d.rot += d.rotV * dt;
    d.alpha -= 0.018 * dt;
    if(d.alpha <= 0) debris.splice(i, 1);
  }

  // Update particles
  for(let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += p.gravity * dt;
    p.alpha -= 0.022 * dt;
    p.size *= 0.985;
    if(p.alpha <= 0) particles.splice(i, 1);
  }

  draw();
  animId = requestAnimationFrame(loop);
}

// ── Controls ──────────────────────────────────────────────────────────────────
function handleAction(){
  if(state === 'playing'){
    dropBlock();
  }
}

canvas.addEventListener('click', handleAction);
canvas.addEventListener('touchstart', (e)=>{ e.preventDefault(); handleAction(); }, {passive:false});
document.addEventListener('keydown', (e)=>{
  if(e.code === 'Space' || e.code === 'Enter'){
    e.preventDefault();
    handleAction();
  }
});

playBtn.addEventListener('click', ()=>{
  finalScoreWrap.classList.remove('visible');
  newBestWrap.classList.remove('visible');
  overlay.classList.add('hidden');
  playBtn.textContent = '开始游戏';

  initGame();
  state = 'playing';
  lastTime = performance.now();
  if(animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
});

// ── Initial render ────────────────────────────────────────────────────────────
drawIdle();
bestNum.textContent = bestScore;

})();
</script>
</body>
</html>
