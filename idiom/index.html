// =============================================
// GAME STATE
// =============================================
const TIME_LIMIT = 15;
const CIRCUMFERENCE = 2 * Math.PI * 35; // ~220

let gameState = 'start'; // 'start' | 'playing' | 'over'
let currentIdiom = '';
let score = 0;
let combo = 0;
let maxCombo = 0;
let countdown = TIME_LIMIT;
let timerInterval = null;
let history = []; // {text, who: 'system'|'player'}
let usedIdioms = new Set();
let bestCombo = parseInt(localStorage.getItem('idiom_best_combo') || '0');

// =============================================
// INIT
// =============================================
function init() {
  document.getElementById('startBest').textContent = bestCombo;
  document.getElementById('bestVal').textContent = bestCombo;
}

function showStart() {
  gameState = 'start';
  clearInterval(timerInterval);
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('overScreen').classList.add('hidden');
  document.getElementById('startBest').textContent = bestCombo;
}

function startGame() {
  gameState = 'playing';
  score = 0;
  combo = 0;
  maxCombo = 0;
  history = [];
  usedIdioms = new Set();

  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('overScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');

  updateScore();
  updateCombo();
  clearHistory();

  // Pick random starting idiom
  const keys = Object.keys(IDIOMS);
  const start = keys[Math.floor(Math.random() * keys.length)];
  setCurrentIdiom(start, 'system');
  resetInput();
  startTimer();
}

// =============================================
// IDIOM LOGIC
// =============================================
function setCurrentIdiom(idiom, who) {
  currentIdiom = idiom;
  usedIdioms.add(idiom);

  const el = document.getElementById('currentIdiom');
  const chars = idiom.split('');
  const tailChar = chars[chars.length - 1];
  el.innerHTML = chars.slice(0, -1).map(c => `<span>${c}</span>`).join('') +
    `<span class="tail-char">${tailChar}</span>`;

  document.getElementById('tailHint').textContent = tailChar;
  document.getElementById('hintText').textContent = IDIOMS[idiom]?.meaning || '';
  document.getElementById('hintText').classList.remove('show');
  document.getElementById('hintBtn') && (document.getElementById('hintBtn').textContent = '查看释义');

  addHistory(idiom, who);
}

function addHistory(idiom, who) {
  history.push({ text: idiom, who });
  if (history.length > 8) history.shift();
  renderHistory();
}

function renderHistory() {
  const wrap = document.getElementById('historyWrap');
  wrap.innerHTML = history.map(h =>
    `<div class="history-item ${h.who === 'player' ? 'player' : 'system'}">${h.text}</div>`
  ).join('');
  wrap.scrollLeft = wrap.scrollWidth;
}

function clearHistory() {
  document.getElementById('historyWrap').innerHTML = '';
}

function getTailChar() {
  return currentIdiom ? currentIdiom[currentIdiom.length - 1] : '';
}

function isValidAnswer(input) {
  if (!input || input.length !== 4) return false;
  if (!(input in IDIOMS)) return false;
  if (usedIdioms.has(input)) return false;
  if (input[0] !== getTailChar()) return false;
  return true;
}

// =============================================
// INPUT
// =============================================
function onInputChange() {
  const input = document.getElementById('idiomInput').value.trim();
  const validMsg = document.getElementById('validMsg');
  const inputEl = document.getElementById('idiomInput');
  const btn = document.getElementById('submitBtn');

  inputEl.classList.remove('valid', 'invalid');
  validMsg.className = 'valid-msg';
  validMsg.textContent = '';
  btn.disabled = true;

  if (!input) return;

  if (input.length < 4) {
    validMsg.textContent = '请输入四个字';
    return;
  }

  // Check first char
  const tail = getTailChar();
  if (input[0] !== tail) {
    inputEl.classList.add('invalid');
    validMsg.className = 'valid-msg err';
    validMsg.textContent = `首字必须是「${tail}」`;
    return;
  }

  if (!(input in IDIOMS)) {
    inputEl.classList.add('invalid');
    validMsg.className = 'valid-msg err';
    validMsg.textContent = '词库中未收录此成语';
    return;
  }

  if (usedIdioms.has(input)) {
    inputEl.classList.add('invalid');
    validMsg.className = 'valid-msg err';
    validMsg.textContent = '这个成语已经用过了';
    return;
  }

  inputEl.classList.add('valid');
  validMsg.className = 'valid-msg ok';
  validMsg.textContent = '成语有效！';
  btn.disabled = false;
}

function onKeyDown(e) {
  if (e.key === 'Enter') {
    const btn = document.getElementById('submitBtn');
    if (!btn.disabled) submitAnswer();
  }
}

function resetInput() {
  const inputEl = document.getElementById('idiomInput');
  inputEl.value = '';
  inputEl.classList.remove('valid', 'invalid');
  document.getElementById('validMsg').className = 'valid-msg';
  document.getElementById('validMsg').textContent = '';
  document.getElementById('submitBtn').disabled = true;
  setTimeout(() => inputEl.focus(), 100);
}

// =============================================
// SUBMIT
// =============================================
function submitAnswer() {
  if (gameState !== 'playing') return;
  const input = document.getElementById('idiomInput').value.trim();
  if (!isValidAnswer(input)) return;

  // Correct!
  combo++;
  if (combo > maxCombo) maxCombo = combo;

  const multiplier = Math.min(combo, 5);
  const earned = 10 * multiplier;
  score += earned;

  updateScore();
  updateCombo();
  spawnParticles();

  // Find next system idiom (starts with last char of player's idiom)
  const playerTail = input[input.length - 1];
  setCurrentIdiom(input, 'player');

  // System picks next
  const next = pickSystemIdiom(playerTail);
  if (!next) {
    // Player wins this round - system can't continue
    // Give bonus and keep going with a fresh chain
    const freshNext = pickFreshIdiom();
    if (!freshNext) {
      endGame();
      return;
    }
    setCurrentIdiom(freshNext, 'system');
  } else {
    setCurrentIdiom(next, 'system');
  }

  resetInput();
  resetTimer();
}

function pickSystemIdiom(startChar) {
  const candidates = Object.keys(IDIOMS).filter(
    k => k[0] === startChar && !usedIdioms.has(k)
  );
  if (!candidates.length) return null;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function pickFreshIdiom() {
  const keys = Object.keys(IDIOMS).filter(k => !usedIdioms.has(k));
  if (!keys.length) return null;
  return keys[Math.floor(Math.random() * keys.length)];
}

// =============================================
// TIMER
// =============================================
function startTimer() {
  countdown = TIME_LIMIT;
  updateTimerUI();
  timerInterval = setInterval(() => {
    countdown--;
    updateTimerUI();
    if (countdown <= 0) {
      clearInterval(timerInterval);
      endGame('timeout');
    }
  }, 1000);
}

function resetTimer() {
  clearInterval(timerInterval);
  startTimer();
}

function updateTimerUI() {
  const arc = document.getElementById('timerArc');
  const num = document.getElementById('timerNum');
  const pct = countdown / TIME_LIMIT;
  const offset = CIRCUMFERENCE * (1 - pct);
  arc.style.strokeDashoffset = offset;

  if (pct > 0.5) {
    arc.style.stroke = '#a78bfa';
  } else if (pct > 0.25) {
    arc.style.stroke = '#fbbf24';
  } else {
    arc.style.stroke = '#f87171';
  }

  num.textContent = countdown;
  num.style.color = pct <= 0.25 ? '#f87171' : '#fff';
}

// =============================================
// SCORE / COMBO
// =============================================
function updateScore() {
  document.getElementById('scoreVal').textContent = score;
}

function updateCombo() {
  const el = document.getElementById('comboVal');
  el.textContent = combo;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 150);
}

// =============================================
// GAME OVER
// =============================================
function endGame(reason) {
  clearInterval(timerInterval);
  gameState = 'over';

  // Shake on timeout/wrong
  if (reason === 'timeout') {
    document.body.classList.add('shake');
    document.body.style.boxShadow = 'inset 0 0 80px rgba(248,113,113,0.3)';
    setTimeout(() => {
      document.body.classList.remove('shake');
      document.body.style.boxShadow = '';
    }, 500);
  }

  // Update best
  let isNewBest = false;
  if (maxCombo > bestCombo) {
    bestCombo = maxCombo;
    localStorage.setItem('idiom_best_combo', bestCombo);
    isNewBest = true;
  }

  document.getElementById('overScore').textContent = score;
  document.getElementById('overCount').textContent = history.filter(h => h.who === 'player').length;
  document.getElementById('overCombo').textContent = maxCombo;
  document.getElementById('overBest').textContent = bestCombo;

  const badge = document.getElementById('newRecordBadge');
  if (isNewBest && maxCombo > 0) {
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }

  // Chain list
  const list = document.getElementById('overChainList');
  list.innerHTML = history.map(h =>
    `<span class="over-chain-item ${h.who === 'player' ? 'p' : 's'}">${h.text}</span>`
  ).join('');

  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('overScreen').classList.remove('hidden');

  document.getElementById('bestVal').textContent = bestCombo;
}

// =============================================
// HINT
// =============================================
function toggleHint() {
  const ht = document.getElementById('hintText');
  ht.classList.toggle('show');
  const btn = document.querySelector('.hint-btn');
  btn.textContent = ht.classList.contains('show') ? '隐藏释义' : '查看释义';
}

// =============================================
// PARTICLES
// =============================================
function spawnParticles() {
  const colors = ['#a78bfa','#34d399','#fbbf24','#f0abfc','#60a5fa'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 6 + Math.random() * 8;
    p.style.cssText = `
      width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      left:${20 + Math.random() * 60}vw;
      top:${20 + Math.random() * 40}vh;
      animation-duration:${0.6 + Math.random() * 0.6}s;
      animation-delay:${Math.random() * 0.2}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

// =============================================
// START
// =============================================
init();
</script>
