<script>
// ===================== CONFIG =====================
const ROWS = 5, COLS = 9;
let CELL = 80; // dynamic
const SIDEBAR_W = 90;

// Plant definitions
const PLANT_DEFS = [
  { id:'sunflower',  name:'向日葵',   cost:50,  cd:7,   hp:100, color:'#f5e200', desc:'产出阳光' },
  { id:'peashooter', name:'豌豆射手', cost:100, cd:7.5, hp:100, color:'#39ff14', desc:'射出豌豆' },
  { id:'wallnut',    name:'坚果',     cost:50,  cd:30,  hp:600, color:'#c8830a', desc:'高血量防墙' },
  { id:'iceshooter', name:'寒冰射手', cost:175, cd:7.5, hp:100, color:'#00cfff', desc:'冰冻减速' },
  { id:'cherry',     name:'樱桃炸弹', cost:150, cd:45,  hp:100, color:'#ff3333', desc:'范围爆炸' },
  { id:'twinsun',    name:'双枪向日葵',cost:200,cd:7.5, hp:100, color:'#ffaa00', desc:'双豌豆射击' },
];

// Zombie definitions
const ZOMBIE_DEFS = {
  normal:  { name:'普通僵尸', hp:100,  speed:30,  dmg:1,  armor:0,   score:10  },
  cone:    { name:'路障僵尸', hp:180,  speed:30,  dmg:1,  armor:80,  score:20  },
  bucket:  { name:'铁桶僵尸', hp:340,  speed:20,  dmg:1,  armor:200, score:40  },
  jumper:  { name:'跳跳僵尸', hp:120,  speed:38,  dmg:1,  armor:0,   score:25  },
};

// Level definitions: waves array, each wave is array of {type,count,interval}
const LEVELS = [
  { // Level 1
    waves:[
      [{type:'normal',count:3,interval:2500}],
      [{type:'normal',count:4,interval:2200}],
      [{type:'normal',count:3,interval:2000},{type:'cone',count:1,interval:3000}],
      [{type:'normal',count:5,interval:2000},{type:'cone',count:2,interval:2500}],
      [{type:'normal',count:8,interval:1500},{type:'cone',count:3,interval:2000}],
    ]
  },
  { // Level 2
    waves:[
      [{type:'normal',count:4,interval:2200},{type:'cone',count:1,interval:3000}],
      [{type:'normal',count:5,interval:2000},{type:'cone',count:2,interval:2500}],
      [{type:'cone',count:4,interval:2200},{type:'jumper',count:1,interval:3500}],
      [{type:'normal',count:6,interval:1800},{type:'cone',count:3,interval:2200},{type:'bucket',count:1,interval:4000}],
      [{type:'normal',count:8,interval:1500},{type:'cone',count:4,interval:2000},{type:'bucket',count:2,interval:3500}],
    ]
  },
  { // Level 3
    waves:[
      [{type:'normal',count:5,interval:2000},{type:'cone',count:2,interval:2500}],
      [{type:'cone',count:4,interval:2000},{type:'jumper',count:2,interval:3000}],
      [{type:'normal',count:5,interval:1800},{type:'bucket',count:2,interval:3500}],
      [{type:'cone',count:5,interval:2000},{type:'bucket',count:2,interval:3200},{type:'jumper',count:2,interval:3000}],
      [{type:'normal',count:10,interval:1200},{type:'cone',count:5,interval:1800},{type:'bucket',count:3,interval:3000}],
    ]
  },
  { // Level 4
    waves:[
      [{type:'cone',count:4,interval:2000},{type:'bucket',count:2,interval:3000}],
      [{type:'jumper',count:4,interval:2500},{type:'normal',count:4,interval:1800}],
      [{type:'bucket',count:4,interval:3000},{type:'cone',count:4,interval:2200}],
      [{type:'normal',count:8,interval:1500},{type:'jumper',count:4,interval:2500},{type:'bucket',count:3,interval:3000}],
      [{type:'normal',count:12,interval:1000},{type:'cone',count:6,interval:1800},{type:'bucket',count:4,interval:2800},{type:'jumper',count:3,interval:2500}],
    ]
  },
  { // Level 5
    waves:[
      [{type:'bucket',count:4,interval:2800},{type:'jumper',count:3,interval:2500}],
      [{type:'cone',count:6,interval:1800},{type:'bucket',count:3,interval:2800}],
      [{type:'normal',count:8,interval:1300},{type:'jumper',count:5,interval:2200},{type:'bucket',count:3,interval:2800}],
      [{type:'cone',count:8,interval:1600},{type:'bucket',count:5,interval:2500},{type:'jumper',count:4,interval:2200}],
      [{type:'normal',count:15,interval:800},{type:'cone',count:8,interval:1500},{type:'bucket',count:6,interval:2500},{type:'jumper',count:5,interval:2000}],
    ]
  },
  { // Level 6 - Final
    waves:[
      [{type:'bucket',count:5,interval:2500},{type:'jumper',count:4,interval:2200}],
      [{type:'normal',count:10,interval:1200},{type:'cone',count:6,interval:1800},{type:'bucket',count:4,interval:2800}],
      [{type:'jumper',count:8,interval:1800},{type:'bucket',count:5,interval:2500}],
      [{type:'normal',count:12,interval:1000},{type:'cone',count:8,interval:1500},{type:'bucket',count:6,interval:2500},{type:'jumper',count:6,interval:2000}],
      [{type:'normal',count:20,interval:600},{type:'cone',count:12,interval:1200},{type:'bucket',count:8,interval:2200},{type:'jumper',count:8,interval:1800}],
    ]
  },
];

// ===================== STATE =====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, offsetX, offsetY;

let gameState = 'menu'; // menu, playing, paused, win, lose
let sun = 150;
let lives = 3;
let currentLevel = 0;
let currentWave = 0;
let selectedCard = null;
let score = 0;

// Game objects
let grid = []; // grid[row][col] = plant or null
let zombies = [];
let bullets = [];
let sunDrops = [];
let particles = [];
let explosions = [];
let notifications = [];

// Timers
let lastTime = 0;
let sunDropTimer = 0;
let sunDropInterval = 6000; // ms
let waveTimer = 0;
let waveDelay = 20000; // ms between waves
let waveActive = false;
let waveSpawnQueue = [];
let waveSpawnTimer = 0;
let allWavesDone = false;
let gameWon = false;

// ===================== RESIZE =====================
function resize(){
  const wrap = document.getElementById('canvas-wrap');
  const isMobile = window.innerWidth <= 600;
  CELL = isMobile ? 60 : 80;
  // Canvas logical size
  W = COLS * CELL;
  H = ROWS * CELL;
  // HiDPI / Retina support
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  // Maintain aspect ratio in CSS — never stretch
  requestAnimationFrame(()=>{
    const wrapW = wrap.clientWidth  || W;
    const wrapH = wrap.clientHeight || H;
    const scale = Math.min(wrapW / W, wrapH / H);
    canvas.style.width  = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
    canvas.style.display = 'block';
    canvas.style.margin  = 'auto';
  });
  offsetX = 0;
  offsetY = 0;
  // Card panel
  document.getElementById('card-panel').style.width = isMobile ? '100%' : (SIDEBAR_W - 8) + 'px';
}

// ===================== GRID =====================
function initGrid(){
  grid = [];
  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    for(let c=0;c<COLS;c++) grid[r][c]=null;
  }
}

function cellToXY(row,col){
  return { x: col*CELL + CELL/2, y: row*CELL + CELL/2 };
}

function xyToCell(x,y){
  return { col: Math.floor(x/CELL), row: Math.floor(y/CELL) };
}

// ===================== PLANTS =====================
let plantIdCounter = 0;
let cardCooldowns = {}; // id -> remaining seconds

PLANT_DEFS.forEach(p=>{ cardCooldowns[p.id]=0; });

function createPlant(type,row,col){
  const def = PLANT_DEFS.find(d=>d.id===type);
  const pos = cellToXY(row,col);
  return {
    id: plantIdCounter++,
    type,
    row, col,
    x: pos.x, y: pos.y,
    hp: def.hp,
    maxHp: def.hp,
    shootTimer: 0,
    sunTimer: 0,
    explodeTimer: type==='cherry' ? 2000 : -1,
    exploded: false,
    anim: 0, // animation tick
  };
}

function getShootInterval(type){
  if(type==='peashooter') return 1500;
  if(type==='iceshooter') return 1600;
  if(type==='twinsun') return 1400;
  return 9999999;
}

function plantHasFiringRow(plant){
  return ['peashooter','iceshooter','twinsun'].includes(plant.type);
}

function getZombiesInRow(row){
  return zombies.filter(z=>z.row===row && !z.dead);
}

// ===================== ZOMBIES =====================
let zombieIdCounter = 0;

function createZombie(type, row){
  const def = ZOMBIE_DEFS[type];
  return {
    id: zombieIdCounter++,
    type,
    row,
    x: W + CELL, // start off-screen right
    y: row*CELL + CELL/2,
    hp: def.hp,
    maxHp: def.hp,
    armorHp: def.armor,
    maxArmorHp: def.armor,
    speed: def.speed * (0.8 + Math.random()*0.4),
    dmg: def.dmg,
    eating: false,
    eatTimer: 0,
    walkAnim: 0,
    dead: false,
    hasJumped: false, // for jumper
    jumping: false,
    jumpTimer: 0,
    slowTimer: 0, // ice slowdown
    scoreValue: def.score,
  };
}

// ===================== BULLETS =====================
let bulletIdCounter = 0;

function createBullet(plant, targetRow){
  const isIce = plant.type==='iceshooter';
  const isTwin = plant.type==='twinsun';
  const bullets_to_create = [];
  const base = {
    id: bulletIdCounter++,
    x: plant.x + CELL/2,
    row: targetRow,
    speed: 350, // px/s
    dmg: 1,
    ice: isIce,
    dead: false,
  };
  if(isTwin){
    bullets_to_create.push({...base, id:bulletIdCounter++, y: plant.y - 6});
    bullets_to_create.push({...base, y: plant.y + 6});
  } else {
    bullets_to_create.push({...base, y: plant.y});
  }
  return bullets_to_create;
}

// ===================== SUN DROPS =====================
let sunDropIdCounter = 0;

function createSunDrop(x, y, fromSunflower){
  return {
    id: sunDropIdCounter++,
    x,
    y: fromSunflower ? y - CELL*0.3 : -20,
    targetY: fromSunflower ? y + CELL*0.4 : y,
    dead: false,
    timer: 0,
    lifetime: 7000,
    rot: 0,
    fromSunflower,
    amount: 25,
    falling: true,
  };
}

// ===================== PARTICLES =====================
function createExplosion(cx, cy){
  // Range: 3x3 cells - find zombies in range
  const col = Math.floor(cx/CELL);
  const row = Math.floor(cy/CELL);
  for(let r=Math.max(0,row-1);r<=Math.min(ROWS-1,row+1);r++){
    for(let c=Math.max(0,col-1);c<=Math.min(COLS-1,col+1);c++){
      // Damage zombies
      zombies.forEach(z=>{
        if(z.dead) return;
        if(z.row===r && z.x>=c*CELL && z.x<=(c+1)*CELL){
          z.hp -= 90;
          if(z.hp<=0){ z.dead=true; score+=z.scoreValue; }
        }
      });
      // Destroy plants (not the cherry itself which is already gone)
      if(grid[r] && grid[r][c]){
        // don't destroy the exploding cherry
      }
    }
  }
  // Visual particles
  for(let i=0;i<30;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=60+Math.random()*180;
    particles.push({
      x:cx, y:cy,
      vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
      life:1, maxLife:0.8+Math.random()*0.4,
      color: Math.random()<0.5 ? '#ff4400' : '#ffaa00',
      size: 3+Math.random()*5,
      dead:false,
    });
  }
  explosions.push({x:cx,y:cy,r:0,maxR:CELL*1.8,life:1,dead:false});
}

// ===================== WAVE SYSTEM =====================
function startWave(waveIdx){
  if(waveIdx>=LEVELS[currentLevel].waves.length){
    allWavesDone = true;
    return;
  }
  currentWave = waveIdx;
  waveActive = true;
  waveSpawnQueue = [];
  const waveDef = LEVELS[currentLevel].waves[waveIdx];
  // Build spawn queue
  let t = 500;
  waveDef.forEach(group=>{
    for(let i=0;i<group.count;i++){
      const row = Math.floor(Math.random()*ROWS);
      waveSpawnQueue.push({type:group.type, row, time:t});
      t += group.interval + (Math.random()-0.5)*500;
    }
  });
  waveSpawnQueue.sort((a,b)=>a.time-b.time);
  waveSpawnTimer = 0;
  if(waveIdx === LEVELS[currentLevel].waves.length-1){
    addNotif('最后一波！坚持住！','#ff4444');
  } else {
    addNotif(`第${waveIdx+1}波僵尸来袭！`,'#ffdd00');
  }
}

// ===================== CARD UI =====================
function buildCardPanel(){
  const panel = document.getElementById('card-panel');
  panel.innerHTML = '';
  PLANT_DEFS.forEach(def=>{
    const card = document.createElement('div');
    card.className = 'plant-card';
    card.id = 'card-'+def.id;
    card.innerHTML = `
      <canvas class="card-canvas" id="cardcanvas-${def.id}" width="50" height="46"></canvas>
      <div class="card-name">${def.name}</div>
      <div class="card-cost">☀${def.cost}</div>
      <div class="card-cd-overlay"></div>
      <div class="card-cd" id="cdbar-${def.id}" style="width:100%"></div>
    `;
    card.addEventListener('click',()=>onCardClick(def.id));
    panel.appendChild(card);
    // Draw icon
    drawCardIcon(def.id);
  });
}

function drawCardIcon(id){
  const c = document.getElementById('cardcanvas-'+id);
  if(!c) return;
  const cx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w=50, h=46;
  c.width  = w * dpr;
  c.height = h * dpr;
  c.style.width  = w + 'px';
  c.style.height = h + 'px';
  cx.scale(dpr, dpr);
  cx.clearRect(0,0,w,h);
  drawPlantIcon(cx,id,w/2,h/2,18);
}

function updateCardUI(dt){
  PLANT_DEFS.forEach(def=>{
    if(cardCooldowns[def.id]>0) cardCooldowns[def.id]-=dt/1000;
    if(cardCooldowns[def.id]<0) cardCooldowns[def.id]=0;
    const card = document.getElementById('card-'+def.id);
    if(!card) return;
    const pct = cardCooldowns[def.id]/def.cd;
    const cdbar = document.getElementById('cdbar-'+def.id);
    const overlay = card.querySelector('.card-cd-overlay');
    if(pct>0){
      card.classList.add('cooling','disabled');
      if(cdbar) cdbar.style.width=(pct*100)+'%';
      if(overlay) overlay.style.display='block';
    } else {
      card.classList.remove('cooling');
      const def2 = PLANT_DEFS.find(d=>d.id===def.id);
      if(sun >= def2.cost){
        card.classList.remove('disabled');
      } else {
        card.classList.add('disabled');
      }
      if(cdbar) cdbar.style.width='0%';
      if(overlay) overlay.style.display='none';
    }
    if(selectedCard===def.id) card.classList.add('selected');
    else card.classList.remove('selected');
  });
}

function onCardClick(id){
  if(gameState!=='playing') return;
  const def = PLANT_DEFS.find(d=>d.id===id);
  if(cardCooldowns[id]>0) return;
  if(sun<def.cost) return;
  selectedCard = (selectedCard===id) ? null : id;
}

// ===================== INPUT =====================
canvas.addEventListener('click', e=>{
  if(gameState!=='playing') return;
  const rect = canvas.getBoundingClientRect();
  // Use logical W/H (not canvas.width which is scaled by dpr)
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const cx = (e.clientX-rect.left)*scaleX;
  const cy = (e.clientY-rect.top)*scaleY;

  // Check sun drops
  let collected = false;
  sunDrops.forEach(s=>{
    if(s.dead||s.falling) return;
    const dx=cx-s.x,dy=cy-s.y;
    if(Math.sqrt(dx*dx+dy*dy)<22){
      sun+=s.amount;
      s.dead=true;
      collected=true;
      updateSunUI();
    }
  });
  if(collected) return;

  // Plant placement
  if(selectedCard){
    const cell = xyToCell(cx,cy);
    if(cell.row<0||cell.row>=ROWS||cell.col<0||cell.col>=COLS) return;
    if(grid[cell.row][cell.col]!==null) return;
    const def = PLANT_DEFS.find(d=>d.id===selectedCard);
    if(sun<def.cost) return;
    if(cardCooldowns[selectedCard]>0) return;
    sun -= def.cost;
    cardCooldowns[selectedCard] = def.cd;
    const plant = createPlant(selectedCard,cell.row,cell.col);
    grid[cell.row][cell.col] = plant;
    selectedCard = null;
    updateSunUI();
  }
});

canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const touch = e.touches[0];
  canvas.dispatchEvent(new MouseEvent('click',{clientX:touch.clientX,clientY:touch.clientY}));
},{passive:false});

// ===================== DRAWING =====================
function drawBackground(){
  // Sun glow at top-right corner
  const sunGlow=ctx.createRadialGradient(W,0,0,W,0,CELL*2.5);
  sunGlow.addColorStop(0,'rgba(255,240,100,0.12)');
  sunGlow.addColorStop(1,'rgba(255,240,100,0)');
  ctx.fillStyle=sunGlow;
  ctx.fillRect(0,0,W,H);

  // Row stripes
  for(let r=0;r<ROWS;r++){
    ctx.fillStyle = r%2===0 ? '#0b2108' : '#0f2b0c';
    ctx.fillRect(0,r*CELL,W,CELL);

    // Subtle grass texture per cell
    ctx.save();
    ctx.strokeStyle='rgba(50,180,30,0.18)';
    ctx.lineWidth=1;
    ctx.lineCap='round';
    for(let c=0;c<COLS;c++){
      const baseX=c*CELL;
      const baseY=(r+1)*CELL;
      // 4–5 random-looking but deterministic grass blades per cell
      for(let g=0;g<5;g++){
        const bx=baseX+CELL*((g*17+c*7+r*13)%100)/100;
        const h2=CELL*0.12+CELL*0.08*((g+c+r)%3)/2;
        ctx.beginPath();
        ctx.moveTo(bx,baseY);
        ctx.quadraticCurveTo(bx+CELL*0.03*(((g+c)%3)-1),baseY-h2*0.5,bx+CELL*0.02*(((g+r)%3)-1),baseY-h2);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  // Grid lines — slightly more visible
  ctx.lineWidth=1;
  for(let c=0;c<=COLS;c++){
    ctx.strokeStyle='rgba(80,200,60,0.1)';
    ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,H);ctx.stroke();
  }
  for(let r=0;r<=ROWS;r++){
    ctx.strokeStyle= r===0||r===ROWS ? 'rgba(80,200,60,0.22)' : 'rgba(80,200,60,0.1)';
    ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(W,r*CELL);ctx.stroke();
  }

  // Left "danger zone" — stone path appearance
  const stoneW=CELL*0.55;
  ctx.fillStyle='rgba(180,30,30,0.07)';
  ctx.fillRect(0,0,stoneW,H);
  // Draw grey stone tiles
  ctx.save();
  for(let r=0;r<ROWS;r++){
    const sx=CELL*0.04, sy=r*CELL+CELL*0.06;
    const sw=stoneW-CELL*0.08, sh=CELL-CELL*0.12;
    const stg=ctx.createLinearGradient(sx,sy,sx+sw,sy+sh);
    stg.addColorStop(0,'rgba(90,100,90,0.35)');
    stg.addColorStop(1,'rgba(50,60,50,0.2)');
    ctx.fillStyle=stg;
    ctx.beginPath();
    ctx.roundRect(sx,sy,sw,sh,CELL*0.08);
    ctx.fill();
    ctx.strokeStyle='rgba(100,120,100,0.3)';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.roundRect(sx,sy,sw,sh,CELL*0.08);
    ctx.stroke();
  }
  ctx.restore();
}

      cx.beginPath();cx.moveTo(size*0.38,size*0.0);cx.lineTo(size*0.24,size*0.05);cx.stroke();
      cx.fillStyle='#1a0000';
      cx.beginPath();cx.arc(size*0.16,size*0.12,size*0.05,0,Math.PI*2);cx.fill();
      cx.beginPath();cx.arc(size*0.32,size*0.12,size*0.05,0,Math.PI*2);cx.fill();
      cx.strokeStyle='#4a0000';
      cx.beginPath();cx.arc(size*0.24,size*0.26,size*0.1,Math.PI+0.4,Math.PI*2-0.4);cx.stroke();

      // Stems arch
      cx.strokeStyle='#2a7000';cx.lineWidth=Math.max(1.5,size*0.08);cx.lineCap='round';
      cx.beginPath();cx.moveTo(-size*0.24,-size*0.26);cx.lineTo(-size*0.24,-size*0.02);cx.stroke();
      cx.beginPath();cx.moveTo(size*0.24,-size*0.26);cx.lineTo(size*0.24,-size*0.02);cx.stroke();
      cx.beginPath();cx.moveTo(-size*0.24,-size*0.26);cx.quadraticCurveTo(0,-size*0.54,size*0.24,-size*0.26);cx.stroke();
      // Fuse spark glow
      cx.save();
      cx.shadowColor='#ffcc00';cx.shadowBlur=8;
      cx.fillStyle='#ffe033';
      cx.beginPath();cx.arc(0,-size*0.56,size*0.08,0,Math.PI*2);cx.fill();
      cx.restore();
      break;
    }

    case 'twinsun': {
      // Two smaller sunflowers side by side
      const sfOffsets=[{ox:-size*0.26,oy:0},{ox:size*0.26,oy:-size*0.06}];
      sfOffsets.forEach(({ox,oy})=>{
        const s2=size*0.6;
        cx.save();cx.translate(ox,oy);
        // 8 petals
        for(let i=0;i<8;i++){
          cx.save();cx.rotate(i*Math.PI/4);
          const pg2=cx.createRadialGradient(0,-s2*0.5,s2*0.04,0,-s2*0.62,s2*0.22);
          pg2.addColorStop(0,'#ffdd33');
          pg2.addColorStop(1,'#e07800');
          cx.fillStyle=pg2;
          cx.beginPath();cx.ellipse(0,-s2*0.6,s2*0.12,s2*0.24,0,0,Math.PI*2);cx.fill();
          cx.restore();
        }
        // Center
        const cg2=cx.createRadialGradient(-s2*0.08,-s2*0.08,0,0,0,s2*0.3);
        cg2.addColorStop(0,'#7a4200');
        cg2.addColorStop(1,'#3d1e00');
        cx.fillStyle=cg2;
        cx.beginPath();cx.arc(0,0,s2*0.3,0,Math.PI*2);cx.fill();
        // seed dots
        cx.fillStyle='#c8700a';
        for(let i=0;i<5;i++){
          const a=i*Math.PI*2/5, r=s2*0.15;
          cx.beginPath();cx.arc(Math.cos(a)*r,Math.sin(a)*r,s2*0.045,0,Math.PI*2);cx.fill();
        }
        // Mini face
        cx.fillStyle='#fff';
        cx.beginPath();cx.arc(-s2*0.08,-s2*0.04,s2*0.07,0,Math.PI*2);cx.fill();
        cx.beginPath();cx.arc(s2*0.08,-s2*0.04,s2*0.07,0,Math.PI*2);cx.fill();
        cx.fillStyle='#1a0800';
        cx.beginPath();cx.arc(-s2*0.07,-s2*0.03,s2*0.04,0,Math.PI*2);cx.fill();
        cx.beginPath();cx.arc(s2*0.09,-s2*0.03,s2*0.04,0,Math.PI*2);cx.fill();
        cx.restore();
      });
      // Stem connecting
      cx.strokeStyle='#1a6600';cx.lineWidth=Math.max(2,size*0.1);cx.lineCap='round';
      cx.beginPath();cx.moveTo(-size*0.26,size*0.28);cx.lineTo(size*0.26,size*0.22);cx.stroke();
      // Double cannon barrels
      const bg=cx.createLinearGradient(size*0.26,-size*0.28,size*0.26,size*0.16);
      bg.addColorStop(0,'#2cd400');
      bg.addColorStop(1,'#0a5500');
      cx.fillStyle=bg;
      cx.beginPath();cx.roundRect(size*0.3,-size*0.28,size*0.44,size*0.16,size*0.04);cx.fill();
      cx.beginPath();cx.roundRect(size*0.3,-size*0.05,size*0.44,size*0.16,size*0.04);cx.fill();
      // Barrel opening
      cx.fillStyle='#001800';
      cx.beginPath();cx.ellipse(size*0.72,-size*0.2,size*0.05,size*0.07,0,0,Math.PI*2);cx.fill();
      cx.beginPath();cx.ellipse(size*0.72,size*0.03,size*0.05,size*0.07,0,0,Math.PI*2);cx.fill();
      break;
    }
  }
  cx.restore();
}

function drawPlant(plant){
  const t = plant.anim;
  ctx.save();
  ctx.translate(plant.x, plant.y);
  // Health-based alpha for damage
  const hpPct = plant.hp/plant.maxHp;
  if(hpPct<0.3) ctx.globalAlpha=0.5+Math.sin(Date.now()*0.01)*0.2;

  // Animations
  if(plant.type==='sunflower'){
    const bob = Math.sin(t*0.002)*4;
    ctx.translate(0,bob);
  } else if(plant.type==='cherry' && plant.explodeTimer>0){
    const scale = 1+0.1*Math.sin(t*0.01);
    ctx.scale(scale,scale);
  }

  drawPlantIcon(ctx, plant.type, 0, 0, CELL*0.38);
  ctx.restore();

  // HP bar (only when damaged)
  if(plant.hp < plant.maxHp){
    const bw=CELL*0.7, bh=4;
    const bx=plant.x-bw/2, by=plant.y-CELL*0.55;
    ctx.fillStyle='#333';
    ctx.fillRect(bx,by,bw,bh);
    const pct=plant.hp/plant.maxHp;
    ctx.fillStyle=pct>0.5?'#39ff14':pct>0.25?'#ffdd00':'#ff3333';
    ctx.fillRect(bx,by,bw*pct,bh);
  }
}

function drawZombie(z){
  if(z.dead) return;
  ctx.save();
  ctx.translate(z.x, z.y);

  const walk   = Math.sin(z.walkAnim*0.08)*5;
  const walkR  = Math.sin(z.walkAnim*0.08);  // -1..1 for leg angles
  const armSw  = Math.sin(z.walkAnim*0.08+0.5)*0.28;

  const hpPct = z.hp/z.maxHp;
  // Zombie skin gets more decayed (greener) when low HP
  const skinR = Math.round(hpPct>0.5 ? 130 : 100);
  const skinG = Math.round(hpPct>0.5 ? 165 : 140);
  const skinB = Math.round(hpPct>0.5 ? 110 : 90);
  const skinColor = `rgb(${skinR},${skinG},${skinB})`;
  const shirtColor = hpPct>0.5 ? '#5a6e8a' : '#3a4e6a';

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath();ctx.ellipse(0,CELL*0.42,CELL*0.22,CELL*0.05,0,0,Math.PI*2);ctx.fill();

  // --- LEGS ---
  const legW=CELL*0.1, legH=CELL*0.25;
  // Left leg
  ctx.save();
  ctx.translate(-CELL*0.1,CELL*0.2+walk*0.1);
  ctx.rotate(walkR*0.38);
  const lgL=ctx.createLinearGradient(-legW/2,0,legW/2,0);
  lgL.addColorStop(0,'#4a5a7a');lgL.addColorStop(1,'#2a3a5a');
  ctx.fillStyle=lgL;
  ctx.beginPath();ctx.roundRect(-legW/2,0,legW,legH,legW*0.3);ctx.fill();
  // Shoe
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.ellipse(-legW*0.1,legH,legW*0.8,legH*0.18,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Right leg
  ctx.save();
  ctx.translate(CELL*0.1,CELL*0.2+walk*0.1);
  ctx.rotate(-walkR*0.38);
  const lgR=ctx.createLinearGradient(-legW/2,0,legW/2,0);
  lgR.addColorStop(0,'#4a5a7a');lgR.addColorStop(1,'#2a3a5a');
  ctx.fillStyle=lgR;
  ctx.beginPath();ctx.roundRect(-legW/2,0,legW,legH,legW*0.3);ctx.fill();
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.ellipse(legW*0.1,legH,legW*0.8,legH*0.18,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // --- BODY (torso) ---
  ctx.save();
  ctx.translate(0,walk*0.15);
  const bodyGrad=ctx.createLinearGradient(-CELL*0.14,-CELL*0.05,CELL*0.14,CELL*0.22);
  bodyGrad.addColorStop(0,shirtColor);
  bodyGrad.addColorStop(1,'#2a3a4a');
  ctx.fillStyle=bodyGrad;
  ctx.beginPath();ctx.roundRect(-CELL*0.15,-CELL*0.05,CELL*0.3,CELL*0.3,CELL*0.05);ctx.fill();
  // Torn shirt detail: a couple of jagged strokes
  ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-CELL*0.04,CELL*0.22);ctx.lineTo(-CELL*0.02,CELL*0.18);ctx.lineTo(CELL*0.02,CELL*0.22);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CELL*0.06,CELL*0.24);ctx.lineTo(CELL*0.08,CELL*0.19);ctx.lineTo(CELL*0.12,CELL*0.24);ctx.stroke();
  ctx.restore();

  // --- ARMS ---
  const armW=CELL*0.09, armH=CELL*0.24;
  // Left arm (back arm, less visible)
  ctx.save();
  ctx.translate(-CELL*0.17,-CELL*0.0+walk*0.12);
  ctx.rotate(z.eating ? -0.5 : -armSw*0.6-0.2);
  const alg=ctx.createLinearGradient(-armW/2,0,armW/2,0);
  alg.addColorStop(0,skinColor);alg.addColorStop(1,`rgb(${skinR-20},${skinG-20},${skinB-20})`);
  ctx.fillStyle=alg;
  ctx.beginPath();ctx.roundRect(-armW/2,0,armW,armH,armW*0.4);ctx.fill();
  // Hand
  ctx.fillStyle=skinColor;
  ctx.beginPath();ctx.arc(0,armH,armW*0.55,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Right arm (front, outstretched toward left = negative x)
  ctx.save();
  ctx.translate(CELL*0.17,-CELL*0.0+walk*0.12);
  ctx.rotate(z.eating ? 0.3 : armSw*0.6-0.15);
  const arg=ctx.createLinearGradient(-armW/2,0,armW/2,0);
  arg.addColorStop(0,skinColor);arg.addColorStop(1,`rgb(${skinR-20},${skinG-20},${skinB-20})`);
  ctx.fillStyle=arg;
  ctx.beginPath();ctx.roundRect(-armW/2,0,armW,armH,armW*0.4);ctx.fill();
  ctx.fillStyle=skinColor;
  ctx.beginPath();ctx.arc(0,armH,armW*0.55,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // --- HEAD ---
  const headY = -CELL*0.25 + walk*0.18;
  ctx.save();
  ctx.translate(0, headY);
  // Head gradient — pale zombie green
  const headGrad=ctx.createRadialGradient(-CELL*0.06,-CELL*0.08,CELL*0.02,0,0,CELL*0.2);
  headGrad.addColorStop(0,`rgb(${skinR+20},${skinG+15},${skinB+10})`);
  headGrad.addColorStop(0.7,skinColor);
  headGrad.addColorStop(1,`rgb(${skinR-30},${skinG-30},${skinB-20})`);
  ctx.fillStyle=headGrad;
  ctx.beginPath();ctx.ellipse(0,0,CELL*0.18,CELL*0.2,0,0,Math.PI*2);ctx.fill();
  // Skull hint: cheekbone shading
  ctx.fillStyle='rgba(0,0,0,0.12)';
  ctx.beginPath();ctx.ellipse(-CELL*0.07,CELL*0.06,CELL*0.08,CELL*0.05,0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(CELL*0.07,CELL*0.06,CELL*0.08,CELL*0.05,-0.3,0,Math.PI*2);ctx.fill();
  // Sunken eyes — dark circles
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath();ctx.ellipse(-CELL*0.07,-CELL*0.06,CELL*0.07,CELL*0.055,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(CELL*0.07,-CELL*0.06,CELL*0.07,CELL*0.055,0,0,Math.PI*2);ctx.fill();
  // Glowing red eyes
  ctx.save();
  ctx.shadowColor='#ff2200';ctx.shadowBlur=6;
  ctx.fillStyle='#ff3300';
  ctx.beginPath();ctx.ellipse(-CELL*0.07,-CELL*0.062,CELL*0.045,CELL*0.038,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(CELL*0.07,-CELL*0.062,CELL*0.045,CELL*0.038,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Drooping mouth
  ctx.strokeStyle='rgba(0,0,0,0.6)';ctx.lineWidth=Math.max(1,CELL*0.03);ctx.lineCap='round';
  ctx.beginPath();ctx.arc(0,CELL*0.08,CELL*0.07,Math.PI+0.5,Math.PI*2-0.5);ctx.stroke();
  // Tooth sticking out
  ctx.fillStyle='#ddd';
  ctx.beginPath();ctx.rect(-CELL*0.02,CELL*0.08,CELL*0.035,CELL*0.06);ctx.fill();
  ctx.restore();

  // --- ARMOR / HATS ---
  if(z.type==='cone' && z.armorHp>0){
    const armorPct=z.armorHp/z.maxArmorHp;
    ctx.save();
    ctx.translate(0,headY);
    // Orange/yellow cone with gradient and metallic sheen
    const coneGrad=ctx.createLinearGradient(-CELL*0.2,-CELL*0.38,CELL*0.2,-CELL*0.08);
    coneGrad.addColorStop(0,`rgba(255,210,60,${0.5+armorPct*0.5})`);
    coneGrad.addColorStop(0.5,`rgba(220,150,30,${0.5+armorPct*0.5})`);
    coneGrad.addColorStop(1,`rgba(180,100,10,${0.5+armorPct*0.5})`);
    ctx.fillStyle=coneGrad;
    ctx.beginPath();
    ctx.moveTo(-CELL*0.2,-CELL*0.08);
    ctx.lineTo(CELL*0.2,-CELL*0.08);
    ctx.lineTo(CELL*0.07,-CELL*0.38);
    ctx.lineTo(-CELL*0.07,-CELL*0.38);
    ctx.closePath();ctx.fill();
    // Metallic highlight
    ctx.fillStyle=`rgba(255,255,200,${armorPct*0.3})`;
    ctx.beginPath();
    ctx.moveTo(-CELL*0.02,-CELL*0.08);
    ctx.lineTo(CELL*0.04,-CELL*0.08);
    ctx.lineTo(CELL*0.02,-CELL*0.36);
    ctx.lineTo(-CELL*0.01,-CELL*0.36);
    ctx.closePath();ctx.fill();
    ctx.restore();
  } else if(z.type==='bucket' && z.armorHp>0){
    const armorPct=z.armorHp/z.maxArmorHp;
    ctx.save();
    ctx.translate(0,headY);
    // Metal bucket with gradient
    const bucketGrad=ctx.createLinearGradient(-CELL*0.22,-CELL*0.36,CELL*0.22,-CELL*0.08);
    bucketGrad.addColorStop(0,`rgba(180,185,200,${0.45+armorPct*0.55})`);
    bucketGrad.addColorStop(0.5,`rgba(130,135,150,${0.45+armorPct*0.55})`);
    bucketGrad.addColorStop(1,`rgba(90,95,110,${0.45+armorPct*0.55})`);
    ctx.fillStyle=bucketGrad;
    ctx.beginPath();ctx.roundRect(-CELL*0.22,-CELL*0.38,CELL*0.44,CELL*0.3,CELL*0.04);ctx.fill();
    // Rivets
    ctx.fillStyle=`rgba(200,205,220,${armorPct*0.8})`;
    [[-CELL*0.16,-CELL*0.27],[CELL*0.16,-CELL*0.27],[-CELL*0.16,-CELL*0.12],[CELL*0.16,-CELL*0.12]].forEach(([rx,ry])=>{
      ctx.beginPath();ctx.arc(rx,ry,CELL*0.025,0,Math.PI*2);ctx.fill();
    });
    // Rim at top
    ctx.strokeStyle=`rgba(210,215,230,${armorPct*0.7})`;ctx.lineWidth=CELL*0.03;
    ctx.beginPath();ctx.moveTo(-CELL*0.22,-CELL*0.38);ctx.lineTo(CELL*0.22,-CELL*0.38);ctx.stroke();
    ctx.restore();
  } else if(z.type==='jumper'){
    // Jumper has a sprightly look — small energy "bounce" arc
    if(!z.jumping){
      ctx.save();
      ctx.translate(0,headY-CELL*0.05);
      ctx.strokeStyle='rgba(100,220,255,0.4)';ctx.lineWidth=CELL*0.025;
      ctx.beginPath();ctx.arc(0,-CELL*0.12,CELL*0.12,Math.PI,0);ctx.stroke();
      ctx.restore();
    }
  }

  ctx.restore();

  // HP bar
  const bw=CELL*0.72, bh=Math.max(3,CELL*0.05);
  const bx=z.x-bw/2, by=z.y-CELL*0.62;
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(bx-1,by-1,bw+2,bh+2);
  const hpPct2=z.hp/z.maxHp;
  ctx.fillStyle='#222';ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=hpPct2>0.5?'#39ff14':hpPct2>0.25?'#ffdd00':'#ff3333';
  ctx.fillRect(bx,by,bw*Math.max(0,hpPct2),bh);

  // Slow indicator
  if(z.slowTimer>0){
    ctx.save();
    ctx.strokeStyle='rgba(0,210,255,0.45)';
    ctx.lineWidth=2;
    ctx.shadowColor='rgba(0,200,255,0.5)';ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(z.x,z.y,CELL*0.36,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
}

function drawBullet(b){
  if(b.dead) return;
  ctx.save();
  if(b.ice){
    // Ice bullet — cyan crystalline diamond/snowflake shape
    ctx.translate(b.x,b.y);
    ctx.shadowColor='#00e0ff';ctx.shadowBlur=10;
    // Outer glow ring
    const ig=ctx.createRadialGradient(0,0,1,0,0,8);
    ig.addColorStop(0,'rgba(180,240,255,0.7)');
    ig.addColorStop(1,'rgba(0,200,255,0)');
    ctx.fillStyle=ig;
    ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();
    // Diamond shape
    ctx.fillStyle='#a0f0ff';
    ctx.beginPath();
    ctx.moveTo(0,-6);ctx.lineTo(5,0);ctx.lineTo(0,6);ctx.lineTo(-5,0);
    ctx.closePath();ctx.fill();
    // Inner bright core
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    ctx.moveTo(0,-3);ctx.lineTo(2.5,0);ctx.lineTo(0,3);ctx.lineTo(-2.5,0);
    ctx.closePath();ctx.fill();
    // Snowflake arms
    ctx.strokeStyle='rgba(200,240,255,0.7)';ctx.lineWidth=1;
    for(let a=0;a<4;a++){
      const ang=a*Math.PI/4;
      ctx.beginPath();ctx.moveTo(Math.cos(ang)*6,Math.sin(ang)*6);
      ctx.lineTo(Math.cos(ang+Math.PI/4)*4,Math.sin(ang+Math.PI/4)*4);ctx.stroke();
    }
  } else {
    // Pea bullet — green sphere with glow + highlight
    ctx.translate(b.x,b.y);
    ctx.shadowColor='#39ff14';ctx.shadowBlur=8;
    // Outer glow
    const pg=ctx.createRadialGradient(0,0,1,0,0,8);
    pg.addColorStop(0,'rgba(100,255,60,0.5)');
    pg.addColorStop(1,'rgba(57,255,20,0)');
    ctx.fillStyle=pg;
    ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();
    // Main pea sphere
    const sg=ctx.createRadialGradient(-2,-2,0,0,0,6);
    sg.addColorStop(0,'#aaffaa');
    sg.addColorStop(0.4,'#39ff14');
    sg.addColorStop(1,'#0d6600');
    ctx.fillStyle=sg;
    ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fill();
    // Specular highlight
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.beginPath();ctx.ellipse(-2,-2.5,2,1.4,-0.5,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

function drawSunDrop(s){
  if(s.dead) return;
  ctx.save();
  ctx.translate(s.x,s.y);
  ctx.rotate(s.rot);
  ctx.shadowColor='#f5c800';ctx.shadowBlur=12;
  // Glow circle
  const grad = ctx.createRadialGradient(0,0,2,0,0,20);
  grad.addColorStop(0,'rgba(255,240,80,0.9)');
  grad.addColorStop(0.5,'rgba(245,180,0,0.7)');
  grad.addColorStop(1,'rgba(245,130,0,0)');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.fill();
  // Core
  ctx.fillStyle='#ffe94d';
  ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();
  // Sun rays
  ctx.strokeStyle='#ffd700';ctx.lineWidth=2;
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4;
    ctx.beginPath();ctx.moveTo(Math.cos(a)*12,Math.sin(a)*12);
    ctx.lineTo(Math.cos(a)*17,Math.sin(a)*17);ctx.stroke();
  }
  ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    if(p.dead) return;
    ctx.save();
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*(p.life/p.maxLife),0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  explosions.forEach(e=>{
    if(e.dead) return;
    ctx.save();
    ctx.globalAlpha=e.life*0.5;
    ctx.strokeStyle='#ff6600';
    ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  });
}

function drawNotifications(){
  notifications.forEach(n=>{
    if(n.dead) return;
    ctx.save();
    ctx.globalAlpha=Math.min(1,(n.life/n.maxLife)*2);
    ctx.fillStyle=n.color;
    ctx.font=`bold ${CELL*0.35}px sans-serif`;
    ctx.textAlign='center';
    ctx.shadowColor=n.color;ctx.shadowBlur=12;
    ctx.fillText(n.text,W/2,n.y);
    ctx.restore();
  });
}

function drawSelectedPlantCursor(mouseX,mouseY){
  if(!selectedCard||gameState!=='playing') return;
  const cell=xyToCell(mouseX||0,mouseY||0);
  if(cell.row<0||cell.row>=ROWS||cell.col<0||cell.col>=COLS) return;
  ctx.save();
  ctx.strokeStyle=grid[cell.row]&&grid[cell.row][cell.col] ? '#ff4444' : '#39ff14';
  ctx.lineWidth=2;
  ctx.globalAlpha=0.7;
  ctx.strokeRect(cell.col*CELL+2,cell.row*CELL+2,CELL-4,CELL-4);
  ctx.restore();
}

let mouseX=0,mouseY=0;
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  mouseX=(e.clientX-rect.left)*(W/rect.width);
  mouseY=(e.clientY-rect.top)*(H/rect.height);
});

// ===================== GAME LOOP =====================
function update(dt){
  if(gameState!=='playing') return;

  // Sun drop timer
  sunDropTimer += dt;
  if(sunDropTimer >= sunDropInterval){
    sunDropTimer=0;
    sunDropInterval=5000+Math.random()*3000;
    const sx=CELL*0.5+Math.random()*(W-CELL);
    const sy=CELL*0.5+Math.random()*(H-CELL);
    sunDrops.push(createSunDrop(sx,sy,false));
  }

  // Update sun drops
  sunDrops.forEach(s=>{
    if(s.dead) return;
    s.rot+=dt*0.002;
    s.timer+=dt;
    if(s.falling){
      s.y+=dt*0.08;
      if(s.y>=s.targetY) { s.y=s.targetY; s.falling=false; }
    } else {
      if(s.timer>=s.lifetime) s.dead=true;
    }
  });
  sunDrops=sunDrops.filter(s=>!s.dead);

  // Update plants
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const p=grid[r][c];
      if(!p) continue;
      p.anim+=dt;

      // Sunflower produces sun
      if(p.type==='sunflower'){
        p.sunTimer+=dt;
        if(p.sunTimer>=25000){
          p.sunTimer=0;
          sunDrops.push(createSunDrop(p.x,p.y,true));
        }
      }

      // Shooters shoot
      if(plantHasFiringRow(p)){
        const rowZombies=getZombiesInRow(r);
        if(rowZombies.length>0){
          p.shootTimer+=dt;
          const interval=getShootInterval(p.type);
          if(p.shootTimer>=interval){
            p.shootTimer=0;
            const newBullets=createBullet(p,r);
            bullets.push(...newBullets);
          }
        }
      }

      // Cherry bomb countdown
      if(p.type==='cherry' && !p.exploded){
        p.explodeTimer-=dt;
        if(p.explodeTimer<=0){
          p.exploded=true;
          createExplosion(p.x,p.y);
          grid[r][c]=null;
        }
      }

      // Plant death
      if(p.hp<=0){
        grid[r][c]=null;
      }
    }
  }

  // Update bullets
  bullets.forEach(b=>{
    if(b.dead) return;
    b.x+=b.speed*(dt/1000);
    if(b.x>W+20){ b.dead=true; return; }
    // Collision with zombies in same row
    zombies.forEach(z=>{
      if(z.dead||b.dead) return;
      if(z.row!==b.row) return;
      if(Math.abs(b.x-z.x)<CELL*0.35 && Math.abs(b.y-z.y)<CELL*0.4){
        // Hit armor first
        if(z.armorHp>0){
          z.armorHp-=b.dmg;
          if(z.armorHp<0){ z.hp+=z.armorHp; z.armorHp=0; }
        } else {
          z.hp-=b.dmg;
        }
        if(b.ice) z.slowTimer=3000;
        b.dead=true;
        if(z.hp<=0){ z.dead=true; score+=z.scoreValue; }
      }
    });
  });
  bullets=bullets.filter(b=>!b.dead);

  // Update zombies
  zombies.forEach(z=>{
    if(z.dead) return;
    z.slowTimer=Math.max(0,z.slowTimer-dt);
    const speedMult = z.slowTimer>0 ? 0.5 : 1;

    // Jumper logic - check if first plant in row is close
    if(z.type==='jumper'&&!z.hasJumped&&!z.jumping){
      // find first plant in row from right
      for(let c=COLS-1;c>=0;c--){
        const p=grid[z.row]&&grid[z.row][c];
        if(p){
          if(z.x-p.x<CELL*1.2 && z.x>p.x){
            z.jumping=true;
            z.jumpTimer=0;
            z.hasJumped=true;
          }
          break;
        }
      }
    }

    if(z.jumping){
      z.jumpTimer+=dt;
      const dur=600;
      const t2=z.jumpTimer/dur;
      z.x-=z.speed*(dt/1000)*speedMult*1.5;
      z.y=(z.row*CELL+CELL/2)-Math.sin(t2*Math.PI)*CELL*0.8;
      if(z.jumpTimer>=dur){
        z.jumping=false;
        z.y=z.row*CELL+CELL/2;
        // Kill the plant it jumped over
        const col=Math.floor(z.x/CELL);
        if(col>=0&&col<COLS&&grid[z.row]&&grid[z.row][col]){
          // jumped to next plant position, don't kill
        }
      }
      return;
    }

    // Normal movement - check for blocking plant
    z.eating=false;
    let blocked=false;
    for(let c=COLS-1;c>=0;c--){
      const p=grid[z.row]&&grid[z.row][c];
      if(!p) continue;
      const px=c*CELL+CELL/2;
      if(z.x>px-CELL*0.3 && z.x<px+CELL*0.6){
        blocked=true;
        z.eating=true;
        // Eat plant
        z.eatTimer+=dt;
        if(z.eatTimer>=800){
          z.eatTimer=0;
          p.hp-=z.dmg*10;
          if(p.hp<=0) grid[z.row][c]=null;
        }
        break;
      }
    }

    if(!blocked){
      z.x-=z.speed*(dt/1000)*speedMult;
      z.walkAnim+=dt*speedMult;
    }

    // Reached left side
    if(z.x<-CELL*0.5){
      z.dead=true;
      lives--;
      updateLivesUI();
      addNotif('僵尸到家了！','#ff4444');
      if(lives<=0){
        gameState='lose';
        showOverlay('lose');
      }
    }
  });
  zombies=zombies.filter(z=>!z.dead);

  // Update particles
  particles.forEach(p=>{
    p.life-=dt/1000;
    p.x+=p.vx*(dt/1000);
    p.y+=p.vy*(dt/1000);
    p.vy+=100*(dt/1000);
    if(p.life<=0) p.dead=true;
  });
  particles=particles.filter(p=>!p.dead);
  explosions.forEach(e=>{
    e.r+=CELL*3*(dt/1000);
    e.life-=dt/1000;
    if(e.r>=e.maxR||e.life<=0) e.dead=true;
  });
  explosions=explosions.filter(e=>!e.dead);

  // Notifications
  notifications.forEach(n=>{
    n.life-=dt/1000;
    n.y-=30*(dt/1000);
    if(n.life<=0) n.dead=true;
  });
  notifications=notifications.filter(n=>!n.dead);

  // Wave system
  if(waveActive){
    waveSpawnTimer+=dt;
    // Spawn queued zombies
    while(waveSpawnQueue.length>0&&waveSpawnTimer>=waveSpawnQueue[0].time){
      const spawn=waveSpawnQueue.shift();
      zombies.push(createZombie(spawn.type,spawn.row));
    }
    // Wave ends when all spawned and all dead
    if(waveSpawnQueue.length===0&&zombies.length===0){
      waveActive=false;
      waveTimer=0;
      if(allWavesDone){
        // Level complete
        setTimeout(()=>{
          if(currentLevel<LEVELS.length-1){
            showOverlay('levelwin');
          } else {
            showOverlay('win');
          }
        },1500);
        gameState='paused';
      } else {
        startWave(currentWave+1);
        if(allWavesDone){
          // startWave just set allWavesDone=true (index out of range) — last wave cleared
          addNotif('最后一波已清除！','#39ff14');
          setTimeout(()=>{
            if(gameState!=='playing'&&gameState!=='paused') return;
            if(currentLevel<LEVELS.length-1){ showOverlay('levelwin'); }
            else { showOverlay('win'); }
          },1500);
          gameState='paused';
        } else {
          addNotif('波次清除！准备下一波…','#39ff14');
          updateWaveUI();
        }
      }
    }
  }

  updateSunUI();
  updateCardUI(dt);
  updateWaveUI();
}

function draw(){
  ctx.clearRect(0,0,W,H); // logical coords — ctx.scale(dpr,dpr) already applied
  drawBackground();

  // Draw plants
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]) drawPlant(grid[r][c]);
    }
  }

  // Draw zombies
  zombies.forEach(z=>drawZombie(z));

  // Draw bullets
  bullets.forEach(b=>drawBullet(b));

  // Draw sun drops
  sunDrops.forEach(s=>drawSunDrop(s));

  // Draw particles/explosions
  drawParticles();

  // Draw notifications
  drawNotifications();

  // Cursor highlight
  drawSelectedPlantCursor(mouseX,mouseY);
}

function gameLoop(ts){
  if(lastTime===0) lastTime=ts;
  const dt=Math.min(ts-lastTime,50);
  lastTime=ts;
  if(gameState==='playing'){
    update(dt);
    draw();
  } else if(gameState==='paused'||gameState==='menu'){
    draw();
  }
  requestAnimationFrame(gameLoop);
}

// ===================== OVERLAY =====================
function showOverlay(type){
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML='';

  if(type==='menu'){
    ov.innerHTML=`
      <h1>植物大战僵尸</h1>
      <p>保护你的家园！种植植物阻挡僵尸。<br>点击收集阳光，选择植物卡片后点击格子种植。<br><br>6种植物 · 4种僵尸 · 6个关卡</p>
      <button class="btn" id="startBtn">开始游戏</button>
    `;
    document.getElementById('startBtn').onclick=startGame;
  } else if(type==='win'){
    ov.innerHTML=`
      <h1 style="color:#f5e200">通关！</h1>
      <p>恭喜！你成功击退了所有僵尸！<br>得分：${score}</p>
      <button class="btn" id="restartBtn">再玩一次</button>
      <div id="ad-wrap">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4328689115224962" data-ad-slot="7765106927" data-ad-format="auto" data-full-width-responsive="true"></ins>
      </div>
    `;
    document.getElementById('restartBtn').onclick=()=>{currentLevel=0;startGame();};
    try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
  } else if(type==='levelwin'){
    ov.innerHTML=`
      <h1>关卡完成！</h1>
      <p>第${currentLevel+1}关通过！<br>得分：${score}</p>
      <button class="btn" id="nextBtn">下一关</button>
    `;
    document.getElementById('nextBtn').onclick=()=>{ currentLevel++; startLevel(); };
  } else if(type==='lose'){
    ov.innerHTML=`
      <h1 style="color:#ff4444">游戏结束</h1>
      <p>僵尸攻破了你的防线！<br>得分：${score}</p>
      <button class="btn" id="retryBtn">重试本关</button>
      <button class="btn btn-red" id="menuBtn" style="margin-top:8px">返回菜单</button>
      <div id="ad-wrap">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4328689115224962" data-ad-slot="7765106927" data-ad-format="auto" data-full-width-responsive="true"></ins>
      </div>
    `;
    document.getElementById('retryBtn').onclick=startLevel;
    document.getElementById('menuBtn').onclick=()=>{currentLevel=0;gameState='menu';showOverlay('menu');};
    try{(adsbygoogle=window.adsbygoogle||[]).push({});}catch(e){}
  }
}

function hideOverlay(){
  document.getElementById('overlay').style.display='none';
}

function startGame(){
  currentLevel=0;
  score=0;
  startLevel();
}

function startLevel(){
  hideOverlay();
  gameState='playing';
  lives=3;
  sun=150;
  score=score||0;
  initGrid();
  zombies=[];
  bullets=[];
  sunDrops=[];
  particles=[];
  explosions=[];
  notifications=[];
  sunDropTimer=0;
  sunDropInterval=6000;
  waveActive=false;
  allWavesDone=false;
  currentWave=0;
  selectedCard=null;

  // Reset card cooldowns
  PLANT_DEFS.forEach(p=>{cardCooldowns[p.id]=0;});

  updateSunUI();
  updateLivesUI();
  updateWaveUI();

  // Start first wave after delay
  setTimeout(()=>{
    if(gameState==='playing') startWave(0);
  },5000);

  addNotif(`第${currentLevel+1}关开始！`,'#39ff14');
}

// ===================== INIT =====================
window.addEventListener('resize',()=>{
  resize();
  buildCardPanel();
});

resize();
initGrid(); // must init before first draw() call to avoid grid[r][c] TypeError
buildCardPanel();
requestAnimationFrame(gameLoop);
showOverlay('menu');
</script>
